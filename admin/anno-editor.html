<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理後台 - 酷學習</title>
    <link rel="icon" type="image/png" href="../images/logo-gold.png">
    <!-- 引用現有樣式 -->
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/announcement.css">
    <style>
        /* ========== 隱藏式解鎖遮罩樣式 ========== */
        #page-lock-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%); z-index: 999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }
        .lock-content { text-align: center; user-select: none; } 
        #lock-icon { width: 100px; height: 100px; cursor: pointer; fill: #0b76d1; margin-bottom: 25px; transition: transform 0.1s; }
        #lock-icon:active { transform: scale(0.9); }
        .lock-notice { font-size: 1.25rem; font-weight: 900; color: #334155; letter-spacing: 1px; }
        
        /* 鎖定狀態：禁止捲動與內容互動 */
        body.locked-scrolling { overflow: hidden !important; height: 100vh !important; pointer-events: none; }
        #page-lock-mask { pointer-events: auto; } 
        .unlocked-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }

        /* ========== 管理後台主要樣式 ========== */
        body { 
            background-color: #f1f5f9; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            margin: 0;
        }
        header { 
            flex-shrink: 0; 
            margin: 0 !important; 
            border-radius: 0 !important; 
            width: 100% !important; 
            max-width: none !important; 
            background-color: #fff !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }
        .admin-layout {
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: #e2e8f0;
        }
        /* 左側清單 */
        .sidebar { background: #fff; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
        .anno-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .anno-item:hover { background: #f8fafc; }
        .anno-item.active { background: var(--primary-light); border-left: 4px solid var(--primary); }
        .anno-item .t { font-weight: bold; font-size: 0.95rem; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .anno-item .d { font-size: 0.8rem; color: #64748b; }

        /* 中間編輯區 */
        .editor-main { background: #fff; overflow-y: auto; padding: 40px; }
        .form-section { max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 0.9rem; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; font-family: inherit; }
        textarea { height: 120px; resize: vertical; line-height: 1.6; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .block-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 24px; position: relative; }
        .block-ctrl { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        /* 右側預覽 */
        .preview-panel { background: #f1f5f9; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
        .phone-mockup { width: 360px; height: 640px; border: 12px solid #1e293b; border-radius: 40px; background: #fff; overflow: hidden; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); flex-shrink: 0; }
        .phone-mockup .anno-card { width: 100%; height: 100%; position: relative; animation: none; box-shadow: none; border-radius: 0; }
        .phone-mockup #anno-content-wrapper { overflow-y: auto; overflow-x: hidden !important; width: 100%; height: 100%; cursor: default; word-break: break-word; }
        .phone-mockup #anno-content-wrapper.expanded::after { display: none; }
        .anno-text { word-break: break-word; white-space: pre-wrap; }
        .anno-img { max-width: 100%; height: auto; display: block; }

        /* 按鈕樣式 */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #0961ad; }
        .btn-danger { background: #fee2e2; color: #ef4444; }
        .btn-danger:hover { background: #fecaca; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; color: #64748b; }
        .btn-outline:hover { background: #f8fafc; border-color: #94a3b8; }
        #json-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .json-box { background: #fff; padding: 30px; border-radius: 16px; width: 90%; max-width: 800px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        textarea#json-output { height: 400px; font-family: 'Fira Code', monospace; background: #0f172a; color: #38bdf8; font-size: 0.85rem; border: none; padding: 15px; border-radius: 8px; resize: none; }
        #save-status { font-size: 0.85rem; color: #10b981; margin-right: 15px; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body>
    <div id="page-lock-mask">
        <div class="lock-content">
            <svg id="lock-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
            </svg>
            <div class="lock-notice">此功能僅提供給部分用戶使用</div>
        </div>
    </div>

    <header>
        <div class="logo">
            <a href="index.html" class="back-link">⬅</a>
            <span style="font-weight:bold; color:var(--primary);">公告系統管理台</span>
        </div>
        <div class="header-right">
            <span id="save-status">● 已自動存檔</span>
            <button class="btn btn-outline" onclick="resetDraft()">重置（載入 GitHub 原始檔）</button>
            <button class="btn btn-primary" onclick="showJSON()">產生 JSON 代碼</button>
        </div>
    </header>

    <div class="admin-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <strong>公告清單</strong>
                <button class="btn btn-primary" style="padding: 6px 12px;" onclick="createNewAnnouncement()">+ 新增</button>
            </div>
            <div id="anno-list"></div>
        </div>
        <div class="editor-main">
            <div id="editor-form" class="form-section">
                <div style="text-align:center; color:#94a3b8; margin-top:100px;">
                    <h3>歡迎使用公告編輯器</h3>
                    <p>請從左側選擇現有公告，或點擊「新增」開始編寫。</p>
                </div>
            </div>
        </div>
        <div class="preview-panel">
            <div class="phone-mockup">
                <div class="anno-card">
                    <div id="anno-content-wrapper" class="expanded"></div>
                </div>
            </div>
            <p style="margin-top:20px; color:#64748b; font-size:0.9rem;">手機版即時預覽</p>
        </div>
    </div>

    <div id="json-modal">
        <div class="json-box">
            <h3 style="margin-top:0;">複製 JSON 到 GitHub</h3>
            <p style="color:#64748b; font-size:0.9rem;">請全選下方代碼並覆蓋你的 <code>announcements.json</code> 檔案內容。</p>
            <textarea id="json-output" readonly></textarea>
            <div style="margin-top:20px; text-align:right; display:flex; justify-content: space-between; align-items:center;">
                <span style="color: #0b76d1; font-size:0.9rem;">提示：Ctrl+A 可全選</span>
                <button class="btn btn-outline" onclick="document.getElementById('json-modal').style.display='none'">關閉視窗</button>
            </div>
        </div>
    </div>

    <!-- 1. 引用工具函式（內含 parseMarkdown） -->
    <script src="../scripts/utils.js"></script>
    
    <!-- 2. 引用鎖定邏輯 -->
    <script src="../scripts/admin-lock.js"></script>

    <script>
        let allAnnouncements = [];
        let currentIndex = -1;
        const STORAGE_KEY = 'cool_learning_anno_draft';
        const JSON_PATH = 'https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/announcements.json';

        async function init() {
            const draft = localStorage.getItem(STORAGE_KEY);
            if (draft) {
                allAnnouncements = JSON.parse(draft);
                renderList();
                if (allAnnouncements.length > 0) selectAnno(0);
                showStatus();
            } else {
                fetchOriginal();
            }
        }

        async function fetchOriginal() {
            try {
                const r = await fetch(JSON_PATH + '?t=' + Date.now());
                const data = await r.json();
                allAnnouncements = data.announcements || [];
                renderList();
                if (allAnnouncements.length > 0) selectAnno(0);
            } catch (e) {
                console.error("無法載入原始檔案", e);
            }
        }

        function autoSave() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allAnnouncements));
            showStatus();
        }

        function showStatus() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        function resetDraft() {
            if (confirm("確定要重置嗎？這將會清除所有未產出的暫存修改，並重新從 GitHub 載入。")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function renderList() {
            const listEl = document.getElementById('anno-list');
            listEl.innerHTML = allAnnouncements.map((a, index) => `
                <div class="anno-item ${currentIndex === index ? 'active' : ''}" onclick="selectAnno(${index})">
                    <span class="t">${a.title || '(無標題)'}</span>
                    <span class="d">${a.date || '未設定日期'}</span>
                </div>
            `).join('');
        }

        function selectAnno(index) {
            currentIndex = index;
            renderList();
            const anno = allAnnouncements[index];
            const formEl = document.getElementById('editor-form');
            
            formEl.innerHTML = `
                <div class="form-group">
                    <label>公告標題</label>
                    <input type="text" id="edit-title" value="${anno.title || ''}" oninput="syncData()">
                </div>
                <div class="form-group">
                    <label>發布日期</label>
                    <input type="date" id="edit-date" value="${anno.date || ''}" oninput="syncData()">
                </div>
                <div class="form-group">
                    <label>封面圖片網址 (Cover URL)</label>
                    <input type="text" id="edit-cover" value="${anno.cover || ''}" oninput="syncData()" placeholder="https://...">
                </div>
                <div id="blocks-area"></div>
                <button class="btn btn-outline" style="width:100%; margin-bottom:40px; border-style: dashed;" onclick="addBlock()">+ 新增內文區塊</button>
                <div style="border-top:1px solid #e2e8f0; padding-top:30px; margin-top:50px;">
                    <button class="btn btn-danger" onclick="deleteCurrent()">刪除此則公告</button>
                </div>
            `;

            const blocksArea = document.getElementById('blocks-area');
            if (anno.blocks) {
                anno.blocks.forEach((b, bi) => addBlockUI(b, bi));
            }
            updatePreview();
        }

        function syncData() {
            if (currentIndex === -1) return;
            const anno = allAnnouncements[currentIndex];
            anno.title = document.getElementById('edit-title').value;
            anno.date = document.getElementById('edit-date').value;
            anno.cover = document.getElementById('edit-cover').value;
            
            anno.blocks = [];
            document.querySelectorAll('.block-item').forEach(el => {
                anno.blocks.push({
                    subtitle: el.querySelector('.b-sub').value,
                    text: el.querySelector('.b-txt').value,
                    image: el.querySelector('.b-img').value
                });
            });

            const items = document.querySelectorAll('.anno-item');
            if (items[currentIndex]) {
                items[currentIndex].querySelector('.t').innerText = anno.title || '(無標題)';
                items[currentIndex].querySelector('.d').innerText = anno.date || '未設定日期';
            }
            updatePreview();
            autoSave();
        }

        function addBlockUI(data = {subtitle:'', text:'', image:''}) {
            const area = document.getElementById('blocks-area');
            const div = document.createElement('div');
            div.className = 'block-item';
            div.innerHTML = `
                <div class="block-ctrl">
                    <strong>內容區塊</strong>
                    <button class="btn-danger" style="border:none; padding:4px 10px; font-size:0.8rem; border-radius:4px;" onclick="this.parentElement.parentElement.remove(); syncData();">移除</button>
                </div>
                <div class="form-group">
                    <label>子標題 (選填)</label>
                    <input type="text" class="b-sub" value="${data.subtitle || ''}" oninput="syncData()">
                </div>
                <div class="form-group">
                    <label>文字內容</label>
                    <textarea class="b-txt" oninput="syncData()" placeholder="支援一般文字換行...">${data.text || ''}</textarea>
                </div>
                <div class="form-group">
                    <label>區塊圖片網址 (選填)</label>
                    <input type="text" class="b-img" value="${data.image || ''}" oninput="syncData()" placeholder="https://...">
                </div>
            `;
            area.appendChild(div);
        }

        function addBlock() { addBlockUI(); syncData(); }

        function updatePreview() {
            const anno = allAnnouncements[currentIndex];
            const wrapper = document.getElementById('anno-content-wrapper');
            if (!anno) { wrapper.innerHTML = ''; return; }

            let blocksHtml = '';
            (anno.blocks || []).forEach(b => {
                // 使用 utils.js 提供的 parseMarkdown
                blocksHtml += `
                    <div class="anno-block">
                        ${b.subtitle ? `<div class="anno-subtitle">${parseMarkdown(b.subtitle)}</div>` : ''}
                        ${b.text ? `<div class="anno-text">${parseMarkdown(b.text)}</div>` : ''}
                        ${b.image ? `<img src="${b.image}" class="anno-img">` : ''}
                    </div>
                `;
            });

            wrapper.innerHTML = `
                ${anno.cover ? `<img src="${anno.cover}" class="anno-cover">` : ''}
                <div class="anno-body">
                    <h2 class="anno-title">${anno.title || '（未輸入標題）'}</h2>
                    <div class="anno-date">${anno.date || '（日期）'}</div>
                    ${blocksHtml}
                </div>
            `;
        }

        function createNewAnnouncement() {
            const newAnno = { title: "新公告", date: new Date().toISOString().split('T')[0], cover: "", blocks: [{ subtitle: "", text: "", image: "" }] };
            allAnnouncements.unshift(newAnno);
            selectAnno(0);
            autoSave();
        }

        function deleteCurrent() {
            if (confirm("確定要刪除這則公告嗎？")) {
                allAnnouncements.splice(currentIndex, 1);
                currentIndex = -1;
                document.getElementById('editor-form').innerHTML = `
                    <div style="text-align:center; color:#94a3b8; margin-top:100px;">
                        <p>公告已刪除。</p>
                    </div>`;
                renderList();
                updatePreview();
                autoSave();
            }
        }

        function showJSON() {
            const output = { announcements: allAnnouncements };
            const jsonStr = JSON.stringify(output, null, 2);
            document.getElementById('json-output').value = jsonStr;
            document.getElementById('json-modal').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
