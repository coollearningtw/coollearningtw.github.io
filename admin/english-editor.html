<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>英文資料庫管理 - 酷學習</title>
    <link rel="icon" type="image/png" href="../images/logo-gold.png">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        /* --- 鎖定系統 CSS --- */
        #page-lock-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%); z-index: 999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .lock-content { text-align: center; user-select: none; }
        #lock-icon { width: 100px; height: 100px; cursor: pointer; fill: #0b76d1; margin-bottom: 25px; transition: transform 0.1s; }
        #lock-icon:active { transform: scale(0.9); }
        .lock-notice { font-size: 1.25rem; font-weight: 900; color: #334155; }
        body.locked-scrolling { overflow: hidden !important; height: 100vh !important; pointer-events: none; }
        #page-lock-mask { pointer-events: auto; }
        .unlocked-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }

        /* --- Editor 主要樣式 --- */
        body { padding-bottom: 120px; background-color: #f1f5f9; color: #334155; }
        .editor-tabs { display: flex; gap: 5px; margin: 20px 0; background: #e2e8f0; padding: 4px; border-radius: 8px; width: fit-content; }
        .tab-btn { padding: 8px 24px; border: none; background: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: #64748b; transition: 0.2s; font-size: 0.9rem; }
        .tab-btn.active { background: #fff; color: #0f172a; border: 1px solid #cbd5e1; }
        
        /* --- 拖曳排序相關樣式 --- */
        .source-block { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 25px; overflow: hidden; transition: transform 0.1s, border 0.2s; }
        .source-block[draggable="true"] { cursor: grab; }
        .source-block.dragging { opacity: 0.4; border: 2px dashed #0b76d1; transform: scale(0.98); }
        .source-block.drag-over { border-top: 5px solid #0b76d1; }

        .accordion-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; border-bottom: 1px solid #f1f3f5; }
        .lesson-container { display: none; padding: 10px 15px 20px; background: #f8fafc; }
        .source-block.expanded > .lesson-container { display: block; }
        
        .lesson-block { border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px; background: #fff; position: relative; }
        
        /* 標題列佈局優化 */
        .lesson-header { 
            padding: 10px 15px; 
            border-bottom: 1px solid #f1f3f5; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .lesson-header:hover { background: #fdfdfd; }
        .lesson-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .cell-lesson-num { 
            min-width: 40px; 
            height: 28px;
            padding: 0 8px !important; 
            font-weight: bold; 
            color: #0f172a; 
            border: 1px solid #e2e8f0; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            white-space: nowrap;
            background: #f8fafc;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .lesson-title-cell {
            font-weight: 500; 
            font-size: 1rem;
            color: #1e293b;
            min-width: 100px;
            max-width: 400px; 
        }

        /* 狀態控制項樣式 */
        .status-group { display: flex; align-items: center; gap: 6px; background: #f8fafc; padding: 3px 8px; border-radius: 6px; border: 1px solid #e2e8f0; margin-left: 10px; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: #0f172a; transform: scale(1.2); }
        .c-red { background: #e57373; } .c-yellow { background: #ffb74d; } .c-green { background: #81c784; }
        .status-input { width: 70px; font-size: 11px; border: none; background: transparent; outline: none; font-weight: bold; padding: 0; color: #1e293b; }
        .status-toggle { font-size: 10px; font-weight: bold; cursor: pointer; padding: 2px 6px; border-radius: 4px; border: none; }
        .st-on { background: #dcfce7; color: #166534; }
        .st-off { background: #fee2e2; color: #991b1b; }

        .insert-bar { height: 12px; margin: -6px 0; position: relative; z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        .insert-bar:hover { opacity: 1; height: 24px; margin: -12px 0; }
        .insert-line { height: 1px; background: #94a3b8; flex: 1; }
        .insert-btn-text { background: #64748b; color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: bold; margin: 0 10px; }
        
        .data-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border: 1px solid #f1f3f5; border-radius: 6px; background: #fff; margin-bottom: 5px; }
        .editable-cell { padding: 8px 10px; border-radius: 4px; cursor: text; min-height: 36px; border: 1px solid transparent; transition: 0.2s; }
        .editable-cell:hover { background: #f8fafc; border-color: #e2e8f0; }
        
        .cell-pos { color: #0369a1; background: #f0f9ff; border: 1px solid #e0f2fe; font-size: 0.85rem; font-weight: bold; width: fit-content; border-radius: 4px; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
        .cell-trans { color: #475569; background: #f8fafc; border: 1px dashed #cbd5e1; font-size: 0.9rem; margin-top: 5px; }
        
        .btn-add-item-bottom { width: 100%; margin-top: 10px; padding: 12px; border: 2px dashed #cbd5e1; background: #f8fafc; color: #64748b; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .floating-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn-action { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: #475569; }
        .btn-primary { background: #0f172a; color: #fff; border: none; }
        
        .inline-textarea, .inline-input { width: 100%; border: 2px solid #0b76d1; border-radius: 4px; outline: none; font-family: inherit; box-sizing: border-box; background: #fff; font-size: 1rem; }
        .inline-input-title { width: 300px; } 
        .inline-textarea { resize: vertical; min-height: 80px; }
        
        .pos-popover {
            position: absolute; z-index: 2000; background: #fff; border: 1.5px solid #cbd5e1; border-radius: 8px;
            box-shadow: 0 4px 16px 0 rgba(0,0,0,0.08); padding: 10px 12px; display: none; flex-wrap: wrap; gap: 6px; min-width: 180px; max-width: 260px;
        }
        .pos-popover.active { display: flex; }
        .pos-btn { font-size: 12px; padding: 3px 10px; border: 1px solid #cbd5e1; background: #f8fafc; border-radius: 5px; cursor: pointer; margin: 2px 0; transition: background 0.15s, border 0.15s; }
        .pos-btn.selected { background: #0b76d1; color: #fff; border-color: #0b76d1; }
        .pos-btn:hover { background: #e0f2fe; border-color: #0b76d1; }
        
        .svg-icon { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
        .back-link { display: flex; align-items: center; text-decoration: none; color: var(--primary) !important; margin-right: 10px; }
        #json-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .json-box { background: #fff; padding: 30px; border-radius: 16px; width: 90%; max-width: 800px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        textarea#json-output { width: 100%; height: 400px; font-family: monospace; font-size: 0.85rem; padding: 15px; background: #0f172a; color: #38bdf8; border: none; border-radius: 8px; resize: none; }
        
        .floating-helper { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #cbd5e1; padding: 10px 15px; border-radius: 12px; z-index: 100; display: flex; align-items: center; gap: 10px; }
        .helper-label { font-size: 0.75rem; font-weight: bold; color: #64748b; margin-right: 5px; }
        .copy-chip { padding: 4px 10px; background: #f1f5f9; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-weight: bolder; }
        .copy-chip:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>
    <div id="page-lock-mask">
        <div class="lock-content">
            <svg id="lock-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
            </svg>
            <div class="lock-notice">此功能僅提供給部分用戶使用</div>
            <a href="../index.html" style="color: white; text-decoration: none; background-color: #0b76d1; height: 40px; margin-top: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: center;">回到首頁</a>
        </div>
    </div>

    <header>
        <div class="logo">
            <a href="index.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <img src="../images/logo.png" alt="Logo" height="40">
            <span style="font-weight:bold; color:var(--primary);">英文資料庫管理</span>
        </div>
    </header>

    <div class="page-container">
        <div class="editor-tabs">
            <button class="tab-btn active" id="tab-words" onclick="switchTab('words')">單字庫 (Words)</button>
            <button class="tab-btn" id="tab-textbook" onclick="switchTab('textbook')">課文庫 (Textbook)</button>
        </div>
        <button class="btn-action btn-primary" style="margin-bottom:20px" onclick="addNewSource()">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> 新增版本
        </button>
        <div id="editor-content"></div>
    </div>

    <div class="floating-footer">
        <div id="status" style="color:#64748b;font-size:0.85rem">就緒</div>
        <div class="floating-helper">
            <span class="helper-label">快捷複製：</span>
            <div class="copy-chip" onclick="copyMarker('…')">…</div>
        </div>

        <div id="toast">已複製</div>
        <div style="display:flex;gap:10px">
            <button class="btn-action" onclick="resetDraft()">重置暫存</button>
            <button class="btn-action" onclick="showJSON()">複製 JSON</button>
            <button class="btn-action btn-primary" onclick="downloadJSON()">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> 下載 JSON
            </button>
        </div>
    </div>

    <div id="json-modal">
        <div class="json-box">
            <h3 style="margin-top:0;">複製 JSON 到 GitHub</h3>
            <p id="json-tip" style="color:#64748b; font-size:0.9rem;">請覆蓋對應的檔案內容。</p>
            <textarea id="json-output" readonly></textarea>
            <div style="margin-top:20px; text-align:right;">
                <button class="btn btn-outline" onclick="document.getElementById('json-modal').style.display='none'">關閉視窗</button>
            </div>
        </div>
    </div>

    <script src="../scripts/utils.js"></script>
    <script src="../scripts/admin-lock.js"></script>
    <script>
        let currentMode = 'words', dataStore = { words: { sources: [] }, textbook: { sources:[] } }, expandedKeys = new Set();
        let draggedSourceIdx = null; // 記錄拖拽中的版本索引

        const POS_LIST = ["n.", "n. [C]", "n. [U]", "n. [C][U]", "v.", "vi.", "vt.", "adj.", "adv.", "prep.", "conj.", "pron.", "int.", "phr."];
        const ICONS = {
            folder: '<svg class="svg-icon" style="color:#64748b" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>',
            file: '<svg class="svg-icon" style="color:#94a3b8" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
            drag: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>',
            close: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>',
            plus: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'
        };

        async function init() {
            const draftW = localStorage.getItem('english_words_draft'), draftT = localStorage.getItem('english_textbook_draft');
            dataStore.words = draftW ? JSON.parse(draftW) : await (await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english.json')).json();
            dataStore.textbook = draftT ? JSON.parse(draftT) : await (await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english-textbook.json')).json();
            render();
        }

        function switchTab(m) { currentMode = m; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.id===`tab-${m}`)); render(); }

        function updateStatus(sIdx, lIdx, field, value, shouldRender) {
            const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
            const lesson = db.sources[sIdx].lessons[lIdx];
            lesson[field] = value;
            db.sources[sIdx].lessons[lIdx] = { lesson: lesson.lesson, title: lesson.title, status: lesson.status || "", statusColor: lesson.statusColor || "yellow", enabled: lesson.enabled !== false, ...lesson };
            sync(); 
            if(shouldRender) render(); 
        }

        // --- 積木編輯器邏輯 ---
        function addBlock(s, l, i, type) {
            const item = dataStore.words.sources[s].lessons[l].vocabulary[i];
            if (!item.blocks) item.blocks =[];
            if (type === 'text') item.blocks.push({ type: 'text', content: '文字' });
            else item.blocks.push({ type: 'blank', answer: '' });
            sync(); render();
        }
        function updateBlock(s, l, i, bIdx, field, val) {
            dataStore.words.sources[s].lessons[l].vocabulary[i].blocks[bIdx][field] = val;
            sync();
        }
        function delBlock(s, l, i, bIdx) {
            dataStore.words.sources[s].lessons[l].vocabulary[i].blocks.splice(bIdx, 1);
            sync(); render();
        }

        // --- 拖曳排序事件處理 ---
        function handleDragStart(e, index) {
            draggedSourceIdx = index;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetIdx) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (draggedSourceIdx === null || draggedSourceIdx === targetIdx) return;

            const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
            const [movedItem] = db.sources.splice(draggedSourceIdx, 1);
            db.sources.splice(targetIdx, 0, movedItem);

            expandedKeys.clear(); // 避免索引混亂，重置展開狀態
            sync();
            render();
            draggedSourceIdx = null;
        }

        function render() {
            const root = document.getElementById('editor-content'); root.innerHTML = '';
            const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
            db.sources.forEach((src, sIdx) => {
                const srcKey = `source-${sIdx}`;
                const srcEl = document.createElement('div'); 
                srcEl.className = `source-block ${expandedKeys.has(srcKey)?'expanded':''}`;
                
                // 設置拖曳屬性
                srcEl.draggable = true;
                srcEl.ondragstart = (e) => handleDragStart(e, sIdx);
                srcEl.ondragover = (e) => handleDragOver(e);
                srcEl.ondragleave = (e) => handleDragLeave(e);
                srcEl.ondrop = (e) => handleDrop(e, sIdx);
                srcEl.ondragend = (e) => e.currentTarget.classList.remove('dragging');

                srcEl.innerHTML = `<div class="accordion-header" onclick="toggleKey('${srcKey}')">
                    <div style="font-weight:600;display:flex;align-items:center;gap:8px;">
                        <span class="drag-handle" style="color:#cbd5e1; cursor:grab;">${ICONS.drag}</span>
                        ${ICONS.folder} ${src.name}
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-action" style="padding:4px 8px" onclick="event.stopPropagation();editSrc(${sIdx})">改名</button>
                        <button class="btn-action" style="padding:4px 8px;color:#ef4444" onclick="event.stopPropagation();delSrc(${sIdx})">刪除</button>
                    </div>
                </div>
                <div class="lesson-container">
                    ${src.lessons.map((l, lIdx) => {
                        const lKey = `l-${sIdx}-${lIdx}`;
                        const items = currentMode === 'words' ? (l.vocabulary || []) : (l.sentences ||[]);
                        const label = currentMode === 'words' ? '單字' : '段落';
                        return `<div class="lesson-block">
                            <div class="lesson-header" onclick="event.stopPropagation();toggleKey('${lKey}')">
                                <div class="lesson-header-left">
                                    ${ICONS.file}
                                    <div class="editable-cell cell-lesson-num" onclick="event.stopPropagation();startEdit(this,${sIdx},${lIdx},-1,'lesson')">${l.lesson}</div>
                                    <div class="editable-cell lesson-title-cell" onclick="event.stopPropagation();startEdit(this,${sIdx},${lIdx},-1,'title')">${parseMarkdown(l.title)}</div>
                                    <div class="status-group" onclick="event.stopPropagation()">
                                        <input type="text" class="status-input" placeholder="橫幅文字" value="${l.status || ''}" oninput="updateStatus(${sIdx}, ${lIdx}, 'status', this.value, false)">
                                        <div class="color-dot c-red ${l.statusColor==='red'?'active':''}" onclick="updateStatus(${sIdx}, ${lIdx}, 'statusColor', 'red', true)"></div>
                                        <div class="color-dot c-yellow ${(!l.statusColor || l.statusColor==='yellow')?'active':''}" onclick="updateStatus(${sIdx}, ${lIdx}, 'statusColor', 'yellow', true)"></div>
                                        <div class="color-dot c-green ${l.statusColor==='green'?'active':''}" onclick="updateStatus(${sIdx}, ${lIdx}, 'statusColor', 'green', true)"></div>
                                        <button class="status-toggle ${l.enabled!==false?'st-on':'st-off'}" onclick="updateStatus(${sIdx}, ${lIdx}, 'enabled', ${l.enabled!==false?false:true}, true)">${l.enabled!==false ? '已上架' : '未開放'}</button>
                                    </div>
                                </div>
                                <button class="btn-action" style="padding:2px 6px;color:#ef4444;border:none;flex-shrink:0;" onclick="event.stopPropagation();delLes(${sIdx},${lIdx})">${ICONS.close}</button>
                            </div>
                        <div style="display:${expandedKeys.has(lKey)?'block':'none'};padding:10px;">
                            ${createInsertBarHtml(sIdx, lIdx, 0)}
                            ${items.map((item, iIdx) => `<div class="data-item"><div class="drag-handle" style="color:#e2e8f0;">${ICONS.drag}</div><div style="flex:1">
                                ${currentMode === 'words' ? `<div style="display:grid;grid-template-columns:180px 100px 1fr;gap:10px"><div class="editable-cell" style="font-weight:bold" onclick="startEdit(this,${sIdx},${lIdx},${iIdx},'word')">${parseMarkdown(item.word)}</div><div class="editable-cell cell-pos" onclick="startEdit(this,${sIdx},${lIdx},${iIdx},'pos')">${item.pos||'(Pos)'}</div><div class="editable-cell" onclick="startEdit(this,${sIdx},${lIdx},${iIdx},'chinese')">${parseMarkdown(item.chinese)}</div></div>
${item.pos === 'phr.' ? `
    <div style="margin-top:10px; background:#f8fafc; padding:10px; border-radius:6px; border:1px solid #e2e8f0;">
        <div style="font-size:0.7rem; color:#64748b; margin-bottom:5px; font-weight:bold;">積木填空設定:</div>
        <div style="display:flex; gap:5px; flex-wrap:wrap; align-items:center;">
            ${(item.blocks||[]).map((b, bIdx) => `
                <div style="display:flex; align-items:center; background:#fff; border:1px solid #cbd5e1; padding:2px; border-radius:4px;">
                    ${b.type === 'text' 
                        ? `<input class="inline-input" style="width:auto; min-width:60px; border:none;" value="${b.content}" onchange="updateBlock(${sIdx},${lIdx},${iIdx},${bIdx},'content',this.value)">`
                        : `<input class="inline-input" style="width:80px; border:none; border-bottom:2px solid #059669; background:#ecfdf5" value="${b.answer}" placeholder="答案" onchange="updateBlock(${sIdx},${lIdx},${iIdx},${bIdx},'answer',this.value)">`
                    }
                    <button class="btn-action" style="padding:0 5px; color:#ef4444; border:none; background:transparent; font-weight:bold;" onclick="delBlock(${sIdx},${lIdx},${iIdx},${bIdx})">✕</button>
                </div>
            `).join('')}
            <div style="display:flex; gap:2px;">
                <button class="btn-action" style="padding:2px 8px" onclick="addBlock(${sIdx},${lIdx},${iIdx},'text')">+</button>
                <button class="btn-action" style="padding:2px 8px; border-color:#059669; color:#059669" onclick="addBlock(${sIdx},${lIdx},${iIdx},'blank')">填空</button>
            </div>
        </div>
    </div>` : ''}` : 
                                `<div style="display:flex; flex-direction:column; gap:4px"><div class="editable-cell" onclick="startEdit(this,${sIdx},${lIdx},${iIdx},'en')">${parseMarkdown(item.en)}</div><div class="editable-cell cell-trans" onclick="startEdit(this,${sIdx},${lIdx},${iIdx},'ch')">${parseMarkdown(item.ch)}</div></div>`}
                            </div><button class="btn-action" style="border:none;color:#ef4444" onclick="delItem(${sIdx},${lIdx},${iIdx})">${ICONS.close}</button></div>${createInsertBarHtml(sIdx, lIdx, iIdx + 1)}`).join('')}
                            <button class="btn-add-item-bottom" onclick="addItem(${sIdx},${lIdx},${items.length})">${ICONS.plus} 新增${label}</button>
                        </div></div>`;
                    }).join('')}
                    <button class="btn-action" style="margin-top:20px;width:100%;justify-content:center;border-style:dashed" onclick="addLes(${sIdx})">${ICONS.plus} 新增課程單元</button>
                </div>`;
                root.appendChild(srcEl);
            });
        }

        function createInsertBarHtml(sIdx, lIdx, atIndex) { const label = currentMode === 'words' ? '單字' : '句子'; return `<div class="insert-bar" onclick="addItem(${sIdx}, ${lIdx}, ${atIndex})"><div class="insert-line"></div><div class="insert-btn-text">+ 在此插入${label}</div><div class="insert-line"></div></div>`; }
        function toggleKey(k) { expandedKeys.has(k) ? expandedKeys.delete(k) : expandedKeys.add(k); render(); }
        
        function startEdit(el, s, l, i, f) {
            document.querySelectorAll('.editing-cell').forEach(cell => {
                const input = cell.querySelector('input, textarea');
                if (input) input.blur();
                const idx = cell.dataset;
                if (idx) {
                    const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
                    let val = '';
                    if (idx.i === '-1') { val = db.sources[+idx.s].lessons[+idx.l][idx.f]; }
                    else { val = currentMode === 'words' ? db.sources[+idx.s].lessons[+idx.l].vocabulary[+idx.i][idx.f] : db.sources[+idx.s].lessons[+idx.l].sentences[+idx.i][idx.f]; }
                    if (idx.f === 'word') cell.innerHTML = parseMarkdown(val);
                    else if (idx.f === 'pos') cell.innerHTML = val || '(Pos)';
                    else if (idx.f === 'chinese') cell.innerHTML = parseMarkdown(val);
                    else if (idx.f === 'en') cell.innerHTML = parseMarkdown(val);
                    else if (idx.f === 'ch') cell.innerHTML = parseMarkdown(val);
                    else if (idx.f === 'lesson') cell.innerHTML = val;
                    else if (idx.f === 'title') cell.innerHTML = parseMarkdown(val);
                }
                cell.classList.remove('editing-cell');
            });

            el.classList.add('editing-cell');
            el.dataset.s = s; el.dataset.l = l; el.dataset.i = i; el.dataset.f = f;

            const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
            const rawVal = i === -1 ? db.sources[s].lessons[l][f] : (currentMode === 'words' ? db.sources[s].lessons[l].vocabulary[i][f] : db.sources[s].lessons[l].sentences[i][f]);

            const useInput = (currentMode === 'words' && (f === 'word' || f === 'pos' || f === 'chinese')) || f === 'lesson' || f === 'title';

            if (useInput) {
                const inputClass = (f === 'title') ? 'inline-input inline-input-title' : 'inline-input';
                el.innerHTML = `<input type=\"text\" class=\"${inputClass}\" value=\"${rawVal||''}\">`;
                if (f === 'pos') {
                    const input = el.querySelector('input');
                    input.addEventListener('focus', function(e) { hidePosPopover(); showPosPopover(input, s, l, i); });
                }
            } else {
                el.innerHTML = `<textarea class=\"inline-textarea\">${rawVal||''}</textarea>`;
            }

            const inputEl = el.querySelector('input, textarea');
            inputEl.focus();

            const save = (valOverride) => {
                const newVal = typeof valOverride === 'string' ? valOverride : inputEl.value;
                if (i === -1) {
                    if (f === 'lesson') { db.sources[s].lessons[l][f] = isNaN(Number(newVal)) ? newVal : Number(newVal); }
                    else { db.sources[s].lessons[l][f] = newVal; }
                } else { 
                    const arr = currentMode === 'words' ? db.sources[s].lessons[l].vocabulary : db.sources[s].lessons[l].sentences; 
                    arr[i][f] = newVal; 
                }
                sync();
            };

            inputEl.addEventListener('input', () => save());
            inputEl.addEventListener('keydown', (e) => { if(e.key === 'Enter') { e.preventDefault(); save(); inputEl.blur(); } });
            inputEl.addEventListener('focus', () => { if (f !== 'pos') hidePosPopover(); });
            inputEl.addEventListener('blur', () => {
                el.classList.remove('editing-cell');
                let val2 = inputEl.value;
                if (f === 'word') el.innerHTML = parseMarkdown(val2);
                else if (f === 'pos') el.innerHTML = val2 || '(Pos)';
                else if (f === 'chinese') el.innerHTML = parseMarkdown(val2);
                else if (f === 'en') el.innerHTML = parseMarkdown(val2);
                else if (f === 'ch') el.innerHTML = parseMarkdown(val2);
                else if (f === 'lesson') el.innerHTML = val2;
                else if (f === 'title') el.innerHTML = parseMarkdown(val2);
                save(val2);
            });
        }

        function hidePosPopover() { const pop = document.getElementById('pos-popover'); if (pop) { pop.classList.remove('active'); window._posPopoverActive = false; } }
        function showPosPopover(input, s, l, i) {
            let pop = document.getElementById('pos-popover');
            if (!pop) { pop = document.createElement('div'); pop.id = 'pos-popover'; pop.className = 'pos-popover'; document.body.appendChild(pop); }
            pop.innerHTML = '';
            const val = input.value.trim();
            let parts = val ? val.split(/\s+/) :[];
            POS_LIST.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'pos-btn' + (parts.includes(p) ? ' selected' : '');
                btn.innerText = p;
                btn.onmousedown = (e) => {
                    e.preventDefault();
                    let v = input.value.trim();
                    let arr = v ? v.split(/\s+/) :[];
                    if (arr.includes(p)) arr = arr.filter(x => x !== p); else arr.push(p);
                    input.value = arr.join(' ');
                    const db = currentMode === 'words' ? dataStore.words : dataStore.textbook;
                    if(i===-1) { db.sources[s].lessons[l][f] = input.value; } 
                    else { const arr2 = currentMode==='words' ? db.sources[s].lessons[l].vocabulary : db.sources[s].lessons[l].sentences; arr2[i][f] = input.value; }
                    sync(); showPosPopover(input, s, l, i);
                };
                pop.appendChild(btn);
            });
            const rect = input.getBoundingClientRect();
            pop.style.left = (window.scrollX + rect.left) + 'px';
            pop.style.top = (window.scrollY + rect.bottom + 4) + 'px';
            pop.classList.add('active');
            window._posPopoverActive = true;
            function hidePopover(e) { if (!pop.contains(e.target) && e.target !== input) { pop.classList.remove('active'); window._posPopoverActive = false; document.removeEventListener('mousedown', hidePopover); } }
            setTimeout(() => { document.addEventListener('mousedown', hidePopover); }, 0);
        }

        function sync() { 
            localStorage.setItem('english_words_draft', JSON.stringify(dataStore.words)); 
            localStorage.setItem('english_textbook_draft', JSON.stringify(dataStore.textbook)); 
            document.getElementById('status').innerHTML = '💾 已自動暫存'; 
        }

        function editSrc(s) { const db=currentMode==='words'?dataStore.words:dataStore.textbook; const n=prompt('名稱:', db.sources[s].name); if(n){ db.sources[s].name=n; sync(); render(); }}
        function delSrc(s) { const db=currentMode==='words'?dataStore.words:dataStore.textbook; if(confirm('刪除版本？')){ db.sources.splice(s,1); sync(); render(); }}
        function addLes(s) { const db=currentMode==='words'?dataStore.words:dataStore.textbook; db.sources[s].lessons.push({lesson: db.sources[s].lessons.length+1, title:'New Lesson', vocabulary:[], sentences:[]}); sync(); render(); }
        function delLes(s, l) { const db=currentMode==='words'?dataStore.words:dataStore.textbook; if(confirm('刪除單元？')) { db.sources[s].lessons.splice(l, 1); sync(); render(); } }
        function addItem(s, l, atIndex) {
            const db=currentMode==='words'?dataStore.words:dataStore.textbook; 
            const arr = currentMode==='words' ? db.sources[s].lessons[l].vocabulary : db.sources[s].lessons[l].sentences;
            if (!arr) { if (currentMode === 'words') db.sources[s].lessons[l].vocabulary =[]; else db.sources[s].lessons[l].sentences =[]; }
            const newItem = currentMode === 'words' ? {word:'',pos:'',chinese:''} : {en:'',ch:''};
            arr.splice(atIndex, 0, newItem); sync(); render();
        }
        function delItem(s, l, i) { const db=currentMode==='words'?dataStore.words:dataStore.textbook; const arr = currentMode==='words'?db.sources[s].lessons[l].vocabulary:db.sources[s].lessons[l].sentences; arr.splice(i,1); sync(); render(); }
        function addNewSource() { const db=currentMode==='words'?dataStore.words:dataStore.textbook; db.sources.push({name:'New Source', lessons:[]}); sync(); render(); }
        function resetDraft() { if(confirm('還原修改？')){ localStorage.removeItem('english_words_draft'); localStorage.removeItem('english_textbook_draft'); location.reload(); } }
        
        function showJSON() {
            const isWords = currentMode === 'words';
            const targetData = isWords ? dataStore.words : dataStore.textbook;
            document.getElementById('json-output').value = JSON.stringify(targetData, null, 2);
            document.getElementById('json-modal').style.display = 'flex';
        }
        
        function downloadJSON() { const db=currentMode==='words'?dataStore.words:dataStore.textbook; const filename=currentMode==='words'?'english.json':'english-textbook.json'; const b = new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=filename; a.click(); }
        function copyMarker(text) { navigator.clipboard.writeText(text).then(() => { const toast = document.getElementById('toast'); toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 2000); }); }
        
        init();
    </script>
</body>
</html>
