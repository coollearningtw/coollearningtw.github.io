<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台總覽 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="icon" type="image/png" href="../images/logo-gold.png">
    <style>
        body { background-color: #f8fafc; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        .admin-card { background: #fff; border-radius: 20px; padding: 30px; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .admin-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #0b76d1; }
        .card-icon { width: 60px; height: 60px; margin-bottom: 20px; fill: #0b76d1; }
        .card-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; margin-bottom: 10px; }
        .card-desc { font-size: 0.9rem; color: #64748b; text-align: center; line-height: 1.5; }

        /* 鎖定系統 CSS */
        #page-lock-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(25px) saturate(160%); -webkit-backdrop-filter: blur(25px) saturate(160%); z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease, visibility 0.6s; }
        .lock-content { text-align: center; user-select: none; }
        #lock-icon { width: 100px; height: 100px; cursor: pointer; fill: #0b76d1; margin-bottom: 25px; transition: transform 0.1s; }
        .lock-notice { font-size: 1.2rem; font-weight: 900; color: #334155; }
        body.locked-scrolling { overflow: hidden !important; height: 100vh !important; pointer-events: none; }
        #page-lock-mask { pointer-events: auto; }
        .unlocked-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
    </style>
</head>
<body>
    <!-- 鎖定遮罩 HTML -->
    <div id="page-lock-mask">
        <div class="lock-content">
            <svg id="lock-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
            <div class="lock-notice">此功能僅提供給部分用戶使用</div>
        </div>
    </div>

    <header>
        <div class="logo">
            <a href="../index.html" class="back-link">⬅</a>
            <span style="font-weight:bold; color:var(--primary);">管理員控制台</span>
        </div>
    </header>

    <div class="page-container">
        <div class="dashboard-grid">
            <a href="anno-editor.html" class="admin-card">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg>
                <div class="card-title">公告管理</div>
                <div class="card-desc">發布新公告、編輯系統通知或更新首頁輪播內容。</div>
            </a>
            <a href="changelog-editor.html" class="admin-card">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M13 3H6c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V9l-7-7zm0 1.5L18.5 10H13V4.5zM6 19.5v-15h6v6h6v9H6z"/></svg>
                <div class="card-title">更新日誌管理</div>
                <div class="card-desc">紀錄版本更迭、新增功能與修復細節。</div>
            </a>
            <a href="english-editor.html" class="admin-card">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M11.5 4L6 20h2.2l1.1-4h5.4l1.1 4H18L12.5 4h-1M10 13l2-6 2 6h-4z"/></svg>
                <div class="card-title">英文資料管理</div>
                <div class="card-desc">編輯單字庫、課文段落與翻譯測驗內容。</div>
            </a>
            <a href="chinese-editor.html" class="admin-card">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M3 3v17a1 1 0 001 1h17v-2H5V3H3m15.25 6.75c.41-.41.41-1.09 0-1.5l-1.5-1.5c-.41-.41-1.09-.41-1.5 0l-8.25 8.25V18h2.25l8.25-8.25m-8.5 5l-3 3 3 3h10v-6h-10z"/></svg>
                <div class="card-title">國文資料管理</div>
                <div class="card-desc">編輯註釋背誦、課文內容與段落解析。</div>
            </a>
        </div>
    </div>

    <!-- 引用外部化的鎖定邏輯 JS -->
    <script src="../scripts/admin-lock.js"></script>
</body>
</html>
