<!DOCTYPE html>
<html>
<head><title>Data Bridge</title></head>
<body>
<script>
    // 只有允許的來源可以存取資料（請換成你的網站 B 網址）
    const ALLOWED_ORIGIN = "https://nextsteptw.github.io";

    window.addEventListener("message", (event) => {
        if (event.origin !== ALLOWED_ORIGIN) return;

        const { action, key, value } = event.data;

        if (action === "GET") {
            const data = localStorage.getItem(key);
            event.source.postMessage({ action: "RECEIVE", key, value: data }, event.origin);
        } else if (action === "SET") {
            localStorage.setItem(key, value);
        }
    });
</script>
</body>
</html>
