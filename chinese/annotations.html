<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>註釋背誦</title>

<style>
body { font-family: sans-serif; background:#f8fafc; }
.anno-item { padding:15px; border:1px solid #ddd; margin:10px; background:#fff; cursor:pointer; }
.term { font-weight:bold; font-size:18px; }
.meaning { display:none; margin-top:8px; color:#555; }
.meaning.show { display:block; }
.error { color:red; text-align:center; margin-top:20px; }
</style>
</head>

<body>
<h2 style="text-align:center;">註釋</h2>
<button id="toggle-all">顯示全部</button>
<div id="anno-list"></div>

<script>
const URL = "https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/chinese.json";

async function init() {
    const root = document.getElementById("anno-list");

    const sel = JSON.parse(localStorage.getItem("sel_chinese_lessons") || "[]");
    console.log("選課:", sel);

    if (sel.length === 0) {
        root.innerHTML = "<div class='error'>⚠️ 請先回選課頁選擇課程</div>";
        return;
    }

    try {
        const res = await fetch(URL);
        if (!res.ok) throw new Error("HTTP錯誤 " + res.status);

        const text = await res.text();
        console.log("原始資料:", text.slice(0,100));

        const dataRaw = JSON.parse(text);
        const data = dataRaw.sources || dataRaw;

        let found = false;

        data.forEach(src => {
            (src.lessons || []).forEach(l => {
                if (sel.some(s => s.source === src.name && s.lesson == l.lesson)) {
                    (l.annotations || []).forEach(a => {
                        found = true;
                        const el = document.createElement("div");
                        el.className = "anno-item";
                        el.innerHTML = `
                            <div class="term">${a.term}</div>
                            <div class="meaning">${a.meaning}</div>
                        `;
                        el.onclick = () => {
                            el.querySelector(".meaning").classList.toggle("show");
                        };
                        root.appendChild(el);
                    });
                }
            });
        });

        if (!found) {
            root.innerHTML = "<div class='error'>⚠️ 沒有符合的註釋資料</div>";
        }

    } catch (e) {
        console.error(e);
        root.innerHTML = "<div class='error'>❌ 資料載入失敗</div>";
    }
}

document.getElementById("toggle-all").onclick = function() {
    const show = this.classList.toggle("active");
    document.querySelectorAll(".meaning").forEach(m => {
        m.classList.toggle("show", show);
    });
};

init();
</script>
</body>
</html>
