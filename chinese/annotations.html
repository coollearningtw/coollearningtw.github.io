<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文科 - 註釋背誦</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        .list-container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .anno-item { padding: 18px 20px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: flex-start; gap: 15px; border: 1px solid #e2e8f0; box-shadow: none; background: #fff; }
        .id-badge { background: #ef4444; color: #fff; font-size: 0.8rem; min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; margin-top: 2px; }
        .content-side { flex: 1; }
        .term { font-size: 1.25rem; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        .meaning { font-size: 1.05rem; color: #475569; display: none; border-top: 1px solid #f1f3f5; padding-top: 10px; margin-top: 5px; line-height: 1.6; }
        .meaning.show { display: block; }
        header { justify-content: space-between; border-bottom: 1px solid #e2e8f0; box-shadow: none; background: #fff; }
        .btn-tool { padding: 5px 15px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; font-weight: bold; font-size: 0.85rem; color: #64748b; }
        .btn-tool.active { background: #f1f5f9; color: #0f172a; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="chinese.html" class="back-link"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a></div>
        <div style="font-weight:bold">註釋背誦</div>
        <button id="toggle-all" class="btn-tool">顯示解釋</button>
    </header>
    <div class="page-container"><div id="anno-list" class="list-container"></div></div>
    <script>
        async function init() {
            const sel = JSON.parse(localStorage.getItem('sel_chinese_lessons') || '[]');
            const res = await fetch('../data/chinese.json');
            const data = await res.json();
            const root = document.getElementById('anno-list');

            data.sources.forEach(src => src.lessons.forEach(l => {
                if (sel.some(s => s.source === src.name && s.lesson === l.lesson)) {
                    l.annotations.forEach(a => {
                        const el = document.createElement('div');
                        el.className = 'std-card anno-item';
                        el.innerHTML = `
                            <div class="id-badge">${a.id}</div>
                            <div class="content-side">
                                <div class="term">${a.term}</div>
                                <div class="meaning">${a.meaning}</div>
                            </div>
                        `;
                        el.onclick = () => el.querySelector('.meaning').classList.toggle('show');
                        root.appendChild(el);
                    });
                }
            }));
            document.getElementById('toggle-all').onclick = function() {
                const active = this.classList.toggle('active');
                document.querySelectorAll('.meaning').forEach(m => m.classList.toggle('show', active));
            };
        }
        init();
    </script>
</body>
</html>
