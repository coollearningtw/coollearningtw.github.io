<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課文閱讀</title>

<style>
body { font-family:sans-serif; background:#f8fafc; }
.card { background:#fff; margin:10px; padding:15px; border:1px solid #ddd; }
.text { font-size:18px; line-height:1.8; }
.note { color:red; display:none; }
.note.show { display:block; }
.trans { color:#555; display:none; margin-top:10px; }
.trans.show { display:block; }
.error { color:red; text-align:center; margin-top:20px; }
.link { color:blue; cursor:pointer; }
</style>
</head>

<body>
<h2 style="text-align:center;">課文</h2>
<button id="toggle-note">註記</button>
<button id="toggle-trans">翻譯</button>

<div id="root"></div>

<script>
const URL = "https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/chinese.json";

let annotations = [];

async function init() {
    const root = document.getElementById("root");

    const sel = JSON.parse(localStorage.getItem("sel_chinese_lessons") || "[]");
    console.log("選課:", sel);

    if (sel.length === 0) {
        root.innerHTML = "<div class='error'>⚠️ 請先選課</div>";
        return;
    }

    try {
        const res = await fetch(URL);
        if (!res.ok) throw new Error("HTTP錯誤");

        const dataRaw = await res.json();
        const data = dataRaw.sources || dataRaw;

        let found = false;

        data.forEach(src => {
            (src.lessons || []).forEach(l => {
                if (sel.some(s => s.source === src.name && s.lesson == l.lesson)) {

                    annotations = annotations.concat(l.annotations || []);

                    (l.content || []).forEach(c => {
                        found = true;

                        const div = document.createElement("div");
                        div.className = "card";

                        div.innerHTML = `
                            <div class="text">${c.text || ""}</div>
                            <div class="note">${c.note || ""}</div>
                            <div class="trans">${c.translation || ""}</div>
                        `;

                        root.appendChild(div);
                    });
                }
            });
        });

        if (!found) {
            root.innerHTML = "<div class='error'>⚠️ 沒有課文資料</div>";
        }

    } catch (e) {
        console.error(e);
        root.innerHTML = "<div class='error'>❌ 載入失敗</div>";
    }
}

// 全部顯示
document.getElementById("toggle-note").onclick = function() {
    const active = this.classList.toggle("active");
    document.querySelectorAll(".note").forEach(n => n.classList.toggle("show", active));
};

document.getElementById("toggle-trans").onclick = function() {
    const active = this.classList.toggle("active");
    document.querySelectorAll(".trans").forEach(t => t.classList.toggle("show", active));
};

init();
</script>
</body>
</html>
