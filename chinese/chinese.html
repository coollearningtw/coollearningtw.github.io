<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文科 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="icon" type="image/x-icon" href="../images/logo-gold.png">
    <style>
        :root { --primary: #e74c3c; --primary-light: #fdedec; }
        body { background-color: #f8fafc; }

        /* 頂部紅色標題列 - 匹配 English Hub 樣式 */
        .chinese-hub-header {
            background-color: #fee2e2; 
            border: 2px solid #fecaca;
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 980px;
            margin: 10px auto 25px;
        }

        .header-title {
            color: #b91c1c;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 頁面標題區 */
        .page-title-area {
            max-width: 980px;
            margin: 0 auto 30px;
            padding: 0 10px;
        }
        .page-title-area h2 { font-size: 1.6rem; color: #334155; margin-bottom: 5px; }
        .page-title-area p { color: #94a3b8; margin-top: 0; font-size: 0.95rem; }

        /* 入口網格佈局 (2x2) */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hub-card {
            background: #fff;
            border-radius: 24px;
            padding: 45px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #f1f5f9;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hub-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(231, 76, 60, 0.15);
            border-color: #fecaca;
        }

        .icon-circle {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px; background-color: var(--primary-light);
        }

        .icon-circle svg { width: 40px; height: 40px; fill: var(--primary); }

        .module-name { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 10px; }
        .module-desc { font-size: 0.95rem; color: #64748b; line-height: 1.6; max-width: 240px; }

        .card-tag {
            position: absolute; top: 15px; right: 15px; font-size: 0.7rem;
            font-weight: 700; padding: 4px 10px; border-radius: 8px;
            background: #f1f5f9; color: #94a3b8; text-transform: uppercase;
        }
        .tag-hot { background: #fee2e2; color: #ef4444; }

        @media (max-width: 768px) {
            .hub-grid { grid-template-columns: 1fr; padding: 0 20px; }
            .hub-card { padding: 35px 20px; }
        }
    </style>
</head>
<body>

    <div class="chinese-hub-header">
        <a href="../index.html" class="back-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div class="header-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3v17a1 1 0 001 1h17v-2H5V3H3m15.25 6.75c.41-.41.41-1.09 0-1.5l-1.5-1.5c-.41-.41-1.09-.41-1.5 0l-8.25 8.25V18h2.25l8.25-8.25m-8.5 5l-3 3 3 3h10v-6h-10z"/></svg>
            Chinese 國文學科
        </div>
    </div>

    <div class="page-container">
        <div class="page-title-area">
            <h2>古今文學探索</h2>
            <p>從課文註釋到成語典故，深耕您的文學素養</p>
        </div>
        
        <div class="hub-grid">
            <!-- 模組 1：學習教材 (獨立頁面) -->
            <a href="chinese-materials.html" class="hub-card">
                <div class="card-tag">Textbook</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                </div>
                <div class="module-name">學習教材</div>
                <div class="module-desc">同步校內課文、註釋背誦、作者介紹與賞析，支援自訂書架。</div>
            </a>

            <!-- 模組 2：成語圖鑑 -->
            <a href="idioms-list.html" class="hub-card">
                <div class="card-tag tag-hot">精選</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M4 9h16v2H4V9zm0 4h10v2H4v-2zm0-8h16v2H4V5zm0 12h16v2H4v-2z"/></svg>
                </div>
                <div class="module-name">成語圖鑑</div>
                <div class="module-desc">完整收錄常用成語資料庫，提供詳盡典故、注音與近反義詞。</div>
            </a>

            <!-- 模組 3：國文知識王 (預留) -->
            <a href="#" class="hub-card" style="opacity: 0.6; pointer-events: none;">
                <div class="card-tag">Coming Soon</div>
                <div class="icon-circle">
                    <span style="font-size: 2rem; font-weight: 900; color: var(--primary);">VS</span>
                </div>
                <div class="module-name">國文知識王</div>
                <div class="module-desc">即將推出：即時連線對戰，挑戰成語接龍與文學常識。</div>
            </a>

            <!-- 模組 4：作文實驗室 (預留) -->
            <a href="#" class="hub-card" style="opacity: 0.6; pointer-events: none;">
                <div class="card-tag">Coming Soon</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M21.7,13.35L20.7,14.35L18.65,12.3L19.65,11.3C19.86,11.09 20.21,11.09 20.42,11.3L21.7,12.58C21.91,12.79 21.91,13.14 21.7,13.35M12,18.94L18.06,12.88L20.11,14.93L14.06,21H12V18.94Z"/></svg>
                </div>
                <div class="module-name">作文實驗室</div>
                <div class="module-desc">提供範文分析、修辭技巧與精選佳句，強化寫作實力。</div>
            </a>
        </div>
    </div>
</body>
</html>
