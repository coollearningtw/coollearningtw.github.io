<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字知識王 Live - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-battle: #38bdf8;
            --host-color: #facc15;
            --bg-dark: #050810;
            --card-bg: #111827;
            --share-color: #10b981;
        }
        body { background-color: var(--bg-dark); color: #fff; margin: 0; font-family: "Noto Sans TC", sans-serif; overflow-x: hidden; }
        
        header { background-color: rgba(15, 23, 42, 0.9) !important; border-bottom: 1px solid #1e293b !important; }
        .header-title-area, .back-link { color: var(--primary-battle) !important; }

        .view-section { display: none; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .active-view { display: block; }
        .battle-card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }

        .btn-battle { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary-battle); color: #000; }
        .btn-sub { background: #1e293b; color: #fff; }
        .btn-share { background: var(--share-color); color: #fff; }
        
        input.battle-input { width: 100%; background: #050810; border: 2px solid #1e293b; color: #fff; padding: 12px; border-radius: 12px; text-align: center; font-size: 1.2rem; margin-bottom: 15px; box-sizing: border-box; }

        .scope-selector { max-height: 250px; overflow-y: auto; background: #050810; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; border: 1px solid #1e293b; }
        .version-name { color: var(--host-color); font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .lesson-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { padding: 6px 12px; background: #111827; border: 1px solid #1e293b; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .chip.selected { background: var(--primary-battle); color: #000; border-color: var(--primary-battle); }
        .num-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .num-btn { flex: 1; padding: 10px; background: #050810; border: 1px solid #1e293b; border-radius: 10px; color: #94a3b8; cursor: pointer; }
        .num-btn.active { border-color: var(--host-color); color: var(--host-color); background: rgba(250, 204, 21, 0.1); }

        .vs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card-bg); padding: 15px 25px; border-radius: 50px; border: 2px solid #1e293b; }
        .player-info { display: flex; flex-direction: column; align-items: center; width: 35%; }
        .player-score { font-family: monospace; font-size: 2.2rem; color: var(--host-color); font-weight: bold; }

        .timer-circle { position: relative; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .timer-circle svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        .timer-circle circle { fill: none; stroke-width: 5; stroke-linecap: round; }
        .timer-bg { stroke: #1e293b; }
        .timer-progress { stroke: var(--primary-battle); stroke-dasharray: 201; stroke-dashoffset: 0; transition: stroke-dashoffset 0.1s linear; }
        #timer-num { position: absolute; font-size: 1.6rem; font-weight: 900; }

        .progress-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #game-progress { width: 0%; height: 100%; background: var(--primary-battle); transition: 0.3s; }

        .q-card { background: #fff; color: #1e293b; border-radius: 24px; padding: 40px 20px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; }
        .q-word { font-size: 3.2rem; font-weight: 900; margin: 0; color: #0f172a; }
        .q-pos { font-size: 1.1rem; color: #64748b; font-weight: bold; margin-bottom: 10px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 22px; font-size: 1.3rem; font-weight: 800; border-radius: 18px; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; color: #1e293b; transition: 0.1s; }
        .opt-btn.correct { background: #10b981 !important; color: #fff !important; border-color: #059669; }
        .opt-btn.wrong { background: #ef4444 !important; color: #fff !important; border-color: #991b1b; }
        
        .overlay { position: fixed; inset: 0; background: rgba(5, 8, 16, 0.96); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .overlay h1 { font-size: 7rem; margin: 0; color: var(--primary-battle); }

        #qr-container { background: #fff; padding: 15px; border-radius: 16px; margin: 20px auto; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="english.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <span class="header-title-area">英文對戰競技場</span>
        </div>
    </header>

    <!-- 1. 入口選單 -->
    <div id="view-menu" class="view-section active-view">
        <div class="battle-card" style="text-align:center;">
            <h1 style="color:var(--primary-battle); font-size: 2.5rem; margin-bottom: 30px;">BATTLE ARENA</h1>
            <button class="btn-battle btn-main" onclick="switchView('view-create')">創建對決房間</button>
            <button class="btn-battle btn-sub" onclick="switchView('view-join')">加入好友房間</button>
        </div>
    </div>

    <!-- 2. 房主：設定範圍 -->
    <div id="view-create" class="view-section">
        <div class="battle-card">
            <h2 style="margin-top:0;">設定對決範圍</h2>
            <div class="scope-selector" id="scope-list">讀取教材中...</div>
            <div class="num-row">
                <button class="num-btn active" onclick="setNum(10, this)">10 題</button>
                <button class="num-btn" onclick="setNum(20, this)">20 題</button>
            </div>
            <input type="text" id="host-name" class="battle-input" placeholder="輸入你的暱稱">
            <button class="btn-battle btn-main" onclick="createRoom()">生成代碼並開啟</button>
            <button class="btn-battle btn-sub" onclick="switchView('view-menu')">返回</button>
        </div>
    </div>

    <!-- 3. 加入者 -->
    <div id="view-join" class="view-section">
        <div class="battle-card">
            <h2>加入好友房間</h2>
            <div id="scanner-container" style="display:none;">
                <div id="reader" style="width:100%; border-radius:12px; overflow:hidden; margin-bottom:15px;"></div>
                <button class="btn-battle btn-sub" onclick="stopScanner()">取消掃描</button>
            </div>
            <div id="join-form">
                <button class="btn-battle btn-sub" onclick="startScanner()" style="border: 1px dashed var(--primary-battle);">
                    掃描 QR Code 加入
                </button>
                <input type="text" id="input-code" class="battle-input" placeholder="請輸入 6 位數代碼">
                <input type="text" id="joiner-name" class="battle-input" placeholder="輸入你的暱稱">
                <button class="btn-battle btn-main" onclick="joinRoom()">進入房間</button>
                <button class="btn-battle btn-sub" onclick="switchView('view-menu')">返回</button>
            </div>
        </div>
    </div>

    <!-- 4. 等待大廳 -->
    <div id="view-lobby" class="view-section">
        <div class="battle-card">
            <div style="text-align:center; margin-bottom:20px;">
                <span style="color:#94a3b8;">房間代碼</span>
                <div style="font-size:3.5rem; font-weight:900; color:var(--host-color);" id="display-code">000000</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn-battle btn-sub" onclick="copyInviteLink()" style="font-size:0.85rem;">複製連結</button>
                    <button class="btn-battle btn-sub" onclick="showQRModal()" style="font-size:0.85rem;">顯示 QR</button>
                </div>
            </div>

            <div style="display:flex; justify-content:space-around; align-items:center; margin-top:30px;">
                <div style="text-align:center;">
                    <div style="font-size:3.5rem;">👤</div>
                    <div id="lobby-my-name" style="font-weight:bold;">---</div>
                </div>
                <div style="font-weight:900; color:#1e293b; font-size:1.5rem;">VS</div>
                <div style="text-align:center;">
                    <div id="opp-avatar" style="font-size:3.5rem; opacity:0.3;">?</div>
                    <div id="lobby-opp-name" style="color:#64748b;">等待中...</div>
                </div>
            </div>
            
            <div style="margin-top:40px;">
                <p style="text-align:center; color:#38bdf8; font-weight:bold; margin-bottom:15px;" id="lobby-status">正在連線伺服器...</p>
                <button id="btn-host-start" class="btn-battle btn-main" style="display:none;" onclick="hostStartBattle()">開始對決！</button>
            </div>
        </div>
    </div>

    <!-- 5. 競技場 -->
    <div id="view-arena" class="view-section">
        <div class="vs-header">
            <div class="player-info"><span id="arena-my-name">---</span><span class="player-score" id="my-score">0000</span></div>
            <div class="timer-circle"><svg><circle class="timer-bg" cx="35" cy="35" r="32"></circle><circle id="timer-bar" class="timer-progress" cx="35" cy="35" r="32"></circle></svg><span id="timer-num">10</span></div>
            <div class="player-info"><span id="arena-opp-name">---</span><span class="player-score" id="opp-score">0000</span></div>
        </div>
        <div class="progress-container"><div id="game-progress"></div></div>
        <div class="q-card"><div class="q-pos" id="q-pos">---</div><h1 class="q-word" id="q-word">---</h1></div>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <!-- 彈窗與遮罩 -->
    <div id="qr-modal" class="overlay" onclick="closeQRModal()">
        <div class="battle-card" style="max-width:320px; text-align:center;" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--primary-battle);">邀請好友加入</h3>
            <div id="qr-container"></div>
            <button class="btn-battle btn-main" onclick="closeQRModal()" style="margin-bottom:0;">關閉視窗</button>
        </div>
    </div>

    <div id="game-overlay" class="overlay">
        <h1 id="over-main">3</h1>
        <div id="over-actions" style="display:none; margin-top: 30px;">
            <button class="btn-battle btn-main" onclick="location.reload()" style="width: 200px;">回到主選單</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/supabase-config.js"></script>

    <script>
        let myChannel, roomId, myName, isHost = false;
        let quizPool = [], currentIndex = 0, numQuestions = 10;
        let myScore = 0, oppScore = 0;
        let myDone = false, oppDone = false, canClick = false;
        let timeLeft = 10, timerInterval, isMatchActive = false;
        let selectedScope = [];
        let html5QrCode = null;

        // ==========================================
        // 1. 初始化與 UI 控制
        // ==========================================

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) { switchView('view-join'); document.getElementById('input-code').value = roomFromUrl; }
        });

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
            if (id === 'view-create') loadScope();
        }

        async function loadScope() {
            const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english.json');
            const data = await res.json();
            const container = document.getElementById('scope-list');
            container.innerHTML = '';
            data.sources.forEach(src => {
                const group = document.createElement('div');
                group.className = 'version-group';
                let chips = src.lessons.map(l => `<div class="chip" onclick="toggleChip(this, '${src.name}', ${l.lesson})">${l.title}</div>`).join('');
                group.innerHTML = `<span class="version-name">${src.name}</span><div class="lesson-chips">${chips}</div>`;
                container.appendChild(group);
            });
        }

        function toggleChip(el, srcName, lesNum) {
            el.classList.toggle('selected');
            let version = selectedScope.find(v => v.source === srcName);
            if (!version) { selectedScope.push(version = { source: srcName, lessons: [] }); }
            if (el.classList.contains('selected')) version.lessons.push(lesNum);
            else version.lessons = version.lessons.filter(n => n !== lesNum);
        }

        function setNum(n, el) {
            numQuestions = n;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // ==========================================
        // 2. 連線核心 (修復版)
        // ==========================================

        async function createRoom() {
            myName = document.getElementById('host-name').value.trim() || "房主";
            if (selectedScope.every(s => s.lessons.length === 0)) return alert("請選擇範圍");
            roomId = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('display-code').innerText = roomId;
            
            const { error } = await window.supabaseClient.from('english_battle').insert([{ 
                room_code: roomId, 
                host_name: myName, 
                settings: { scope: selectedScope, num: numQuestions }, 
                status: 'waiting' 
            }]);
            
            if (error) return alert("創房失敗");
            isHost = true;
            startConnection();
        }

        async function joinRoom() {
            roomId = document.getElementById('input-code').value.trim();
            myName = document.getElementById('joiner-name').value.trim() || "挑戰者";
            
            const { data, error } = await window.supabaseClient.from('english_battle').select('*').eq('room_code', roomId).single();
            if (error || !data) return alert("找不到房間");
            
            // 如果房間已經產生題目 (FallBack 機制)
            if (data.status === 'playing' && data.settings.quiz_backup) {
                quizPool = data.settings.quiz_backup;
                numQuestions = data.settings.num;
                isHost = false;
                startConnection();
                setTimeout(startCountdown, 1500); 
                return;
            }

            numQuestions = data.settings.num;
            selectedScope = data.settings.scope;
            isHost = false;
            startConnection();
        }

        function startConnection() {
            switchView('view-lobby');
            document.getElementById('lobby-my-name').innerText = myName;

            myChannel = window.supabaseClient.channel(`live_${roomId}`, {
                config: { presence: { key: myName }, broadcast: { ack: true } }
            });

            myChannel
                .on('presence', { event: 'sync' }, () => {
                    const players = Object.keys(myChannel.presenceState());
                    if (players.length === 2) {
                        const opp = players.find(p => p !== myName);
                        document.getElementById('opp-avatar').style.opacity = "1";
                        document.getElementById('lobby-opp-name').innerText = opp;
                        
                        if (isHost) {
                            document.getElementById('lobby-status').innerText = "對手已加入，準備握手...";
                            // 房主發送 PING 確保對手真的能接收
                            setTimeout(() => {
                                myChannel.send({ type: 'broadcast', event: 'ping_check', payload: {} });
                            }, 1000);
                        }
                    } else {
                        document.getElementById('lobby-status').innerText = "等待對手加入...";
                    }
                })
                .on('broadcast', { event: 'ping_check' }, () => {
                    if (!isHost) myChannel.send({ type: 'broadcast', event: 'client_ready', payload: {} });
                })
                .on('broadcast', { event: 'client_ready' }, () => {
                    if (isHost) {
                        document.getElementById('lobby-status').innerText = "連線穩固！正在生成題目...";
                        hostStartBattle();
                    }
                })
                .on('broadcast', { event: 'start_game' }, (p) => {
                    if (!isHost) {
                        quizPool = p.payload.quiz;
                        startCountdown();
                    }
                })
                .on('broadcast', { event: 'stat' }, (p) => {
                    if (p.payload.user !== myName) {
                        oppScore = p.payload.score;
                        oppDone = p.payload.isDone;
                        updateArenaUI();
                        checkRoundSync();
                    }
                })
                .on('broadcast', { event: 'go_next' }, (p) => {
                    if (!isHost) triggerNextRound(p.payload.index);
                })
                .subscribe(async (s) => { if (s === 'SUBSCRIBED') await myChannel.track({ online_at: new Date() }); });
        }

        async function hostStartBattle() {
            const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english.json');
            const data = await res.json();
            let all = [];
            data.sources.forEach(src => {
                const scope = selectedScope.find(s => s.source === src.name);
                if (scope) src.lessons.forEach(l => { if (scope.lessons.includes(l.lesson)) all.push(...l.vocabulary); });
            });
            
            quizPool = all.sort(() => 0.5 - Math.random()).slice(0, numQuestions);

            // 備份到 DB 供掉線重連或廣播失敗使用
            await window.supabaseClient.from('english_battle').update({ 
                status: 'playing', 
                settings: { scope: selectedScope, num: numQuestions, quiz_backup: quizPool } 
            }).eq('room_code', roomId);

            myChannel.send({ type: 'broadcast', event: 'start_game', payload: { quiz: quizPool } });
            startCountdown();
        }

        // ==========================================
        // 3. 遊戲邏輯 (競技場)
        // ==========================================

        function startCountdown() {
            const overlay = document.getElementById('game-overlay');
            const main = document.getElementById('over-main');
            overlay.style.display = 'flex';
            let sec = 3; main.innerText = sec;
            const cd = setInterval(() => {
                sec--;
                if (sec > 0) main.innerText = sec;
                else {
                    clearInterval(cd); main.innerText = "GO!";
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        switchView('view-arena');
                        document.getElementById('arena-my-name').innerText = myName;
                        document.getElementById('arena-opp-name').innerText = document.getElementById('lobby-opp-name').innerText;
                        isMatchActive = true; 
                        triggerNextRound(0);
                    }, 800);
                }
            }, 1000);
        }

        function triggerNextRound(idx) {
            currentIndex = idx;
            if (currentIndex >= quizPool.length) return showResult();
            myDone = false; canClick = true; timeLeft = 10;
            renderQuestion(); 
            startTimer(); 
            updateArenaUI(); 
            broadcastStat();
        }

        function renderQuestion() {
            const q = quizPool[currentIndex];
            document.getElementById('q-word').innerText = q.word;
            document.getElementById('q-pos').innerText = q.pos || "";
            document.getElementById('game-progress').style.width = `${(currentIndex / numQuestions) * 100}%`;
            let opts = [q.chinese];
            while (opts.length < 4) {
                let r = quizPool[Math.floor(Math.random() * quizPool.length)].chinese;
                if (!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => 0.5 - Math.random());
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn'; b.innerText = opt;
                b.onclick = () => handleAnswer(opt, q.chinese, b);
                grid.appendChild(b);
            });
        }

        function handleAnswer(sel, cor, btn) {
            if (!canClick) return;
            canClick = false; myDone = true;
            clearInterval(timerInterval);

            if (sel === cor) {
                myScore += (500 + Math.floor(timeLeft * 50));
                if (btn) btn.classList.add('correct');
            } else {
                if (btn) btn.classList.add('wrong');
                Array.from(document.querySelectorAll('.opt-btn')).forEach(b => { if(b.innerText === cor) b.classList.add('correct'); });
            }
            updateArenaUI(); 
            broadcastStat(); 
            checkRoundSync();
        }

        function startTimer() {
            let start = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft = Math.max(0, (10000 - (Date.now() - start)) / 1000);
                document.getElementById('timer-num').innerText = Math.ceil(timeLeft);
                document.getElementById('timer-bar').style.strokeDashoffset = 201 - (timeLeft/10)*201;
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    if(!myDone) handleAnswer(null, quizPool[currentIndex].chinese, null); 
                }
            }, 50);
        }

        function checkRoundSync() {
            if (isHost && myDone && oppDone) {
                setTimeout(() => {
                    const nextIdx = currentIndex + 1;
                    myChannel.send({ type: 'broadcast', event: 'go_next', payload: { index: nextIdx } });
                    triggerNextRound(nextIdx);
                }, 1500);
            }
        }

        function broadcastStat() {
            if (myChannel) myChannel.send({ type: 'broadcast', event: 'stat', payload: { user: myName, score: myScore, isDone: myDone } });
        }

        function updateArenaUI() {
            document.getElementById('my-score').innerText = myScore.toString().padStart(4, '0');
            document.getElementById('opp-score').innerText = oppScore.toString().padStart(4, '0');
        }

        async function showResult() {
            isMatchActive = false;
            const overlay = document.getElementById('game-overlay'); overlay.style.display = 'flex';
            const main = document.getElementById('over-main');
            main.innerText = myScore > oppScore ? "🏆 WIN" : (myScore < oppScore ? "💀 LOSE" : "🤝 DRAW");
            
            if (isHost) {
                await window.supabaseClient.from('english_battle').delete().eq('room_code', roomId);
            }
            document.getElementById('over-actions').style.display = 'block';
        }

        // ==========================================
        // 4. 其他輔助功能
        // ==========================================

        function showQRModal() {
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            const container = document.getElementById('qr-container');
            container.innerHTML = '';
            new QRCode(container, { text: inviteUrl, width: 200, height: 200 });
            document.getElementById('qr-modal').style.display = 'flex';
        }
        function closeQRModal() { document.getElementById('qr-modal').style.display = 'none'; }
        function copyInviteLink() {
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            navigator.clipboard.writeText(inviteUrl).then(() => alert("連結已複製！"));
        }

        async function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            document.getElementById('join-form').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    if (text.includes('?room=')) {
                        const code = new URL(text).searchParams.get('room');
                        document.getElementById('input-code').value = code;
                        stopScanner();
                    }
                });
            } catch (e) { alert("無法開啟相機"); stopScanner(); }
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().finally(()=> {
            document.getElementById('scanner-container').style.display = 'none';
            document.getElementById('join-form').style.display = 'block';
        });}
    </script>
</body>
</html>
