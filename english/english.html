<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文科選課</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        .version-group { margin-bottom: 30px; }
        .version-title { font-size: 1.3rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 10px; }
        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .lesson-card {
            background: #fff; border: 1px solid #eee; 
            border-radius: 12px; padding: 15px; text-align: center; cursor: pointer;
            transition: all 0.25s ease; user-select: none; min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); font-weight: bold; color: #555;
        }

        .lesson-card.selected { 
            border: 2.5px solid var(--primary); 
            background-color: var(--primary-light); 
            color: var(--primary);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        
        .section-header { 
            margin: 60px 0 20px; padding: 10px 0; 
            border-bottom: 2px solid #eee; color: #888; font-weight: bold; font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header><div class="logo"><a href="../index.html" class="back-btn">⬅</a> 英文科選課</div></header>

    <div class="page-container">
        <div id="normal-lessons"></div>
        <div class="section-header">翻譯測驗模式資源</div>
        <div id="trans-lessons"></div>
    </div>

    <div class="bottom-nav-fixed">
        <div class="bottom-nav-content">
            <button class="nav-item-btn" id="btn-words" onclick="goTo('words')" disabled>
                <svg viewBox="0 0 24 24"><path d="M4 9h16v2H4V9zm0 4h10v2H4v-2zm0-8h16v2H4V5zm0 12h16v2H4v-2z"/></svg>
                <span>單字</span>
            </button>
            
            <!-- 提取按鈕：僅在未選翻譯時顯示 -->
            <button class="nav-item-btn" id="btn-recall" onclick="goTo('recall')" disabled>
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <span>提取</span>
            </button>

            <button class="nav-item-btn" id="btn-textbook" onclick="goTo('textbook')" disabled>
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>課文</span>
            </button>

            <button class="nav-item-btn" id="btn-quiz" onclick="goTo('quiz')" disabled>
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>測驗</span>
            </button>

            <!-- 翻譯按鈕：預設隱藏，選擇翻譯課別後顯示 -->
            <button class="nav-item-btn" id="btn-translation" onclick="goTo('translation')" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
                <span>翻譯</span>
            </button>
        </div>
    </div>

    <script>
        let normalData = [], transData = [];
        async function init() {
            const [r1, r2] = await Promise.all([
                fetch('../data/english.json').then(r => r.json()),
                fetch('../data/english-translation.json').then(r => r.json())
            ]);
            normalData = r1.sources; transData = r2.sources;
            render();
        }

        function render() {
            const nRoot = document.getElementById('normal-lessons');
            const tRoot = document.getElementById('trans-lessons');
            normalData.forEach(src => nRoot.appendChild(createVersionBlock(src, 'normal')));
            transData.forEach(src => tRoot.appendChild(createVersionBlock(src, 'trans')));
        }

        function createVersionBlock(src, type) {
            const group = document.createElement('div');
            group.className = 'version-group';
            group.innerHTML = `<div class="version-title">${src.name}</div><div class="lesson-grid"></div>`;
            const grid = group.querySelector('.lesson-grid');
            src.lessons.forEach(l => {
                const card = document.createElement('div');
                card.className = `lesson-card ${type === 'trans' ? 'trans-logic' : 'normal-logic'}`;
                card.innerHTML = l.title;
                card.dataset.source = src.name; card.dataset.lesson = l.lesson;
                card.onclick = () => { card.classList.toggle('selected'); updateUI(); };
                grid.appendChild(card);
            });
            return group;
        }

        function updateUI() {
            const normalSelected = document.querySelectorAll('.normal-logic.selected');
            const transSelected = document.querySelectorAll('.trans-logic.selected');
            
            const nCnt = normalSelected.length;
            const tCnt = transSelected.length;

            // 按鈕狀態控制
            document.getElementById('btn-words').disabled = !nCnt;
            document.getElementById('btn-textbook').disabled = !nCnt;
            document.getElementById('btn-quiz').disabled = !nCnt;

            // 核心切換邏輯：若選擇了翻譯，隱藏提取，顯示翻譯
            if (tCnt > 0) {
                document.getElementById('btn-recall').style.display = 'none';
                document.getElementById('btn-translation').style.display = 'flex';
            } else {
                document.getElementById('btn-recall').style.display = 'flex';
                document.getElementById('btn-recall').disabled = !nCnt;
                document.getElementById('btn-translation').style.display = 'none';
            }
        }

        function goTo(page) {
            const isT = (page === 'translation');
            const sel = document.querySelectorAll(`.selected.${isT?'trans-logic':'normal-logic'}`);
            const data = Array.from(sel).map(c => ({ source: c.dataset.source, lesson: parseInt(c.dataset.lesson) }));
            localStorage.setItem(isT ? 'sel_trans_lessons' : 'sel_lessons', JSON.stringify(data));
            window.location.href = page + '.html';
        }
        init();
    </script>
</body>
</html>
