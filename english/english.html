<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文科 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <style>
        body {
            background-color: #f8fafc;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
        }

        .back-link {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .header-title {
            color: #1d74d8;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 頁面標題區 */
        .page-title-area {
            max-width: 980px;
            margin: 0 auto 30px;
            padding: 0 10px;
        }

        .page-title-area h2 {
            font-size: 1.6rem;
            color: #334155;
            margin-bottom: 5px;
        }

        .page-title-area p {
            color: #94a3b8;
            margin-top: 0;
            font-size: 0.95rem;
        }

        /* 入口網格佈局 */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 卡片基礎樣式 */
        .hub-card {
            background: #fff;
            border-radius: 24px;
            padding: 45px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #f1f5f9;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hub-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(11, 118, 209, 0.15);
            border-color: #bfdbfe;
        }

        /* 圖示圓圈 */
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            background-color: #eff6ff; /* 淺藍底 */
        }

        .icon-circle svg {
            width: 40px;
            height: 40px;
            fill: #3b82f6; /* 主色藍 */
        }

        .module-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .module-desc {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.6;
            max-width: 240px;
        }

        /* 標籤 */
        .card-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            background: #f1f5f9;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .tag-hot { background: #fee2e2; color: #ef4444; }

        /* 響應式調整 */
        @media (max-width: 768px) {
            .hub-grid {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }
            .hub-card {
                padding: 35px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 頂部標題列 -->
    <header>
        <a href="../index.html" class="back-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div class="header-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            English 英文學科
        </div>
    </header>

    <div class="page-container">
        <!-- 標題文字 -->
        <div class="page-title-area">
            <h2>探索英文世界</h2>
            <p>從基礎單字到課文閱讀，循序漸進提升語文能力</p>
        </div>
        
        <!-- 入口網格 -->
        <div class="hub-grid">
            
            <!-- 模組 1：學習教材 (舊有的選課功能) -->
            <a href="english-materials.html" class="hub-card">
                <div class="card-tag">Textbook</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                </div>
                <div class="module-name">學習教材</div>
                <div class="module-desc">同步校內版本課文、單字與朗讀，並支援個人書架管理。</div>
            </a>

            <!-- 模組 2：單字列表 (未來的 7000 單系統) -->
            <a href="vocabulary-list.html" class="hub-card">
                <div class="card-tag tag-hot">6000+</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M4 9h16v2H4V9zm0 4h10v2H4v-2zm0-8h16v2H4V5zm0 12h16v2H4v-2z"/></svg>
                </div>
                <div class="module-name">單字列表</div>
                <div class="module-desc">完整收錄 7000 單字庫，提供詳細說明、時態變化與情境例句。</div>
            </a>

            <!-- 模組 3：即時對戰 (知識王) -->
            <a href="english-battle.html" class="hub-card">
                <div class="card-tag">PvP</div>
                <div class="icon-circle">
                    <span style="font-size: 2rem; font-weight: 900; color: #3b82f6;">VS</span>
                </div>
                <div class="module-name">單字知識王</div>
                <div class="module-desc">與好友進行即時連線對戰，挑戰你的反應速度與單字量。</div>
            </a>

            <!-- 模組 4：常用句型 (預留) -->
            <a href="#" class="hub-card" style="opacity: 0.6; pointer-events: none;">
                <div class="card-tag">Coming Soon</div>
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2.1l1.1-3h5.4l1.1 3H24l-5.5-12zm-2.62 7l1.62-4.41L19.12 17h-3.24z"/></svg>
                </div>
                <div class="module-name">句型實驗室</div>
                <div class="module-desc">精選常用英文句型與文法解析，強化你的寫作與口說實力。</div>
            </a>

        </div>
    </div>

</body>
</html>
