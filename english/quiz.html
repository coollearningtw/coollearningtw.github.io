<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字測驗</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/english-quiz.css">
    <style>
        .back-link { display: flex; align-items: center; text-decoration: none; color: var(--primary) !important; margin-right: 10px; }
        .page-title { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        #mistake-area { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; text-align: center; display: none; }
        .success-icon { width: 48px; height: 48px; color: #2ecc71; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="english.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <img src="../images/logo.png" alt="Logo" height="40">
            <span class="page-title">測驗模式</span>
        </div>
    </header>
    
    <main class="quiz-container page-container">
        <section class="setup">
            <div class="std-card panel">
                <h3 style="margin-top:0;">測驗範圍</h3>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <label><input type="radio" name="q-scope" value="all" checked> 所有單字</label>
                    <label><input type="radio" name="q-scope" value="fav"> 僅最愛單字</label>
                </div>
            </div>
            <button id="start-btn" class="btn" style="width:100%; font-size:1.2rem; padding:12px;">開始新測驗</button>
            <div id="mistake-area">
                <div id="last-score-info"></div>
                <button id="mistake-btn" class="btn">錯題訂正</button>
            </div>
        </section>

        <section id="quiz" class="quiz" style="display:none;">
            <div class="meta">
                <div id="progress">0 / 0</div>
                <div id="timer">--</div>
            </div>
            <div id="question-area" class="question-area std-card"></div>
            <div class="controls">
                <button id="show-answer" class="btn">看答案</button>
                <button id="exit-btn" class="btn secondary">退出</button>
            </div>
        </section>
    </main>

    <script src="../scripts/english-quiz.js"></script>
    <script>
        // 在 english-quiz.js 的 endQuiz 函式中，原本的 Emoji 可以替換為：
        // const trophyIcon = `<svg class="success-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6v2H1v7c0 3.31 2.69 6 6 6h1.22c.93 2.1 3.01 3.5 5.41 3.5h.74l-.62 3H10v2h4v-2h-1.13l.62-3h.74c2.4 0 4.48-1.4 5.41-3.5H17c3.31 0 6-2.69 6-6V4h-5V2zM3 11V6h3v5c0 1.65-1.35 3-3 3s-3-1.35-3-3zm18 0c0 1.65-1.35 3-3 3s-3-1.35-3-3V6h3v5z"/></svg>`;
    </script>
</body>
</html>
