<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻譯測驗</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        .quiz-wrapper { max-width: 750px; margin: 20px auto; text-align: center; }
        .ch-display { font-size: 1.6rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        textarea { width: 100%; height: 140px; font-size: 1.25rem; padding: 18px; border-radius: 16px; border: 2px solid #ddd; outline: none; resize: none; box-sizing: border-box; }
        .btn-group { margin-top: 25px; display: flex; gap: 12px; justify-content: center; }
        .btn-action { padding: 12px 45px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: bold; border: none; }
        .btn-check { background: var(--primary); color: #fff; }
        .btn-next { background: #333; color: #fff; }
    </style>
</head>
<body>
    <header><div class="logo"><a href="translation.html" class="back-link">⬅</a> 翻譯測驗</div></header>
    <div class="page-container quiz-wrapper">
        <div id="quiz-count" style="margin-bottom:12px; color:#999; font-weight: bold;"></div>
        <div id="ch-text" class="ch-display"></div>
        <textarea id="user-input" placeholder="輸入翻譯..." spellcheck="false"></textarea>
        <div id="diff-output" class="diff-result-box" style="display:none; margin-top:20px; text-align:left; padding:15px; background:#f8fafc; border-radius:10px;"></div>
        <div class="btn-group">
            <button id="btn-check" class="btn-action btn-check">核對答案</button>
            <button id="btn-next" class="btn-action btn-next" style="display:none;">下一題</button>
        </div>
    </div>

    <script>
        let quizPool = []; let index = 0;

        function getPossibleSentences(text) {
            const regex = /\(([^)]+)\)/;
            let sentences = [text];
            while (regex.test(sentences[0])) {
                let newSents = [];
                sentences.forEach(s => {
                    const match = s.match(regex);
                    const options = match[1].split('/');
                    options.forEach(opt => newSents.push(s.replace(match[0], opt.trim())));
                });
                sentences = newSents;
            }
            return sentences;
        }

        function tokenize(t) { return t.replace(/([.,!?;])/g, ' $1 ').split(/\s+/).filter(x => x.length > 0); }

        function findBestMatch(userIn, rawAns) {
            const possibilities = getPossibleSentences(rawAns);
            let bestMatch = possibilities[0]; let maxOverlap = -1;
            const userTokens = new Set(tokenize(userIn.toLowerCase()));
            possibilities.forEach(p => {
                const overlap = tokenize(p.toLowerCase()).filter(t => userTokens.has(t)).length;
                if (overlap > maxOverlap) { maxOverlap = overlap; bestMatch = p; }
            });
            return bestMatch;
        }

        function generateDiff(userStr, ansStr) {
            const user = tokenize(userStr); const ans = tokenize(ansStr);
            let html = ""; let uIdx = 0, aIdx = 0;
            while (aIdx < ans.length || uIdx < user.length) {
                const uW = user[uIdx] ? user[uIdx].toLowerCase() : null;
                const aW = ans[aIdx] ? ans[aIdx].toLowerCase() : null;
                if (uW === aW) { html += `<span class="diff-correct">${ans[aIdx]}</span> `; uIdx++; aIdx++; }
                else {
                    let foundLater = false;
                    for (let i = aIdx; i < ans.length; i++) if (ans[i].toLowerCase() === uW) { foundLater = true; break; }
                    if (uW && !foundLater) { html += `<span class="diff-extra">${user[uIdx]}</span> `; uIdx++; }
                    else if (aW) { html += `<span class="diff-missing">${ans[aIdx]}</span> `; aIdx++; }
                }
            }
            return html;
        }

        async function init() {
            const sel = JSON.parse(localStorage.getItem('sel_trans_lessons') || '[]');
            const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english-translation.json');
            const data = await res.json();
            data.sources.forEach(src => src.lessons.forEach(l => {
                if (sel.some(s => s.source === src.name && s.lesson === l.lesson)) quizPool.push(...l.pairs);
            }));
            quizPool.sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            document.getElementById('quiz-count').innerText = `${index + 1} / ${quizPool.length}`;
            document.getElementById('ch-text').innerText = quizPool[index].ch;
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').disabled = false;
            document.getElementById('diff-output').style.display = "none";
            document.getElementById('btn-next').style.display = "none";
            document.getElementById('btn-check').style.display = "block";
        }

        document.getElementById('btn-check').onclick = () => {
            const userIn = document.getElementById('user-input').value.trim();
            const bestAns = findBestMatch(userIn, quizPool[index].en);
            document.getElementById('diff-output').innerHTML = generateDiff(userIn, bestAns);
            document.getElementById('diff-output').style.display = "block";
            document.getElementById('user-input').disabled = true;
            document.getElementById('btn-check').style.display = "none";
            document.getElementById('btn-next').style.display = "block";
        };

        document.getElementById('btn-next').onclick = () => {
            index++;
            if (index >= quizPool.length) location.href = 'translation.html';
            else render();
        };
        init();
    </script>
</body>
</html>
