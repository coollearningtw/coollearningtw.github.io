<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻譯列表</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        header { justify-content: space-between; }
        .trans-item { padding: 20px; margin-bottom: 12px; cursor: pointer; }
        .ch-txt { font-size: 1.1rem; font-weight: bold; }
        .en-txt { margin-top: 10px; color: var(--primary); display: none; border-top: 1px dashed #eee; padding-top: 10px; }
        .en-txt.show { display: block; }
        .btn-quiz { background: #e3f2fd; color: var(--primary); border: 2px solid var(--primary); padding: 8px 16px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="english.html" class="back-btn">⬅</a> 翻譯列表</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-quiz" onclick="location.href='translation-quiz.html'">進入測驗</button>
        </div>
    </header>
    <div class="page-container" id="list-root"></div>
    <script>
        (async () => {
            const sel = JSON.parse(localStorage.getItem('sel_trans_lessons') || '[]');
            const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english-translation.json');
            const data = await res.json();
            const root = document.getElementById('list-root');

            data.sources.forEach(src => {
                src.lessons.forEach(l => {
                    if (sel.some(s => s.source === src.name && s.lesson === l.lesson)) {
                        l.pairs.forEach(p => {
                            const card = document.createElement('div');
                            card.className = 'std-card trans-item';
                            // 列表頁隱藏多重答案括號，只顯示第一種
                            const displayEn = p.en.replace(/\(([^/)]+)\/[^)]+\)/g, '$1');
                            card.innerHTML = `<div class="ch-txt">${p.ch}</div><div class="en-txt">${displayEn}</div>`;
                            card.onclick = () => card.querySelector('.en-txt').classList.toggle('show');
                            root.appendChild(card);
                        });
                    }
                });
            });
        })();
    </script>
</body>
</html>
