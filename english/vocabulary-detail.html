<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字詳情 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        /* --- 基礎佈局與垂直位置維持 --- */
        body { background-color: #f8fafc; overflow-x: hidden; touch-action: pan-y; }
        .detail-container { max-width: 850px; margin: 30px auto; padding: 0 20px; }
        .detail-card { background: #fff; border-radius: 24px; padding: 40px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; min-height: 500px; }
        
        /* --- 修正後的標題樣式：防止長字串溢出 --- */
        .header-box { border-bottom: 2px solid #f1f5f9; padding-bottom: 30px; margin-bottom: 30px; }
        .word-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            color: #1e293b; 
            margin: 0; 
            word-break: break-all; /* 強制長字串/符號換行 */
            overflow-wrap: break-word;
            line-height: 1.1;
        }

        .pronunciation { display: flex; align-items: center; gap: 15px; color: var(--primary); font-size: 1.2rem; margin-top: 10px; }
        .section-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; margin-top: 30px; }
        .section-label svg { width: 18px; height: 18px; fill: currentColor; }

        .meaning-wrapper { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; }
        .meaning-text { font-size: 1.5rem; font-weight: bold; color: #334155; display: flex; align-items: center; gap: 10px; }
        .pos-tag { background: var(--primary); color: #fff; padding: 2px 10px; border-radius: 6px; font-size: 1rem; font-weight: bold; }

        .relation-badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 10px; font-size: 1rem; font-weight: 700; white-space: nowrap; }
        .badge-tag { font-size: 0.85rem; margin-right: 8px; font-weight: 800; }
        .syn-badge { background-color: #e6f9ed; color: #1e6b45; }
        .syn-badge .badge-tag { color: #5bb381; }
        .ant-badge { background-color: #fdeced; color: #931b1b; }
        .ant-badge .badge-tag { color: #d16b6b; }

        .md-bold { font-weight: 800; color: #000000; }
        .md-context { color: #64748b; font-weight: 800; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; border: 1px solid #e2e8f0; }
        .md-tag { font-family: 'Courier New', monospace; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; padding: 1px 5px; border-radius: 4px; font-weight: 600; }

        .example-item { background: #f8fafc; padding: 22px; border-radius: 18px; margin-bottom: 15px; border-left: 6px solid var(--primary); }
        .ex-en { font-size: 1.25rem; color: #1e293b; font-weight: 500; margin-bottom: 8px; }
        .example-word { color: var(--primary); text-decoration: underline; text-decoration-thickness: 1.5px; text-underline-offset: 3px; cursor: pointer; }
        .example-word:hover { color: #0f172a; }
        .example-word-self { color: inherit; text-decoration: none; cursor: default; }

        .detail-nav { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 22px; align-items: center; }
        .nav-btn { border: 1px solid #cbd5e1; background: #fff; color: #0f172a; padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover:not(:disabled) { background: #f8fafc; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #f8fafc; }

        .example-tooltip { position: fixed; z-index: 9999; max-width: 240px; padding: 12px 14px; border-radius: 14px; background: rgba(15, 23, 42, 0.95); color: #f8fafc; box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22); pointer-events: none; transition: opacity 120ms ease; opacity: 0; transform: translate(-50%, -8px); font-size: 0.92rem; line-height: 1.5; }
        .example-tooltip.visible { opacity: 1; }
        .level-badge { display: inline-block; padding: 6px 18px; border-radius: 50px; background: #e0f2fe; color: #0369a1; font-weight: 800; }

        @media (max-width: 640px) {
            .detail-container { margin: 20px auto; padding: 0 14px; }
            .detail-card { padding: 25px 15px; border-radius: 20px; }
            .word-title { font-size: 2.2rem; }
            .pronunciation { font-size: 1rem; }
            .section-label { font-size: 0.82rem; }
            .meaning-wrapper { flex-direction: column; align-items: stretch; gap: 14px; }
            .relation-badge { width: 100%; justify-content: flex-start; white-space: normal; padding: 10px 14px; }
            .meaning-text { font-size: 1.25rem; }
            .example-item { padding: 18px; }
            .ex-en { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="vocabulary-list.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <span class="header-title-area">單字詳細說明</span>
        </div>
    </header>

    <main class="detail-container" id="detail-root">
        <div class="error-view" style="text-align:center; padding:100px 0; color:#94a3b8;">正在檢索字庫...</div>
    </main>

    <script src="../scripts/utils.js"></script>
    <script>
        const CACHE_KEY = 'cool_learning_vocab_cache';
        const VOCAB_LEVEL_URLS = [1, 2, 3, 4, 5, 6].map(level =>
            `https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/vocabulary/level${level}.json`
        );

        const ICONS = {
            meaning: '<svg viewBox="0 0 24 24"><path d="M4 9h16v2H4V9zm0 4h10v2H4v-2zm0-8h16v2H4V5zm0 12h16v2H4v-2z"/></svg>',
            example: '<svg viewBox="0 0 24 24"><path d="M21 6h-2v9H6V3H4v18h2v-2h15V6z"/></svg>',
            info: '<svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>'
        };

        // 全域核心變數
        let vocabDataInMem = [];
        let vocabMap = new Map();
        let vocabList = [];
        let formEntries = [];
        let irregularForms = {};
        let currentWordKey = '';
        let currentMode = 'level';

        // 滑動手勢變數
        let touchStartX = 0;
        let touchEndX = 0;

        const tooltipEl = document.createElement('div');
        tooltipEl.className = 'example-tooltip';
        document.body.appendChild(tooltipEl);

        // --- 1. 核心載入：快取優先並駐留記憶體 ---
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('word');
            const mode = urlParams.get('mode');
            currentMode = mode === 'alpha' ? 'alpha' : 'level';

            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    vocabDataInMem = JSON.parse(cached);
                    // 取得變形表後再渲染，確保連結功能正常
                    const irrRes = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/irregular-forms.json');
                    irregularForms = await irrRes.json();
                    
                    setupData(vocabDataInMem, target);
                    console.log("⚡ 進入快取優先模式");
                } catch(e) {}
            }
            syncUpdate(target);
            setupSwipe(); 
        }

        async function syncUpdate(target) {
            try {
                const [vocabRes, irrRes] = await Promise.all([
                    Promise.all(VOCAB_LEVEL_URLS.map(url => fetch(url).then(r => r.json()))),
                    fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/irregular-forms.json').then(r => r.json())
                ]);
                const latestData = vocabRes.flat();
                irregularForms = irrRes;
                const latestStr = JSON.stringify(latestData);
                if (latestStr !== localStorage.getItem(CACHE_KEY)) {
                    vocabDataInMem = latestData;
                    localStorage.setItem(CACHE_KEY, latestStr);
                    setupData(vocabDataInMem, target);
                }
            } catch (e) {}
        }

        // --- 2. 核心渲染與導航 ---
        function setupData(data, target) {
            const indexResult = buildVocabIndex(data);
            vocabMap = indexResult.map;
            vocabList = sortVocabList(indexResult.listKeys, currentMode);
            const targetKey = normalizeWordKey(target);
            const wordData = data.find(w => normalizeWordKey(w.word) === targetKey);
            if (wordData) renderDetail(wordData);
            else renderNotFound();
        }

        function navigateToNeighbor(dir) {
            const idx = vocabList.indexOf(currentWordKey);
            if (idx === -1) return;
            const nextIdx = idx + dir;
            
            if (nextIdx >= 0 && nextIdx < vocabList.length) {
                const nextKey = vocabList[nextIdx];
                const item = vocabMap.get(nextKey);
                if (!item) return;

                // 更新網址但不刷新頁面
                const newUrl = `?word=${encodeURIComponent(item.word)}&mode=${currentMode}`;
                history.pushState({ word: item.word }, '', newUrl);

                // 直接渲染新內容，且不調用 scrollTo(0,0)，維持垂直位置
                renderDetail(item);
            }
        }

        // 手勢監聽
        function setupSwipe() {
            document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
            document.addEventListener('touchend', e => { 
                touchEndX = e.changedTouches[0].screenX; 
                const threshold = 60;
                if (touchEndX < touchStartX - threshold) navigateToNeighbor(1); // 左滑 -> 次
                if (touchEndX > touchStartX + threshold) navigateToNeighbor(-1); // 右滑 -> 前
            }, { passive: true });
        }

        window.onpopstate = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('word');
            if (target && vocabDataInMem.length > 0) {
                const item = vocabDataInMem.find(w => normalizeWordKey(w.word) === normalizeWordKey(target));
                if (item) renderDetail(item);
            }
        };

        // --- 3. 完整原始處理算法 (500行等級邏輯) ---
        function normalizeWordKey(word) {
            if (!word) return '';
            return word.replace(/\s*\(\d+\)(?:\s*\(\d+\))*$/g, '').trim().toLowerCase();
        }

        function buildVocabIndex(list) {
            const map = new Map(); const listKeys = [];
            list.forEach(item => {
                const wordKey = normalizeWordKey(item.word);
                if (wordKey) {
                    map.set(wordKey, item);
                    if (!listKeys.includes(wordKey)) listKeys.push(wordKey);
                }
                if (item.word.includes('/')) {
                    item.word.split('/').forEach(part => {
                        const normalized = normalizeWordKey(part.trim());
                        if (normalized) map.set(normalized, item);
                    });
                }
            });
            const keys = Array.from(new Set(map.keys())).sort((a, b) => b.length - a.length);
            formEntries = buildFormEntries(keys);
            return { map, keys, listKeys };
        }

        function sortVocabList(keys, mode) {
            const sorted = keys.slice();
            if (mode === 'alpha') return sorted.sort((a, b) => a.localeCompare(b));
            return sorted.sort((a, b) => {
                const itemA = vocabMap.get(a), itemB = vocabMap.get(b);
                if (!itemA || !itemB) return a.localeCompare(b);
                if (itemA.level !== itemB.level) return itemA.level - itemB.level;
                return a.localeCompare(b);
            });
        }

        function buildFormEntries(keys) {
            const entries = [];
            keys.forEach(key => {
                entries.push({ form: key, key });
                if (key.includes(' ') || key.includes('/')) return;
                generateInflections(key).forEach(form => entries.push({ form, key }));
            });
            const unique = new Map();
            entries.forEach(entry => { if (!unique.has(entry.form)) unique.set(entry.form, entry); });
            return Array.from(unique.values()).sort((a, b) => b.form.length - a.form.length);
        }

        function generateInflections(key) {
            const forms = new Set();
            const irregular = irregularForms[key];
            if (irregular) irregular.forEach(form => forms.add(form.toLowerCase()));
            if (!key.match(/[^a-z ]/)) {
                if (!key.endsWith('s') && !key.endsWith('x') && !key.endsWith('z') && !key.endsWith('ch') && !key.endsWith('sh')) forms.add(`${key}s`); else forms.add(`${key}es`);
                if (key.endsWith('y')) {
                    const stem = key.slice(0, -1);
                    forms.add(`${stem}ies`); forms.add(`${stem}ily`); forms.add(`${stem}ier`); forms.add(`${stem}iest`);
                } else { forms.add(`${key}ly`); forms.add(`${key}er`); forms.add(`${key}est`); }
                if (key.endsWith('e')) { forms.add(`${key}d`); forms.add(`${key.slice(0, -1)}ing`); } else { forms.add(`${key}ed`); forms.add(`${key}ing`); }
            }
            return Array.from(forms);
        }

        function normalizeBoundary(text) { return /[^A-Za-z0-9_]/.test(text); }
        function isBoundary(text, start, length) {
            const before = start === 0 || normalizeBoundary(text[start - 1]);
            const after = start + length >= text.length || normalizeBoundary(text[start + length]);
            return before && after;
        }

        function extractTrailingNumber(text, start) {
            const match = text.slice(start).match(/^(\s*(?:\(\d+\)(?:\s*\(\d+\))*))/);
            if (!match) return { annotation: '', length: 0 };
            const annotation = match[1];
            const endIndex = start + annotation.length;
            const after = endIndex >= text.length || normalizeBoundary(text[endIndex]);
            return after ? { annotation, length: annotation.length } : { annotation: '', length: 0 };
        }

        function makeExampleWordHtml(word, item) {
            const display = escapeHtml(word);
            if (normalizeWordKey(item.word) === currentWordKey) return `<span class="example-word-self">${display}</span>`;
            return `<a class="example-word" href="vocabulary-detail.html?word=${encodeURIComponent(item.word)}&mode=${currentMode}" data-word="${escapeHtml(item.word)}" data-pos="${escapeHtml(item.pos || '')}" data-ch="${escapeHtml(item.ch || '')}">${display}</a>`;
        }

        function annotateSentenceSegment(text) {
            let html = ''; const lower = text.toLowerCase(); let index = 0;
            while (index < text.length) {
                let matched = null, matchedKey = '';
                for (const entry of formEntries) {
                    if (lower.startsWith(entry.form, index) && isBoundary(text, index, entry.form.length)) {
                        matched = text.substr(index, entry.form.length); matchedKey = entry.key; break;
                    }
                }
                if (matched) {
                    const item = vocabMap.get(matchedKey);
                    const nextPos = index + matched.length;
                    const trailing = extractTrailingNumber(text, nextPos);
                    html += makeExampleWordHtml(matched, item || { word: matched, pos: '', ch: '' });
                    if (trailing.length > 0) { html += escapeHtml(trailing.annotation); index += matched.length + trailing.length; } 
                    else { index += matched.length; }
                } else { html += escapeHtml(text[index]); index += 1; }
            }
            return html;
        }

        function renderExampleSentence(text) {
            const parts = text.split(/(\*\*.*?\*\*)/g);
            return parts.map(part => {
                if (part.startsWith('**') && part.endsWith('**')) return `<strong>${annotateSentenceSegment(part.slice(2, -2))}</strong>`;
                return annotateSentenceSegment(part);
            }).join('');
        }

        function renderDetail(w) {
            currentWordKey = normalizeWordKey(w.word);
            const root = document.getElementById('detail-root');
            let relationHtml = '';
            if (w.syn && w.syn.length > 0) relationHtml += `<div class="relation-badge syn-badge"><span class="badge-tag">同義</span><span>${w.syn.join(', ')}</span></div>`;
            if (w.ant && w.ant.length > 0) relationHtml += `<div class="relation-badge ant-badge"><span class="badge-tag">反義</span><span>${w.ant.join(', ')}</span></div>`;

            root.innerHTML = `
                <div class="detail-card">
                    <div class="detail-nav">
                        <button id="prev-word" class="nav-btn" onclick="navigateToNeighbor(-1)">上一個單字</button>
                        <button id="next-word" class="nav-btn" onclick="navigateToNeighbor(1)">下一個單字</button>
                    </div>
                    <div class="header-box">
                        <h1 class="word-title">${w.word}</h1>
                        <div class="pronunciation">
                            <span>${w.kk || ''}</span>
                            <button onclick="speak('${w.word}', 'en-US')" style="border:none; background:none; cursor:pointer; color:var(--primary)">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="section-label">${ICONS.meaning} 譯義與補充</div>
                    <div class="meaning-wrapper">
                        <div class="meaning-text"><span class="pos-tag">${w.pos}</span><span>${w.ch}</span></div>
                        ${relationHtml}
                    </div>
                    <div class="section-label">${ICONS.info} 詳細說明</div>
                    <div style="line-height:1.8; color:#475569; margin-bottom:35px; font-size:1.1rem;">${parseMarkdown(w.desc || '暫無額外說明。')}</div>
                    <div class="section-label">${ICONS.example} 情境例句</div>
                    ${w.sentences.map(s => `<div class="example-item"><div class="ex-en">${renderExampleSentence(s.en)}</div><div class="ex-ch">${parseMarkdown(s.ch)}</div></div>`).join('')}
                    <div style="margin-top:40px; text-align:right;"><span class="level-badge">LEVEL ${w.level}</span></div>
                </div>
            `;
            updateNavButtons();
        }

        function updateNavButtons() {
            const idx = vocabList.indexOf(currentWordKey);
            document.getElementById('prev-word').disabled = idx <= 0;
            document.getElementById('next-word').disabled = idx === -1 || idx >= vocabList.length - 1;
        }

        function showTooltipForTarget(target, event) {
            tooltipEl.innerHTML = `<strong>${escapeHtml(target.dataset.word)}</strong><div class="tooltip-meta">${escapeHtml(target.dataset.pos)} · ${escapeHtml(target.dataset.ch)}</div>`;
            tooltipEl.style.left = `${event.clientX + 16}px`; tooltipEl.style.top = `${event.clientY + 12}px`;
            tooltipEl.classList.add('visible');
            const b = tooltipEl.getBoundingClientRect();
            if (b.right > window.innerWidth - 12) tooltipEl.style.left = `${event.clientX - b.width - 16}px`;
            if (b.bottom > window.innerHeight - 12) tooltipEl.style.top = `${event.clientY - b.height - 12}px`;
        }

        document.addEventListener('pointerover', e => { const t = e.target.closest('.example-word'); if (t) showTooltipForTarget(t, e); });
        document.addEventListener('pointermove', e => { const t = e.target.closest('.example-word'); if (t && tooltipEl.classList.contains('visible')) showTooltipForTarget(t, e); });
        document.addEventListener('pointerout', e => { if (e.target.closest('.example-word')) tooltipEl.classList.remove('visible'); });
        function renderNotFound() { document.getElementById('detail-root').innerHTML = `<div style="text-align:center; padding:100px 0; color:#94a3b8;"><h2>單字未找到</h2></div>`; }

        init();
    </script>
</body>
</html>
