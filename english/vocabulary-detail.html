<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字詳情 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        .detail-container { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .detail-card { background: #fff; border-radius: 24px; padding: 40px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
        
        .header-box { border-bottom: 2px solid #f1f5f9; padding-bottom: 30px; margin-bottom: 30px; }
        .word-title { font-size: 3.5rem; font-weight: 900; color: #1e293b; margin: 0; }
        .pronunciation { display: flex; align-items: center; gap: 15px; color: var(--primary); font-size: 1.2rem; margin-top: 10px; }
        
        .section-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; margin-top: 30px; }
        .section-label svg { width: 18px; height: 18px; fill: currentColor; }

        /* 同一行顯示容器 */
        .meaning-wrapper { 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin-bottom: 30px;
        }

        .meaning-text { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #334155; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .pos-tag { 
            background: var(--primary); 
            color: #fff; 
            padding: 2px 10px; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: bold;
        }

        /* 同反義詞矩形標籤 */
        .relation-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-tag { font-size: 0.85rem; margin-right: 8px; font-weight: 800; }
        .syn-badge { background-color: #e6f9ed; color: #1e6b45; }
        .syn-badge .badge-tag { color: #5bb381; }
        .ant-badge { background-color: #fdeced; color: #931b1b; }
        .ant-badge .badge-tag { color: #d16b6b; }

        /* --- Markdown 樣式修正 --- */
        .md-bold { 
            font-weight: 800; 
            color: #000000; /* 修改為純黑色 */
        }
        .md-context { color: #64748b; font-weight: 800; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; border: 1px solid #e2e8f0; }
        .md-tag { font-family: 'Courier New', monospace; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; padding: 1px 5px; border-radius: 4px; font-weight: 600; }

        .example-item { background: #f8fafc; padding: 22px; border-radius: 18px; margin-bottom: 15px; border-left: 6px solid var(--primary); }
        .ex-en { font-size: 1.25rem; color: #1e293b; font-weight: 500; margin-bottom: 8px; }
        .example-word {
            color: var(--primary);
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        .example-word:hover {
            color: #0f172a;
        }
        .example-word-self {
            color: inherit;
            text-decoration: none;
            cursor: default;
        }
        .detail-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 22px;
            align-items: center;
        }
        .nav-btn {
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #0f172a;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease;
        }
        .nav-btn:hover:not(:disabled) {
            background: #f8fafc;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8fafc;
        }
        .example-tooltip {
            position: fixed;
            z-index: 9999;
            max-width: 240px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.95);
            color: #f8fafc;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22);
            pointer-events: none;
            transition: opacity 120ms ease;
            opacity: 0;
            transform: translate(-50%, -8px);
            font-size: 0.92rem;
            line-height: 1.5;
        }
        .example-tooltip.visible {
            opacity: 1;
        }
        .example-tooltip strong {
            display: block;
            margin-bottom: 6px;
            font-size: 1rem;
            color: #f8fafc;
        }
        .example-tooltip .tooltip-meta {
            font-size: 0.88rem;
            color: #cbd5e1;
        }
        .ex-ch { color: #64748b; }
        .level-badge { display: inline-block; padding: 6px 18px; border-radius: 50px; background: #e0f2fe; color: #0369a1; font-weight: 800; }

        @media (max-width: 640px) {
            .detail-container { margin: 20px auto; padding: 0 14px; }
            .detail-card { padding: 28px 18px; border-radius: 20px; }
            .header-box { padding-bottom: 22px; margin-bottom: 24px; }
            .word-title { font-size: 2.4rem; }
            .pronunciation { flex-wrap: wrap; gap: 10px; font-size: 1rem; }
            .section-label { font-size: 0.82rem; gap: 6px; margin-top: 24px; }
            .meaning-wrapper { flex-direction: column; align-items: stretch; gap: 14px; }
            .relation-badge { width: 100%; justify-content: flex-start; white-space: normal; padding: 10px 14px; }
            .meaning-text { font-size: 1.25rem; }
            .example-item { padding: 18px; }
            .ex-en { font-size: 1.1rem; }
            .level-badge { width: 100%; text-align: center; padding: 10px 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="vocabulary-list.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <span class="header-title-area">單字詳細說明</span>
        </div>
    </header>

    <main class="detail-container" id="detail-root">
        <div class="error-view">正在檢索字庫...</div>
    </main>

    <script src="../scripts/utils.js"></script>
    <script>
        const ICONS = {
            meaning: '<svg viewBox="0 0 24 24"><path d="M4 9h16v2H4V9zm0 4h10v2H4v-2zm0-8h16v2H4V5zm0 12h16v2H4v-2z"/></svg>',
            example: '<svg viewBox="0 0 24 24"><path d="M21 6h-2v9H6V3H4v18h2v-2h15V6z"/></svg>',
            info: '<svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>'
        };

        let vocabMap = new Map();
        let vocabKeys = [];
        let vocabList = [];
        let formEntries = [];
        let irregularForms = {};
        let currentWordKey = '';
        let currentMode = 'level';
        const tooltipEl = document.createElement('div');
        tooltipEl.className = 'example-tooltip';
        document.body.appendChild(tooltipEl);

        function normalizeWordKey(word) {
            if (!word) return '';
            return word
                .replace(/\s*\(\d+\)(?:\s*\(\d+\))*$/g, '')
                .trim()
                .toLowerCase();
        }

        function buildVocabIndex(list) {
            const map = new Map();
            const listKeys = [];
            list.forEach(item => {
                const wordKey = normalizeWordKey(item.word);
                if (wordKey) {
                    map.set(wordKey, item);
                    if (!listKeys.includes(wordKey)) listKeys.push(wordKey);
                }

                if (item.word.includes('/')) {
                    item.word.split('/').forEach(part => {
                        const normalized = normalizeWordKey(part.trim());
                        if (normalized) {
                            map.set(normalized, item);
                        }
                    });
                }
            });
            const keys = Array.from(new Set(map.keys())).sort((a, b) => b.length - a.length);
            formEntries = buildFormEntries(keys);
            return { map, keys, listKeys };
        }

        function sortVocabList(keys, mode) {
            const sorted = keys.slice();
            if (mode === 'alpha') {
                return sorted.sort((a, b) => a.localeCompare(b));
            }
            return sorted.sort((a, b) => {
                const itemA = vocabMap.get(a);
                const itemB = vocabMap.get(b);
                if (!itemA || !itemB) return a.localeCompare(b);
                if (itemA.level !== itemB.level) return itemA.level - itemB.level;
                return a.localeCompare(b);
            });
        }

        function buildFormEntries(keys) {
            const entries = [];
            keys.forEach(key => {
                entries.push({ form: key, key });
                if (key.includes(' ') || key.includes('/')) return;
                generateInflections(key).forEach(form => entries.push({ form, key }));
            });
            const unique = new Map();
            entries.forEach(entry => {
                const form = entry.form;
                if (!unique.has(form)) unique.set(form, entry);
            });
            return Array.from(unique.values()).sort((a, b) => b.form.length - a.form.length);
        }

        function generateInflections(key) {
            const forms = new Set();
            const irregular = irregularForms[key];
            if (irregular) {
                irregular.forEach(form => forms.add(form.toLowerCase()));
            }

            if (!key.match(/[^a-z ]/)) {
                if (!key.endsWith('s') && !key.endsWith('x') && !key.endsWith('z') && !key.endsWith('ch') && !key.endsWith('sh')) {
                    forms.add(`${key}s`);
                } else {
                    forms.add(`${key}es`);
                }

                if (key.endsWith('y')) {
                    const stem = key.slice(0, -1);
                    forms.add(`${stem}ies`);
                    forms.add(`${stem}ily`);
                    forms.add(`${stem}ier`);
                    forms.add(`${stem}iest`);
                } else {
                    forms.add(`${key}ly`);
                    forms.add(`${key}er`);
                    forms.add(`${key}est`);
                }

                if (key.endsWith('e')) {
                    forms.add(`${key}d`);
                    forms.add(`${key.slice(0, -1)}ing`);
                } else {
                    forms.add(`${key}ed`);
                    forms.add(`${key}ing`);
                }
            }

            return Array.from(forms);
        }

        function normalizeBoundary(text) {
            return /[^A-Za-z0-9_]/.test(text);
        }

        function isBoundary(text, start, length) {
            const before = start === 0 || normalizeBoundary(text[start - 1]);
            const after = start + length >= text.length || normalizeBoundary(text[start + length]);
            return before && after;
        }

        function makeExampleWordHtml(word, item) {
            const display = escapeHtml(word);
            const normalizedItemKey = normalizeWordKey(item.word);
            if (normalizedItemKey === currentWordKey) {
                return `<span class="example-word-self">${display}</span>`;
            }
            const href = `vocabulary-detail.html?word=${encodeURIComponent(item.word)}`;
            return `<a class="example-word" href="${href}" data-word="${escapeHtml(item.word)}" data-pos="${escapeHtml(item.pos || '')}" data-ch="${escapeHtml(item.ch || '')}">${display}</a>`;
        }

        function extractTrailingNumber(text, start) {
            const match = text.slice(start).match(/^(\s*(?:\(\d+\)(?:\s*\(\d+\))*))/);
            if (!match) return { annotation: '', length: 0 };
            const annotation = match[1];
            const endIndex = start + annotation.length;
            const after = endIndex >= text.length || normalizeBoundary(text[endIndex]);
            return after ? { annotation, length: annotation.length } : { annotation: '', length: 0 };
        }

        function annotateSentenceSegment(text) {
            let html = '';
            const lower = text.toLowerCase();
            let index = 0;

            while (index < text.length) {
                let matched = null;
                let matchedKey = '';

                for (const entry of formEntries) {
                    if (lower.startsWith(entry.form, index) && isBoundary(text, index, entry.form.length)) {
                        matched = text.substr(index, entry.form.length);
                        matchedKey = entry.key;
                        break;
                    }
                }

                if (matched) {
                    const item = vocabMap.get(matchedKey);
                    const nextPos = index + matched.length;
                    const trailing = extractTrailingNumber(text, nextPos);
                    html += makeExampleWordHtml(matched, item || { word: matched, pos: '', ch: '' });
                    if (trailing.length > 0) {
                        html += escapeHtml(trailing.annotation);
                        index += matched.length + trailing.length;
                    } else {
                        index += matched.length;
                    }
                } else {
                    html += escapeHtml(text[index]);
                    index += 1;
                }
            }

            return html;
        }

        function renderExampleSentence(text) {
            const parts = text.split(/(\*\*.*?\*\*)/g);
            return parts.map(part => {
                if (part.startsWith('**') && part.endsWith('**')) {
                    const content = part.slice(2, -2);
                    return `<strong>${annotateSentenceSegment(content)}</strong>`;
                }
                return annotateSentenceSegment(part);
            }).join('');
        }

        function navigateToNeighbor(direction) {
            const index = vocabList.indexOf(currentWordKey);
            if (index === -1) return;
            const nextIndex = index + direction;
            if (nextIndex < 0 || nextIndex >= vocabList.length) return;
            const nextKey = vocabList[nextIndex];
            const item = vocabMap.get(nextKey);
            if (!item) return;
            window.location.href = `vocabulary-detail.html?word=${encodeURIComponent(item.word)}&mode=${currentMode}`;
        }

        function updateNavButtons() {
            const prevButton = document.getElementById('prev-word');
            const nextButton = document.getElementById('next-word');
            if (!prevButton || !nextButton) return;
            const index = vocabList.indexOf(currentWordKey);
            prevButton.disabled = index <= 0;
            nextButton.disabled = index === -1 || index >= vocabList.length - 1;
        }

        function showTooltipForTarget(target, event) {
            const word = target.dataset.word;
            const pos = target.dataset.pos;
            const ch = target.dataset.ch;
            tooltipEl.innerHTML = `
                <strong>${escapeHtml(word)}</strong>
                <div class="tooltip-meta">${escapeHtml(pos)}${pos && ch ? ' · ' : ''}${escapeHtml(ch)}</div>
            `;
            const offsetX = 16;
            const offsetY = 12;
            const x = event.clientX + offsetX;
            const y = event.clientY + offsetY;
            tooltipEl.style.left = `${x}px`;
            tooltipEl.style.top = `${y}px`;
            tooltipEl.classList.add('visible');

            const bounds = tooltipEl.getBoundingClientRect();
            if (bounds.right > window.innerWidth - 12) {
                tooltipEl.style.left = `${Math.max(12, event.clientX - bounds.width - offsetX)}px`;
            }
            if (bounds.bottom > window.innerHeight - 12) {
                tooltipEl.style.top = `${Math.max(12, event.clientY - bounds.height - offsetY)}px`;
            }
        }

        document.addEventListener('pointerover', event => {
            const target = event.target.closest('.example-word');
            if (target) {
                showTooltipForTarget(target, event);
            }
        });

        document.addEventListener('pointermove', event => {
            const target = event.target.closest('.example-word');
            if (target && tooltipEl.classList.contains('visible')) {
                showTooltipForTarget(target, event);
            }
        });

        document.addEventListener('pointerout', event => {
            const target = event.target.closest('.example-word');
            if (target) {
                tooltipEl.classList.remove('visible');
            }
        });

        async function fetchDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('word');
            const mode = urlParams.get('mode');
            if (!target) return;
            currentMode = mode === 'alpha' ? 'alpha' : 'level';

            try {
                const [vocabRes, irregularRes] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/vocabulary.json'),
                    fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/irregular-forms.json')
                ]);

                if (!vocabRes.ok) throw new Error('Vocabulary JSON load failed');
                if (!irregularRes.ok) throw new Error('Irregular forms JSON load failed');

                const [data, irregularData] = await Promise.all([vocabRes.json(), irregularRes.json()]);
                irregularForms = irregularData;

                const index = buildVocabIndex(data);
                vocabMap = index.map;
                vocabKeys = index.keys;
                vocabList = sortVocabList(index.listKeys, currentMode);
                const targetKey = normalizeWordKey(target);
                const wordData = data.find(w => normalizeWordKey(w.word) === targetKey);
                if (wordData) renderDetail(wordData);
                else renderNotFound();
            } catch (e) { renderNotFound(); }
        }

        function renderDetail(w) {
            currentWordKey = normalizeWordKey(w.word);
            const root = document.getElementById('detail-root');
            
            let relationHtml = '';
            if (w.syn && w.syn.length > 0) {
                relationHtml += `
                    <div class="relation-badge syn-badge">
                        <span class="badge-tag">同義</span>
                        <span class="badge-text">${w.syn.join(', ')}</span>
                    </div>`;
            }
            if (w.ant && w.ant.length > 0) {
                relationHtml += `
                    <div class="relation-badge ant-badge">
                        <span class="badge-tag">反義</span>
                        <span class="badge-text">${w.ant.join(', ')}</span>
                    </div>`;
            }

            root.innerHTML = `
                <div class="detail-card">
<div class="detail-nav">
                    <button id="prev-word" class="nav-btn" onclick="navigateToNeighbor(-1)" disabled>上一個單字</button>
                    <button id="next-word" class="nav-btn" onclick="navigateToNeighbor(1)" disabled>下一個單字</button>
                </div>

                <div class="header-box">
                    <h1 class="word-title">${w.word}</h1>
                    <div class="pronunciation">
                        <span>${w.kk || ''}</span>
                        <button onclick="speak('${w.word}', 'en-US')" style="border:none; background:none; cursor:pointer; color:var(--primary)">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </button>
                    </div>
                    </div>

                    <div class="section-label">${ICONS.meaning} 譯義與補充</div>
                    
                    <div class="meaning-wrapper">
                        <div class="meaning-text">
                            <span class="pos-tag">${w.pos}</span>
                            <span>${w.ch}</span>
                        </div>
                        ${relationHtml}
                    </div>

                    <div class="section-label">${ICONS.info} 詳細說明</div>
                    <div style="line-height:1.8; color:#475569; margin-bottom:35px; font-size:1.1rem;">
                        ${parseMarkdown(w.desc || '暫無額外說明。')}
                    </div>

                    <div class="section-label">${ICONS.example} 情境例句</div>
                    ${w.sentences.map(s => `
                        <div class="example-item">
                            <div class="ex-en">${renderExampleSentence(s.en)}</div>
                            <div class="ex-ch">${parseMarkdown(s.ch)}</div>
                        </div>
                    `).join('')}

                    <div style="margin-top:40px; text-align:right;">
                        <span class="level-badge">LEVEL ${w.level}</span>
                    </div>
                </div>
            `;
            updateNavButtons();
        }

        function renderNotFound() {
            document.getElementById('detail-root').innerHTML = `<div class="error-view"><h2>單字未找到</h2></div>`;
        }

        fetchDetail();
    </script>
</body>
</html>
