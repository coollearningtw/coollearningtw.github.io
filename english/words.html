<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字背誦</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <style>
        body { padding-bottom: 100px; }
        .head-actions { display: flex; gap: 8px; }
        .search-section { margin-bottom: 15px; position: sticky; top: 80px; z-index: 90; background-color: var(--bg-color); padding: 10px 0; }
        .search-row { display: flex; gap: 10px; width: 100%; }
        .search-input-group { position: relative; flex: 1; }
        .search-icon-hint { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
        .search-input { width: 100%; padding: 12px 15px 12px 42px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; background-color: #fff; outline: none; }
        .pos-select { padding: 0 10px; border-radius: 12px; border: 1px solid #ddd; background-color: #fff; font-size: 0.9rem; min-width: 110px; cursor: pointer; }
        .word-list-item { padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .w-info h3 { margin: 0; font-size: 1.2rem; }
        .w-info p { margin: 4px 0 0; color: #666; display: none; }
        .w-info p.show { display: block; }
        .playing { background: var(--primary-light) !important; border: 2px solid var(--primary) !important; }
        .word-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .flash-card-mini { padding: 20px; text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .btn-header-icon { background: none; border: none; cursor: pointer; color: var(--primary); display: flex; align-items: center; padding: 5px; }
        .btn-header-icon svg { width: 24px; height: 24px; }
        .btn-star.active { color: #f1c40f; fill: #f1c40f; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="english.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <img src="../images/logo.png" alt="Logo" height="40">
            <span style="font-weight:bold; color:var(--primary);">單字背誦</span>
        </div>
        <div class="header-right">
            <button class="btn-header-icon" onclick="toggleView()" title="切換視圖"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z"/></svg></button>
            <button class="btn-header-icon" onclick="toggleLang()" title="中英切換"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg></button>
            <button class="btn-header-icon" id="btn-fav-filter" onclick="toggleFavFilter()" title="最愛篩選"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
        </div>
    </header>

    <div class="page-container">
        <div class="search-section">
            <div class="search-row">
                <div class="search-input-group">
                    <svg class="search-icon-hint" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="search-input" class="search-input" placeholder="搜尋英文或中文...">
                </div>
                <select id="pos-filter" class="pos-select"><option value="">所有詞性</option></select>
            </div>
        </div>
        <div id="list-view"></div>
        <div id="grid-view" class="word-card-grid" style="display:none;"></div>
    </div>

    <script>
        let allWords=[], dispWords=[], favs=JSON.parse(localStorage.getItem('my_favs')||'[]');
        let isList=true, showCh=false, onlyFav=false, searchText='', filterPos='';

        (async()=>{
            const sel = JSON.parse(localStorage.getItem('sel_lessons')||'[]');
            if(!sel.length) { location.href='english.html'; return; }
            const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/english.json'); const d=await res.json();
            d.sources.forEach(s=>{ s.lessons.forEach(l=>{
                if(sel.some(x=>x.source===s.name && x.lesson===l.lesson)) allWords.push(...l.vocabulary);
            })});
            
            document.getElementById('search-input').oninput = (e) => { searchText = e.target.value.toLowerCase(); refresh(); };
            document.getElementById('pos-filter').onchange = (e) => { filterPos = e.target.value; refresh(); };
            refresh();
        })();

        function refresh() {
            dispWords = allWords.filter(w => {
                const matchSearch = w.word.toLowerCase().includes(searchText) || w.chinese.includes(searchText);
                const matchPos = !filterPos || (w.pos && w.pos.includes(filterPos));
                const matchFav = !onlyFav || favs.includes(w.word);
                return matchSearch && matchPos && matchFav;
            });
            renderList(); renderGrid();
        }

        function renderList() {
            const c = document.getElementById('list-view'); c.innerHTML='';
            dispWords.forEach((w,i)=>{
                const el = document.createElement('div'); el.className='std-card word-list-item';
                el.innerHTML = `
                    <div class="w-info"><h3>${w.word} <small>(${w.pos})</small></h3><p class="${showCh?'show':''}">${w.chinese}</p></div>
                    <div class="head-actions"><button class="btn-header-icon btn-star ${favs.includes(w.word)?'active':''}" onclick="togFav('${w.word}',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button></div>
                `;
                el.onclick = (e) => { if(e.target.tagName!=='BUTTON' && e.target.tagName!=='svg' && e.target.tagName!=='path') speak(w.word); };
                c.appendChild(el);
            });
        }

        function renderGrid() {
            const c = document.getElementById('grid-view'); c.innerHTML='';
            dispWords.forEach((w,i)=>{
                const el = document.createElement('div'); el.className='std-card flash-card-mini';
                el.innerHTML = `<div style="font-weight:bold;font-size:1.2rem;">${w.word}</div><div class="${showCh?'':'show'}" style="color:#666;font-size:0.9rem;">${w.chinese}</div>`;
                el.onclick = () => speak(w.word);
                c.appendChild(el);
            });
        }

        function toggleView() { isList=!isList; document.getElementById('list-view').style.display=isList?'block':'none'; document.getElementById('grid-view').style.display=isList?'none':'grid'; }
        function toggleLang() { showCh=!showCh; refresh(); }
        function toggleFavFilter() { onlyFav=!onlyFav; document.getElementById('btn-fav-filter').classList.toggle('active', onlyFav); refresh(); }
        function togFav(w,btn) { if(favs.includes(w)) favs=favs.filter(x=>x!==w); else favs.push(w); localStorage.setItem('my_favs', JSON.stringify(favs)); btn.classList.toggle('active'); }
        function speak(t) { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
