<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: "Noto Sans TC", sans-serif; line-height: 1.7; color: #475569; padding: 30px; margin: 0; }
        h2 { color: #334155; display: flex; align-items: center; gap: 10px; font-size: 1.5rem; margin-top: 0; }
        .qa-box { margin-bottom: 25px; }
        .question { font-weight: 600; color: #334155; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .answer { font-size: 0.95rem; background: #f8fafc; padding: 15px; border-radius: 8px; color: #64748b; }
        svg { width: 20px; height: 20px; fill: #64748b; }
    </style>
</head>
<body>
    <h2>常見問題解答</h2>

    <div class="qa-box">
        <div class="question"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>測驗進度會消失嗎？</div>
        <div class="answer">資料目前儲存於您目前的瀏覽器中。清除快取、更換瀏覽器或裝置將無法保留數據。</div>
    </div>

    <div class="qa-box">
        <div class="question"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>聽不到語音發音？</div>
        <div class="answer">系統使用瀏覽器內建 TTS 技術。若無聲音，請確認系統音量、瀏覽器權限，或更新您的 Chrome/Edge 瀏覽器。</div>
    </div>

    <div class="qa-box">
        <div class="question"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>如何回報錯誤？</div>
        <div class="answer">點擊頁面右下角的「問題回報」圖示，即可填寫表單。我們會盡快針對內容勘誤進行修正。</div>
    </div>
</body>
</html>
