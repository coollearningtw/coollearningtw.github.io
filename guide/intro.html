<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: "Noto Sans TC", sans-serif; line-height: 1.7; color: #475569; padding: 30px; margin: 0; background-color: #ffffff; }
        h2 { color: #334155; display: flex; align-items: center; gap: 10px; font-size: 1.5rem; margin-top: 0; }
        .highlight { color: #0b76d1; font-weight: 600; }
        .card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 12px; padding: 20px; margin: 20px 0; }
        .platform-note { background: #f1f5f9; border-left: 4px solid #cbd5e1; padding: 15px; margin-top: 30px; font-size: 0.9rem; color: #64748b; }
        svg { width: 24px; height: 24px; fill: #64748b; }
    </style>
</head>
<body>
    <h2>
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        關於 酷學習 平台
    </h2>
    <p>歡迎來到 <span class="highlight">酷學習 (Cool Learning)</span>。這是一個專為數位學習時代打造的整合式平台，旨在透過簡約的介面與強大的互動功能，讓您的學習過程更高效、更有趣。</p>
    
    <div class="card">
        <p>在首頁，您可以快速存取核心模組：</p>
        <ul style="padding-left: 20px;">
            <li><span class="highlight">學科導航：</span>點擊中央的大型卡片即可進入國文、英文等專屬學習區。</li>
            <li><span class="highlight">動態公告：</span>系統會主動推播最新的更新與題庫徵集資訊。</li>
            <li><span class="highlight">習慣養成：</span>左側的簽到系統協助您記錄每日的堅持。</li>
        </ul>
    </div>

    <div class="platform-note">
        本平台由 <span class="highlight">Gemini AI</span> 輔助開發，致力於提供最流暢、最純粹的 Web 學習環境。
    </div>
</body>
</html>
