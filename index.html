<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta property="og:image" content="https://coollearningtw.github.io/images/OGImage.jpg">
    <meta property="og:url" content="https://coollearningtw.github.io/">
    <meta property="og:description" content="一個結合互動與趣味的線上學習平台，讓學習不再枯燥。">
    <meta property="og:type" content="website">
    <title>酷學習 - 首頁</title>

    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/announcement.css">

    <link rel="icon" type="image/png" href="images/logo2400x.png">
    <style>
        /* 首頁專屬佈局調整 */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 980px;
            margin: 40px auto;
            padding: 0 20px;
            align-items: flex-start;
        }

        /* 左側簽到區 */
        .checkin-section {
            flex: 1;
            min-width: 300px;
            margin: 0;
            padding: 0;
            display: block;
        }
        .checkin-card {
            width: 100%;
            max-width: 100%;
            margin: 0;
            aspect-ratio: auto;
            min-height: 320px;
        }

        /* 右側科目區 */
        .subjects-section {
            flex: 2;
            min-width: 300px;
        }

        .subject-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .subject-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            position: relative;
            overflow: hidden;
        }

        .subject-card.top-row { width: calc(50% - 8px); }
        .subject-card.bottom-row { width: calc(33.333% - 10px); }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(11,118,209,0.15);
        }

        .subject-icon svg {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }
        .card-tag {
            position: absolute;
            top: 10px;
            right: -25px;
            color: white;
            padding: 2px 30px;
            font-size: 0.7rem;
            transform: rotate(45deg);
            font-weight: bold;
        }

        /* 技能館網格 */
        .skills-grid, .skills-flex-grid {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        /* 技能卡片通用基礎 */
        .skill-card, .skills-flex-grid .subject-card {
            position: relative;
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            min-height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1 1 0;
            min-width: 0;
        }

        .skill-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .skill-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .skill-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .skill-icon svg { width: 35px; height: 35px; fill: currentColor; }

        .skill-info h3 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .skill-info p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        /* --- 技能卡片樣式設計 --- */

        /* 日語館 */
        .card-jp {
            background: linear-gradient(135deg, #fff5f7 0%, #fce7f3 100%);
            color: #db2777;
            border-color: #f9a8d4;
        }

        /* 西洋棋 */
        .card-chess {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: #f8fafc;
            border-color: #475569;
        }
        .card-chess .skill-icon { background: rgba(255, 255, 255, 0.1); color: #fbbf24; }

        /* 魔術方塊 */
        .card-cube {
            background: #ffffff;
            color: #1e293b;
            border: 2px solid #e2e8f0;
        }
        .card-cube .skill-icon { background: #f1f5f9; color: #3b82f6; }

        @media (max-width: 600px) {
            .skills-grid, .skills-flex-grid {
                flex-direction: column;
            }
            .skill-info h3 { font-size: 1.2rem; }
        }

        @media (max-width: 768px) {
            .subject-card.top-row, .subject-card.bottom-row {
                width: 100%;
            }
        }
    </style>
</head>

    <!-- 1. 雙模與資料轉移簽到邏輯：監聽全域 Auth 狀態，並支援本地紀錄合併轉移 -->
    <script>
        (async () => {
            const totalDaysEl = document.getElementById('totalDays');
            const msgEl = document.getElementById('checkinMsg');
            const btn = document.getElementById('checkinBtn');
            const todayStr = new Date().toISOString().slice(0, 10);

            let currentAuthUser = null;

            // 核心響應式函數：不論何時登入狀態改變，皆會立刻重新渲染本卡片
            async function renderCheckinSystem(user) {
                currentAuthUser = user;
                
                // 1. 讀取瀏覽器 LocalStorage 中的本地簽到資料 (訪客資料)
                const localDays = parseInt(localStorage.getItem('checkin_totalDays') || '0', 10);
                const localLastDate = localStorage.getItem('checkin_lastDate');

                if (user) {
                    // =========================================================================
                    // 雲端同步簽到模式 (已登入狀態)
                    // =========================================================================
                    try {
                        // 2. 獲取當前雲端用戶 profiles 的簽到數據
                        let { data: profile, error } = await window.supabaseClient
                            .from('profiles')
                            .select('checkin_count, last_checkin_date')
                            .eq('id', user.id)
                            .single();

                        if (error) throw error;

                        let cloudCount = (profile && profile.checkin_count) ? parseInt(profile.checkin_count) : 0;
                        let cloudLastDate = profile ? profile.last_checkin_date : null;

                        // 3. 【資料轉移判定】如果瀏覽器本地有舊資料，且使用者已登入
                        if (localDays > 0) {
                            // 變更 UI 為「轉移提示卡片」
                            totalDaysEl.textContent = `${cloudCount} (+${localDays})`;
                            msgEl.innerHTML = `偵測到本機有 <strong>${localDays} 天</strong> 未同步資料，是否將紀錄合併轉移至您的雲端帳號？`;
                            
                            btn.disabled = false;
                            btn.textContent = '確認轉移資料';
                            // 視覺引導：轉移按鈕改為綠色風格
                            btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)'; 
                            btn.style.boxShadow = '0 6px 18px rgba(16,185,129,0.2)';
                            btn.style.color = '#fff';

                            btn.onclick = async () => {
                                btn.disabled = true;
                                btn.textContent = '正在轉移中...';

                                // 合併本地天數與雲端天數
                                const mergedCount = cloudCount + localDays;
                                // 判斷最後簽到日期 (取較新者)
                                const mergedDate = (localLastDate && (!cloudLastDate || localLastDate > cloudLastDate)) ? localLastDate : cloudLastDate;

                                // 寫入 Supabase 資料庫
                                const { error: updateErr } = await window.supabaseClient
                                    .from('profiles')
                                    .update({
                                        checkin_count: mergedCount,
                                        last_checkin_date: mergedDate
                                    })
                                    .eq('id', user.id);

                                if (updateErr) {
                                    console.error("雲端資料轉移失敗：", updateErr);
                                    alert("資料同步失敗，請確認資料庫是否已開通 checkin 欄位。");
                                    renderCheckinSystem(user);
                                } else {
                                    // 轉移成功：清除瀏覽器本地的 Guest 資料 (避免重複詢問)
                                    localStorage.removeItem('checkin_totalDays');
                                    localStorage.removeItem('checkin_lastDate');

                                    alert(`🎉 資料轉移成功！已將 ${localDays} 天本地紀錄合併至您的雲端帳號。`);
                                    
                                    // 重新刷新，進入標準雲端簽到模式
                                    renderCheckinSystem(user);
                                }
                            };
                            return; // 優先處理轉移流程，直接返回
                        }

                        // 4. 標準雲端簽到流程 (重設為原本的藍色按鈕樣式)
                        btn.style.background = ''; 
                        btn.style.boxShadow = '';
                        btn.style.color = '';

                        const hasCheckedInToday = (cloudLastDate === todayStr);
                        totalDaysEl.textContent = cloudCount;

                        if (hasCheckedInToday) {
                            btn.disabled = true;
                            btn.textContent = '今日已簽到';
                            msgEl.textContent = '已成功同步雲端簽到，明天再來！';
                        } else {
                            btn.disabled = false;
                            btn.textContent = '雲端簽到';
                            msgEl.textContent = '點擊完成今日簽到，累積天數會同步至您的帳號。';
                        }

                        btn.onclick = async () => {
                            if (hasCheckedInToday) return;
                            btn.disabled = true;
                            btn.textContent = '同步中...';

                            cloudCount++;
                            cloudLastDate = todayStr;

                            const { error: updateErr } = await window.supabaseClient
                                .from('profiles')
                                .update({
                                    checkin_count: cloudCount,
                                    last_checkin_date: todayStr
                                })
                                .eq('id', user.id);

                            if (updateErr) {
                                console.error("簽到更新失敗：", updateErr);
                                alert("簽到同步失敗，請重試！");
                                btn.disabled = false;
                                btn.textContent = '雲端簽到';
                            } else {
                                renderCheckinSystem(user);
                            }
                        };

                    } catch (e) {
                        console.warn("讀取雲端簽到數據失敗，自動退回訪客模式：", e);
                        handleLocalStorageFallback(localDays, localLastDate);
                    }

                } else {
                    // =========================================================================
                    // 訪客本地儲存模式 (未登入狀態)
                    // =========================================================================
                    btn.style.background = ''; 
                    btn.style.boxShadow = '';
                    btn.style.color = '';
                    handleLocalStorageFallback(localDays, localLastDate);
                }
            }

            function handleLocalStorageFallback(localDays, localLastDate) {
                totalDaysEl.textContent = localDays;
                const hasCheckedInToday = (localLastDate === todayStr);

                if (hasCheckedInToday) {
                    btn.disabled = true;
                    btn.textContent = '今日已簽到';
                    msgEl.textContent = '已儲存於瀏覽器，登入帳號可防止進度遺失。';
                } else {
                    btn.disabled = false;
                    btn.textContent = '訪客簽到';
                    msgEl.textContent = '天數儲存於本機。建議登入以將進度同步至雲端。';
                }

                btn.onclick = function() {
                    if (hasCheckedInToday) return;
                    const newDays = localDays + 1;
                    localStorage.setItem('checkin_lastDate', todayStr);
                    localStorage.setItem('checkin_totalDays', String(newDays));
                    renderCheckinSystem(null); // 重新渲染訪客 UI
                };
            }

            // =========================================================================
            // 核心修改：利用 Supabase 全域認證監聽器，確保登入解析完成後立即重繪 UI
            // =========================================================================
            if (window.supabaseClient) {
                window.supabaseClient.auth.onAuthStateChange((event, session) => {
                    const user = session ? session.user : null;
                    renderCheckinSystem(user);
                });
            } else {
                handleLocalStorageFallback(0, null);
            }
        })();
    </script>

    <!-- 2. PWA Service Worker 註冊 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功', reg))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }
    </script>

    <script>
    // 3. 連點五下 Logo 跳轉管理後台安全彩蛋 (新增：管理員預審機制，非管理員點擊完全不跳轉)
        (() => {
            const logoArea = document.getElementById('main-logo-area');
            let clickCount = 0;
            let timer = null;
            
            logoArea.addEventListener('click', async function() {
                clickCount++;
                clearTimeout(timer);
                timer = setTimeout(() => { clickCount = 0; }, 600);
                
                if (clickCount === 5) {
                    clickCount = 0; // 重置計數器
                    
                    // 執行預審：檢查 Supabase 是否有登入，且角色是否為 admin
                    if (window.supabaseClient) {
                        try {
                            const { data: { session } } = await window.supabaseClient.auth.getSession();
                            
                            if (session && session.user) {
                                const { data: profile } = await window.supabaseClient
                                    .from('profiles')
                                    .select('role')
                                    .eq('id', session.user.id)
                                    .single();
                                
                                // 只有當確定是管理員時，才允許執行跳轉
                                if (profile && profile.role === 'admin') {
                                    window.location.href = 'admin/index.html';
                                    return;
                                }
                            }
                        } catch (err) {
                            console.error("管理員預審發生錯誤:", err);
                        }
                    }
                    
                    // 如果不是管理員，完全不跳轉，假裝什麼都沒發生
                    console.log("安全提示：未檢測到管理員權限，拒絕跳轉。");
                }
            });
        })();
    </script>
</body>
