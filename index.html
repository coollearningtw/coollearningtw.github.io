<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta property="og:image" content="https://coollearningtw.github.io/images/OGImage.jpg">
    <meta property="og:url" content="https://coollearningtw.github.io/">
    <meta property="og:description" content="一個結合互動與趣味的線上學習平台，讓學習不再枯燥。">
    <meta property="og:type" content="website">
    <title>酷學習 - 首頁</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/announcement.css">
    <link rel="stylesheet" href="styles/feedback.css">
    <link rel="icon" type="image/png" href="images/logo2400x.png">
    <style>
        /* 首頁專屬佈局調整 */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 980px;
            margin: 40px auto;
            padding: 0 20px;
            align-items: flex-start;
        }

        /* 左側簽到區 */
        .checkin-section {
            flex: 1;
            min-width: 300px;
            margin: 0;
            padding: 0;
            display: block;
        }
        .checkin-card {
            width: 100%;
            max-width: 100%;
            margin: 0;
            aspect-ratio: auto;
            min-height: 320px;
        }

        /* 右側科目區 */
        .subjects-section {
            flex: 2;
            min-width: 300px;
        }

        .subject-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .subject-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            position: relative;
            overflow: hidden;
        }

        .subject-card.top-row { width: calc(50% - 8px); }
        .subject-card.bottom-row { width: calc(33.333% - 10px); }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(11,118,209,0.15);
        }

        .subject-icon svg {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .subject-card.top-row, .subject-card.bottom-row {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Logo" height="50px">
            <img src="images/logo_text.png" alt="知識酷字標" height="40">
        </div>
        <div class="links">
            <a href="guide/index.html" class="guide-link" style="font-weight:bold; color:var(--primary,#0b76d1); margin-left:18px;">使用指南</a>
        </div>
    </header>

    <div class="main-layout">
        <section class="checkin-section">
            <div class="checkin-card">
                <div class="checkin-left">
                    <h2>每日簽到</h2>
                    <p>累積天數：<span id="totalDays">0</span> 天</p>
                    <p id="checkinMsg" class="checkin-msg"></p>
                </div>
                <div class="checkin-right">
                    <button id="checkinBtn" class="checkin-btn">簽到</button>
                </div>
            </div>
        </section>

        <section class="subjects-section">
            <div class="subject-grid">
                <a href="chinese/chinese.html" class="subject-card top-row">
                    <div class="subject-icon">
                        <svg viewBox="0 0 24 24" fill="#e74c3c"><path d="M3 3v17a1 1 0 001 1h17v-2H5V3H3m15.25 6.75c.41-.41.41-1.09 0-1.5l-1.5-1.5c-.41-.41-1.09-.41-1.5 0l-8.25 8.25V18h2.25l8.25-8.25m-8.5 5l-3 3 3 3h10v-6h-10z"/></svg>
                    </div>
                    <span class="subject-name">國文</span>
                </a>
                
                <a href="#" class="subject-card top-row" style="pointer-events:none; opacity:0.6;">
                    <div class="subject-icon">
                        <svg viewBox="0 0 24 24" fill="#f1c40f"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m-7 3c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1m4 12h-2v-2h2v2m0-4h-2v-2h2v2m-4 4H8v-2h2v2m0-4H8v-2h2v2m-2-4h2v2H8V10m6-2h-2V6h2v2z"/></svg>
                    </div>
                    <span class="subject-name">數學</span>
                </a>

                <a href="english/english.html" class="subject-card bottom-row">
                    <div class="subject-icon">
                        <svg viewBox="0 0 24 24" fill="#0b76d1"><path d="M11.5 4L6 20h2.2l1.1-4h5.4l1.1 4H18L12.5 4h-1M10 13l2-6 2 6h-4z"/></svg>
                    </div>
                    <span class="subject-name">English</span>
                </a>

                <a href="#" class="subject-card bottom-row" style="pointer-events:none; opacity:0.6;">
                    <div class="subject-icon">
                        <svg viewBox="0 0 24 24" fill="#2ecc71"><path d="M20.8 18.4L15 5.86V4h1v-2H8v2h1v1.86L3.2 18.4A3.28 3.28 0 006 22h12a3.28 3.28 0 002.8-3.6zM18.5 19l-3.3-5H8.8l-3.3 5H18.5z"/></svg>
                    </div>
                    <span class="subject-name">自然</span>
                </a>

                <a href="#" class="subject-card bottom-row" style="pointer-events:none; opacity:0.6;">
                    <div class="subject-icon">
                        <svg viewBox="0 0 24 24" fill="#9b59b6"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                    <span class="subject-name">社會</span>
                </a>
            </div>
        </section>
    </div>

    <!-- 懸浮回報按鈕 -->
    <button id="feedback-fab" title="問題回報與建議">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>

    <div id="feedback-modal-overlay" class="feedback-overlay">
        <div id="feedback-modal-card" class="feedback-card">
            <div class="feedback-header">
                <h3>問題回報 & 內容建議</h3>
                <button id="feedback-close-btn" class="feedback-close" style="color:#555">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="feedback-form">
                <div class="form-group">
                    <label for="feedback-type">回報類型 <span class="required">*</span></label>
                    <select id="feedback-type" name="entry.499601865" required>
                        <option value="" disabled selected>請選擇...</option>
                        <option value="問題回報 (網站功能、顯示異常等)">問題回報 (網站功能、顯示異常等)</option>
                        <option value="內容勘誤 (單字、翻譯錯誤等)">內容勘誤 (單字、翻譯錯誤等)</option>
                        <option value="內容建議 (新增題庫、新功能等)">內容建議 (新增題庫、新功能等)</option>
                    </select>
                </div>
                <div id="cascading-dropdowns" class="form-group-wrapper" style="display: none;">
                    <p class="form-group-label">勘誤範圍 (選填)</p>
                    <div class="dropdown-row">
                        <select id="feedback-source" name="source" disabled><option>選擇版本...</option></select>
                        <select id="feedback-lesson" name="lesson" disabled><option>選擇課別...</option></select>
                        <select id="feedback-word" name="word" disabled><option>選擇單字...</option></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="feedback-details">詳細說明 <span class="required">*</span></label>
                    <textarea id="feedback-details" name="entry.608420595" rows="5" placeholder="請盡可能詳細地描述您遇到的問題或建議..." required style="resize: none;"></textarea>
                </div>
                <input type="hidden" id="feedback-scope-hidden" name="entry.539772390" value="N/A">
                <div class="feedback-footer">
                    <button type="submit" id="feedback-submit-btn" class="btn">送出回報</button>
                </div>
            </form>
            <div id="feedback-success-msg" class="feedback-success" style="display: none;">
                <h4>✔ 感謝您的回報！</h4>
                <p>我們已收到您的訊息，將會盡快處理。</p>
                <button id="feedback-close-success-btn" class="btn">關閉</button>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const totalDaysEl = document.getElementById('totalDays');
            const msgEl = document.getElementById('checkinMsg');
            const btn = document.getElementById('checkinBtn');
            function todayKey() { return new Date().toISOString().slice(0,10); }
            function getTotalDays() { return parseInt(localStorage.getItem('checkin_totalDays') || '0', 10); }
            function getLastDate() { return localStorage.getItem('checkin_lastDate'); }
            function setCheckinDoneForToday() {
                localStorage.setItem('checkin_lastDate', todayKey());
                localStorage.setItem('checkin_totalDays', String(getTotalDays() + 1));
            }
            function updateUI() {
                totalDaysEl.textContent = getTotalDays();
                if (getLastDate() === todayKey()) {
                    btn.disabled = true; btn.textContent = '今日已簽到'; msgEl.textContent = '已成功簽到，明天再來！';
                } else {
                    btn.disabled = false; btn.textContent = '簽到'; msgEl.textContent = '每天簽到可累積天數。';
                }
            }
            btn.addEventListener('click', function(){
                if (getLastDate() === todayKey()) return;
                setCheckinDoneForToday(); updateUI(); msgEl.textContent = '簽到成功，已累積 ' + getTotalDays() + ' 天';
            });
            updateUI();
        })();
    </script>
    <script src="scripts/announcement.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/feedback.js"></script>
</body>
</html>
