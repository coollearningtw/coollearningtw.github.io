    <style>
        /* 首頁專屬佈局調整 */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 980px;
            margin: 40px auto;
            padding: 0 20px;
            align-items: flex-start;
        }

        /* 左側簽到區 */
        .checkin-section {
            flex: 1;
            min-width: 300px;
            margin: 0;
            padding: 0;
            display: block;
        }
        .checkin-card {
            width: 100%;
            max-width: 100%;
            margin: 0;
            aspect-ratio: auto;
            min-height: 320px;
        }

        /* 右側科目區 */
        .subjects-section {
            flex: 2;
            min-width: 300px;
        }

        .subject-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .subject-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            position: relative;
            overflow: hidden;
        }

        .subject-card.top-row { width: calc(50% - 8px); }
        .subject-card.bottom-row { width: calc(33.333% - 10px); }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(11,118,209,0.15);
        }

        .subject-icon svg {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }
        .card-tag {
            position: absolute;
            top: 10px;
            right: -25px;
            color: white;
            padding: 2px 30px;
            font-size: 0.7rem;
            transform: rotate(45deg);
            font-weight: bold;
        }

        /* 技能館網格 */
            .skills-grid, .skills-flex-grid {
                display: flex;
                gap: 20px;
                width: 100%;
            }

        /* 技能卡片通用基礎 */
            .skill-card, .skills-flex-grid .subject-card {
            position: relative;
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            min-height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
                flex: 1 1 0;
                min-width: 0;
        }

        .skill-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .skill-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .skill-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .skill-icon svg { width: 35px; height: 35px; fill: currentColor; }

        .skill-info h3 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .skill-info p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        /* --- 個別卡片樣式設計 --- */

        /* 日語館：櫻花粉 + 浮動假名背景 */
        .card-jp {
            background: linear-gradient(135deg, #fff5f7 0%, #fce7f3 100%);
            color: #db2777;
            border-color: #f9a8d4;
        }
        .card-jp .card-bg-decoration {
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 8rem;
            font-weight: 900;
            opacity: 0.1;
            font-family: "serif";
            transform: rotate(-15deg);
        }

        /* 西洋棋：石板黑 + 質感木紋感 */
        .card-chess {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: #f8fafc;
            border-color: #475569;
        }
        .card-chess .skill-icon { background: rgba(255, 255, 255, 0.1); color: #fbbf24; }
        .card-chess .card-bg-decoration {
            position: absolute;
            right: 10px;
            top: -10px;
            font-size: 7rem;
            opacity: 0.1;
        }

        /* 魔術方塊：白底 + 四色幾何裝飾 */
        .card-cube {
            background: #ffffff;
            color: #1e293b;
            border: 2px solid #e2e8f0;
        }
        .card-cube .skill-icon { background: #f1f5f9; color: #3b82f6; }
        .cube-accent {
            position: absolute;
            top: 0; right: 0; width: 80px; height: 80px;
            background: linear-gradient(45deg, #ef4444 25%, #3b82f6 25%, #3b82f6 50%, #fbbf24 50%, #fbbf24 75%, #22c55e 75%);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            opacity: 0.6;
        }

        /* 手機版適應 */
            @media (max-width: 600px) {
                .skills-grid, .skills-flex-grid {
                    flex-direction: column;
                }
                .skill-info h3 { font-size: 1.2rem; }
            }

        @media (max-width: 768px) {
            .subject-card.top-row, .subject-card.bottom-row {
                width: 100%;
            }
        }
    </style>

    <script>
        (function(){
            const totalDaysEl = document.getElementById('totalDays');
            const msgEl = document.getElementById('checkinMsg');
            const btn = document.getElementById('checkinBtn');
            function todayKey() { return new Date().toISOString().slice(0,10); }
            function getTotalDays() { return parseInt(localStorage.getItem('checkin_totalDays') || '0', 10); }
            function getLastDate() { return localStorage.getItem('checkin_lastDate'); }
            function setCheckinDoneForToday() {
                localStorage.setItem('checkin_lastDate', todayKey());
                localStorage.setItem('checkin_totalDays', String(getTotalDays() + 1));
            }
            function updateUI() {
                totalDaysEl.textContent = getTotalDays();
                if (getLastDate() === todayKey()) {
                    btn.disabled = true; btn.textContent = '今日已簽到'; msgEl.textContent = '已成功簽到，明天再來！';
                } else {
                    btn.disabled = false; btn.textContent = '簽到'; msgEl.textContent = '每天簽到可累積天數。';
                }
            }
            btn.addEventListener('click', function(){
                if (getLastDate() === todayKey()) return;
                setCheckinDoneForToday(); updateUI(); msgEl.textContent = '簽到成功，已累積 ' + getTotalDays() + ' 天';
            });
            updateUI();
        })();
    </script>

// 連點 LOGO 5 下進入管理員首頁
(() => {
    const logoArea = document.getElementById('main-logo-area');
    let clickCount = 0;
    let timer = null;
    logoArea.addEventListener('click', function() {
        clickCount++;
        clearTimeout(timer);
        timer = setTimeout(() => { clickCount = 0; }, 600);
        if (clickCount === 5) {
            window.location.href = 'admin/index.html';
        }
    });
})();
</script>
</body>
</html>
