<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五十音圖 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <!-- 引入日文字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --jp-primary: #fce7f3;
            --jp-accent: #db2777;
        }

        body { background-color: #fff5f7; padding-bottom: 50px; margin: 0; }

        .gojuon-wrapper {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(219, 39, 119, 0.05);
            border: 1px solid var(--jp-primary);
            box-sizing: border-box; /* 確保 padding 不會撐開寬度 */
        }

        .gojuon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(11, 80px);
            gap: 10px;
            width: 100%;
        }

        .kana-card {
            background: #fff;
            border: 1.5px solid #f1f5f9;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .kana-card:hover {
            border-color: var(--jp-accent);
            background-color: var(--jp-primary);
        }

        .kana-char {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }

        .romaji {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 10px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid var(--jp-primary);
            background: #fff;
            color: var(--jp-accent);
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-btn.active {
            background: var(--jp-accent);
            color: #fff;
        }

        /* 手機版核心修正：不用拖動 */
        @media (max-width: 480px) {
            .gojuon-wrapper {
                padding: 10px 8px;
                margin: 10px 5px;
                border-radius: 12px;
            }
            .gojuon-grid {
                grid-template-rows: repeat(11, 60px); /* 縮短格子高度 */
                gap: 5px; /* 縮小格子間距 */
            }
            .kana-char {
                font-size: 1.4rem; /* 縮小字體以適應寬度 */
            }
            .romaji {
                font-size: 0.65rem;
            }
            .toggle-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header style="border:2px solid #f9a8d4; background:#fce7f3; color:#db2777;">
        <div class="logo">
            <a href="index.html" class="back-link" style="margin-right:10px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <span class="header-title-area" style="font-weight:bold; color:#db2777; font-size:1.1rem; letter-spacing:1px;">五十音圖表</span>
        </div>
    </header>

    <div class="page-container">
        
        <div class="toolbar">
            <!-- 假名切換 -->
            <button id="btn-hira" class="toggle-btn active" onclick="switchMode('h')">平假名 あ</button>
            <button id="btn-kata" class="toggle-btn" onclick="switchMode('k')">片假名 ア</button>
            <!-- 字體切換 -->
            <button id="btn-font" class="toggle-btn" onclick="toggleFont()" style="margin-left: 20px; border-color: #e2e8f0; color: #64748b;">手寫體切換</button>
        </div>

        <div class="gojuon-wrapper">
            <div class="gojuon-grid" id="grid-container">
                <!-- 由 JavaScript 自動填充 -->
            </div>
        </div>

        <p style="text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 20px;">
            ※ 點擊方塊可聽取發音
        </p>

    </div>

    <script src="../scripts/utils.js"></script>
    <script>
        let kanaData = [];
        let currentMode = 'h'; // 'h' 為平假名, 'k' 為片假名
        let isTextbookFont = false;

        async function init() {
            try {
                // 1. 抓取您的 GitHub 資料
                const res = await fetch('https://raw.githubusercontent.com/coollearningtw/cool-learning-data/refs/heads/main/gojuon.json');
                const data = await res.json();
                kanaData = data.seion;
                render();
            } catch (err) {
                console.error("無法載入五十音資料:", err);
            }
        }

        function render() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            kanaData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kana-card';
                
                // 根據 JSON 中的座標設定 Grid 位置
                card.style.gridRow = item.row;
                card.style.gridColumn = item.col;

                const displayChar = (currentMode === 'h') ? item.h : item.k;
                const fontClass = isTextbookFont ? 'font-textbook' : 'font-standard';

                card.innerHTML = `
                    <div class="kana-char ${fontClass}">${displayChar}</div>
                    <div class="romaji">${item.r}</div>
                `;

                // 點擊發音 (呼叫 utils.js 中的 speak)
                card.onclick = () => {
                    // 發音使用平假名效果最佳
                    speak(item.h, 'ja-JP', 1.0);
                };

                container.appendChild(card);
            });
        }

        // 切換平片假名模式
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-hira').classList.toggle('active', mode === 'h');
            document.getElementById('btn-kata').classList.toggle('active', mode === 'k');
            render();
        }

        // 切換字體
        function toggleFont() {
            isTextbookFont = !isTextbookFont;
            const btn = document.getElementById('btn-font');
            btn.innerText = isTextbookFont ? "切換至標準體" : "手寫體切換";
            btn.classList.toggle('active', isTextbookFont);
            render();
        }

        // 初始化
        init();
    </script>
</body>
</html>
