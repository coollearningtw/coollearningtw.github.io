<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人檔案與組織管理 - 酷學習</title>
    <link rel="icon" type="image/png" href="images/logo-gold.png">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/header.css">
    <style>
        /* 統一雙欄網格佈局 */
        .profile-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            transition: all 0.3s ease;
        }

        /* 向量圖標基本設定 */
        .panel-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
            display: inline-block;
            vertical-align: middle;
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            background: #f8fafc;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-control:disabled {
            background: #e2e8f0;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
        }

        /* 頭像編輯區 */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        .avatar-preview-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-light);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .avatar-preview-box:hover {
            filter: brightness(0.9);
            border-color: var(--primary);
        }
        .avatar-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-upload-input {
            display: none;
        }
        .avatar-hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 8px;
            font-weight: bold;
        }

        /* 組織審核與狀態標籤 */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-approved { background-color: #dcfce7; color: #166534; }
        .status-rejected { background-color: #fee2e2; color: #ef4444; }

        /* 成員管理表格 */
        .member-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .member-table th, .member-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .member-table th {
            color: #64748b;
            font-weight: bold;
        }

        .msg-box {
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .msg-box.error { display: block; background: #fee2e2; color: #ef4444; font-weight: bold; }
        .msg-box.success { display: block; background: #dcfce7; color: #166534; font-weight: bold; }

        /* --- 快捷通道連結卡片樣式 --- */
        .tool-link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .tool-link-card:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
            transform: translateX(4px);
        }

        @media (max-width: 820px) {
            .profile-layout { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <img src="images/logo.png" alt="Logo" height="40">
            <span class="header-title-area">個人設定與組織中心</span>
        </div>
        <div class="header-right">
            <button class="btn-tool-text" onclick="handleLogout()">登出帳號</button>
        </div>
    </header>

    <main class="page-container profile-layout" id="profile-grid">
        
        <!-- 左側：個人檔案設定 -->
        <section class="std-card" style="padding: 25px; height: fit-content;">
            <h2 class="panel-title">
                <svg class="panel-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                個人資訊設定
            </h2>
            <div id="profile-msg" class="msg-box"></div>

            <div class="avatar-section">
                <div class="avatar-preview-box" onclick="triggerAvatarUpload()" title="點擊上傳新頭像">
                    <img id="avatar-img-preview" src="https://via.placeholder.com/150?text=Avatar" alt="頭像">
                </div>
                <input type="file" id="avatar-file-input" class="avatar-upload-input" accept="image/*" onchange="uploadAvatar(event)">
                <span class="avatar-hint">點擊頭像可上傳新圖片 (限制 2MB 以下)</span>
            </div>

            <div class="form-group">
                <label>我的帳號識別碼 (User ID，提供給組織管理員加入時使用)</label>
                <input type="text" id="user-id-display" class="form-control" readonly style="font-family: monospace; background:#f1f5f9; cursor:text;" onclick="this.select()">
            </div>

            <div class="form-group">
                <label for="prof-customid">專屬帳號 ID (用於登入，僅限小寫/數字/點/底線)</label>
                <input type="text" id="prof-customid" class="form-control" placeholder="例如：alex.123">
                <span id="id-changes-tip" style="font-size:0.75rem; color:#94a3b8; display:block; margin-top:4px; font-weight:bold;">14 天內最多能修改 2 次</span>
            </div>

            <div class="form-group">
                <label for="prof-username">顯示名稱 (公開展示姓名)</label>
                <input type="text" id="prof-username" class="form-control" placeholder="請輸入暱稱">
            </div>

            <div class="form-group">
                <label for="prof-county">就讀縣市</label>
                <select id="prof-county" class="form-control" onchange="handleCountyChange()">
                    <option value="">（不提供 / 清除）</option>
                </select>
            </div>

            <div class="form-group">
                <label for="prof-stage">學習階段</label>
                <select id="prof-stage" class="form-control" onchange="handleStageChange()" disabled>
                    <option value="">（不提供 / 清除）</option>
                    <option value="國中">國中</option>
                    <option value="高中">高中</option>
                </select>
            </div>

            <div class="form-group">
                <label for="prof-school">學校名稱</label>
                <select id="prof-school" class="form-control" disabled>
                    <option value="">（不提供 / 清除）</option>
                </select>
            </div>

            <button class="btn btn-submit" onclick="saveProfile()" style="background:#0b76d1; color:white; border:none; margin-top:10px;">儲存修改</button>

            <!-- 2. 【核心美化】：危險區域 (Danger Zone) 卡片 -->
            <div style="margin-top: 35px; border-top: 2px dashed #f1f5f9; padding-top: 25px;">
                <div style="background: #fff5f5; border: 1px solid #fecaca; border-radius: 12px; padding: 18px; text-align: left;">
                    <div style="font-weight: 800; color: #991b1b; font-size: 0.9rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
                        <svg class="panel-icon" style="color:#ef4444; width:18px; height:18px;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        安全警戒：危險區域
                    </div>
                    <p style="font-size: 0.8rem; color: #b91c1c; margin: 0 0 12px 0; line-height: 1.5; font-weight: 500;">
                        此操作將會徹底註銷並抹除您在酷學習平台上的所有雲端筆記、簽到紀錄與個人就學資訊，此動作無法復原。
                    </p>
                    <button onclick="deleteMyAccount()" style="width: 100%; padding: 11px; background: #ef4444; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); transition: 0.2s;" onmouseover="this.style.background='#dc2626'" onmouseout="this.style.background='#ef4444'">
                        <svg class="panel-icon" style="fill:currentColor; width:16px; height:16px;" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        註銷並永久刪除我的帳號
                    </button>
                </div>
            </div>
        </section>

        <!-- 右側：組織中心或學習統計（動態渲染） -->
        <section class="std-card" id="org-panel" style="padding: 25px; height: fit-content; display: none;">
            <!-- 內容由 Javascript 根據有無組織動態寫入 -->
        </section>

    </main>

    <!-- 引用 Supabase 核心與設定檔 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>

    <script>
        let currentUser = null;
        let allSchools = [];
        let originalCustomId = ""; 
        let idChangesArray = [];   

        async function init() {
            try {
                const { data: { user }, error: authErr } = await window.supabaseClient.auth.getUser();
                if (authErr || !user) {
                    window.location.href = 'auth/login.html';
                    return;
                }
                currentUser = user;

                // 同步下載學校資料庫
                const { data: schoolData, error: sErr } = await window.supabaseClient
                    .from('schools')
                    .select('id, county, stage, name')
                    .in('stage', ['國中', '高中']);
                if (sErr) throw sErr;
                allSchools = schoolData;

                // 填入縣市第一層
                const countySelect = document.getElementById('prof-county');
                const counties = [...new Set(allSchools.map(s => s.county))].sort();
                counties.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    countySelect.appendChild(opt);
                });

                // 載入使用者個人檔案
                const { data: profile, error: pErr } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                if (pErr) throw pErr;

                // 填充個人資料表單與大頭照
                document.getElementById('prof-username').value = profile.username || '';
                
                originalCustomId = profile.custom_id || '';
                document.getElementById('prof-customid').value = originalCustomId;
                idChangesArray = profile.id_changes || [];
                document.getElementById('user-id-display').value = user.id;

                // 渲染頭像
                if (profile.avatar_url) {
                    document.getElementById('avatar-img-preview').src = profile.avatar_url;
                } else {
                    document.getElementById('avatar-img-preview').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${user.id}`;
                }

                if (profile.county) {
                    document.getElementById('prof-county').value = profile.county;
                    document.getElementById('prof-stage').disabled = false;
                    if (profile.stage) {
                        document.getElementById('prof-stage').value = profile.stage;
                        handleStageChange();
                        if (profile.school_id) {
                            document.getElementById('prof-school').value = profile.school_id;
                        }
                    }
                }

                // 將加載完畢的 profile 物件傳遞給組織檢測系統
                loadOrganizationCenter(profile);

            } catch (err) {
                console.error("初始化失敗:", err);
            }
        }

        // =========================================================================
        // 連動下拉選單控制邏輯
        // =========================================================================
        function handleCountyChange() {
            const county = document.getElementById('prof-county').value;
            const stageSelect = document.getElementById('prof-stage');
            const schoolSelect = document.getElementById('prof-school');

            stageSelect.value = '';
            schoolSelect.value = '';
            schoolSelect.innerHTML = '<option value="">（不提供 / 清除）</option>';
            schoolSelect.disabled = true;

            if (county) {
                stageSelect.disabled = false;
            } else {
                stageSelect.disabled = true;
            }
        }

        function handleStageChange() {
            const county = document.getElementById('prof-county').value;
            const stage = document.getElementById('prof-stage').value;
            const schoolSelect = document.getElementById('prof-school');

            schoolSelect.value = '';
            schoolSelect.innerHTML = '<option value="">（不提供 / 清除）</option>';

            if (county && stage) {
                const filtered = allSchools.filter(s => s.county === county && s.stage === stage);
                filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
                
                filtered.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.name;
                    schoolSelect.appendChild(opt);
                });
                schoolSelect.disabled = false;
            } else {
                schoolSelect.disabled = true;
            }
        }

        // 儲存修改
        async function saveProfile() {
            const msg = document.getElementById('profile-msg');
            msg.className = 'msg-box'; msg.innerText = '';

            const username = document.getElementById('prof-username').value.trim();
            const customId = document.getElementById('prof-customid').value.trim().toLowerCase();
            const county = document.getElementById('prof-county').value;
            const stage = document.getElementById('prof-stage').value;
            const schoolId = document.getElementById('prof-school').value;

            const hasAny = (county !== '' || stage !== '' || schoolId !== '');
            const hasAll = (county !== '' && stage !== '' && schoolId !== '');

            if (hasAny && !hasAll) {
                msg.className = 'msg-box error';
                msg.innerText = '儲存失敗：就學資訊若要提供，「縣市」、「階段」與「學校」缺一不可。';
                return;
            }

            if (!customId) {
                msg.className = 'msg-box error';
                msg.innerText = '儲存失敗：帳號 ID 不能為空白！';
                return;
            }

            if (!/^[a-z0-9._]+$/.test(customId)) {
                msg.className = 'msg-box error';
                msg.innerText = '儲存失敗：帳號 ID 僅限小寫英文字母、數字、英文點(.)與下劃線(_)。';
                return;
            }

            let newChangesArray = [...idChangesArray];

            if (customId !== originalCustomId) {
                const now = Date.now();
                const fourteenDaysMs = 14 * 24 * 60 * 60 * 1000;
                
                const recentChanges = idChangesArray.filter(timestamp => {
                    const changeTime = new Date(timestamp).getTime();
                    return (now - changeTime) < fourteenDaysMs;
                });

                if (recentChanges.length >= 2) {
                    const datesStr = recentChanges.map(t => new Date(t).toLocaleString('zh-TW')).join(', ');
                    msg.className = 'msg-box error';
                    msg.innerText = `儲存失敗：帳號 ID 在 14 天內最多只能修改 2 次。您最近的修改時間為：[ ${datesStr} ]，目前已被系統鎖定。`;
                    return;
                }

                try {
                    const newVirtualEmail = `${customId}@coollearning.tw`;
                    const { error: authUpdateErr } = await window.supabaseClient.auth.updateUser({
                        email: newVirtualEmail
                    });

                    if (authUpdateErr) throw authUpdateErr;
                    newChangesArray.push(new Date().toISOString());

                } catch (err) {
                    msg.className = 'msg-box error';
                    msg.innerText = `帳號 ID 變更同步失敗（可能已被他人佔用）：${err.message}`;
                    return;
                }
            }

            try {
                const { error } = await window.supabaseClient
                    .from('profiles')
                    .update({
                        username: username,
                        custom_id: customId,
                        id_changes: newChangesArray,
                        county: county || null,
                        stage: stage || null,
                        school_id: schoolId || null
                    })
                    .eq('id', currentUser.id);

                if (error) throw error;

                originalCustomId = customId;
                idChangesArray = newChangesArray;

                msg.className = 'msg-box success';
                msg.innerText = '個人檔案修改成功！';
                setTimeout(() => msg.style.display = 'none', 3000);
            } catch (e) {
                msg.className = 'msg-box error';
                msg.innerText = `儲存失敗：${e.message}`;
            }
        }

        // =========================================================================
        // 組織中心或學習統計 ( 核心 RWD 雙欄優化：無加入組織改顯示「成就與快捷箱」 )
        // =========================================================================
        async function loadOrganizationCenter(profile) {
            const panel = document.getElementById('org-panel');
            panel.style.display = 'block'; // 永遠顯示右側，防止版面空缺

            try {
                // 1. 查詢自己創立的組織
                const { data: ownedOrg, error: err1 } = await window.supabaseClient
                    .from('organizations')
                    .select('*')
                    .eq('owner_id', currentUser.id)
                    .maybeSingle();

                if (err1) throw err1;

                // 2. 查詢自己加入的組織
                const { data: membership, error: err2 } = await window.supabaseClient
                    .from('organization_members')
                    .select('*, organization:organizations(*)')
                    .eq('user_id', currentUser.id)
                    .maybeSingle();

                if (err2) throw err2;

                if (ownedOrg) {
                    renderOwnedOrg(ownedOrg);
                } else if (membership) {
                    renderJoinedOrg(membership);
                } else {
                    // *** 3. 【核心優化】：無組織狀態下，渲染美麗的「成就統計與快捷工具箱」 ***
                    renderLearningStatsBox(profile);
                }

            } catch (e) {
                console.error("讀取組織模組失敗：", e);
                renderLearningStatsBox(profile);
            }
        }

        // 渲染 學習成就紀錄與工具箱 (無組織時顯示)
        function renderLearningStatsBox(profile) {
            const panel = document.getElementById('org-panel');

            // 1. 取得簽到天數 (雲端同步值)
            const checkinDays = profile.checkin_count || 0;

            // 2. 讀取本機累積筆記本數
            let noteCount = 0;
            try {
                const notes = JSON.parse(localStorage.getItem('cool_learning_notebooks') || '[]');
                noteCount = notes.length;
            } catch (e) {}

            // 3. 讀取本機最愛單字數
            let favCount = 0;
            try {
                const favs = JSON.parse(localStorage.getItem('my_favs') || '[]');
                favCount = favs.length;
            } catch (e) {}

            panel.innerHTML = `
                <h2 class="panel-title">
                    <svg class="panel-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    學習成就與快捷通道
                </h2>
                
                <p style="color:#64748b; font-size:0.9rem; margin-bottom:20px; line-height:1.6;">
                    歡迎回到個人主控台！下方紀錄了您目前的學習里程碑，點擊按鈕即可快速前往常用功能。
                </p>

                <!-- 數據網格 (Metrics Grid) -->
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px;">
                    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center;">
                        <div style="font-size: 1.6rem; font-weight: 900; color: #ea580c; margin-bottom: 4px; font-family: monospace;">${checkinDays}</div>
                        <div style="font-size: 0.72rem; color: #64748b; font-weight: bold;">連續簽到 (天)</div>
                    </div>
                    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center;">
                        <div style="font-size: 1.6rem; font-weight: 900; color: #db2777; margin-bottom: 4px; font-family: monospace;">${noteCount}</div>
                        <div style="font-size: 0.72rem; color: #64748b; font-weight: bold;">雲端筆記 (本)</div>
                    </div>
                    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center;">
                        <div style="font-size: 1.6rem; font-weight: 900; color: #0b76d1; margin-bottom: 4px; font-family: monospace;">${favCount}</div>
                        <div style="font-size: 0.72rem; color: #64748b; font-weight: bold;">最愛單字 (個)</div>
                    </div>
                </div>

                <!-- 快捷學習通道 (Quick Links) -->
                <h3 style="font-size: 0.95rem; color: #475569; margin-bottom: 12px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 8px;">快捷學習通道</h3>

        // 渲染創立者管理面板
        async function renderOwnedOrg(org) {
            const panel = document.getElementById('org-panel');
            let badgeClass = 'status-pending';
            let statusText = '審核中 (Pending)';
            if (org.status === 'approved') {
                badgeClass = 'status-approved';
                statusText = '已核准 (Approved)';
            } else if (org.status === 'rejected') {
                badgeClass = 'status-rejected';
                statusText = '已退回 (Rejected)';
            }

            panel.innerHTML = `
                <h2 class="panel-title">
                    <svg class="panel-icon" viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm14 12h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V9h6v2z"/></svg>
                    組織管理：${org.name}
                </h2>
                <div class="status-badge ${badgeClass}">${statusText}</div>
                <div id="org-msg" class="msg-box"></div>
            `;

            if (org.status === 'approved') {
                panel.innerHTML += `
                    <p style="color:#64748b; font-size:0.9rem;">您是此組織的管理人員，可在下方新增或管理您的機構成員。</p>
                    
                    <div style="border:1px dashed #cbd5e1; padding:15px; border-radius:8px; margin-top:20px;">
                        <span style="font-weight:bold; font-size:0.85rem; color:#475569; display:block; margin-bottom:8px;">新增成員帳號</span>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="new-member-id" class="form-control" placeholder="請貼上成員的 User ID" style="flex:1;">
                            <button class="btn" style="background:#10b981; color:white; border:none; padding:10px 18px;" onclick="addMember('${org.id}')">加入</button>
                        </div>
                    </div>

                    <h3 style="margin-top:30px; font-size:1.1rem; color:#1e293b;">成員列表</h3>
                    <div id="members-list-wrapper">讀取成員名單中...</div>
                `;
                loadMembersList(org.id);
            } else if (org.status === 'pending') {
                panel.innerHTML += `<p style="line-height:1.6; color:#64748b;">您的組織創立正在審核中。通過後即可於此處管理您的成員。</p>`;
            } else {
                panel.innerHTML += `<p style="line-height:1.6; color:#ef4444;">很抱歉，您的組織申請未通過審核，請聯繫系統管理員協助處理。</p>`;
            }
        }

        // 加載與渲染成員名單 (管理員)
        async function loadMembersList(orgId) {
            const listWrapper = document.getElementById('members-list-wrapper');
            try {
                const { data: members, error } = await window.supabaseClient
                    .from('organization_members')
                    .select('*, profile:profiles(*)')
                    .eq('organization_id', orgId);

                if (error) throw error;

                if (members.length === 0) {
                    listWrapper.innerHTML = `<p style="text-align:center; color:#94a3b8; padding:20px;">目前尚無成員加入。</p>`;
                    return;
                }

                let tableHtml = `<table class="member-table"><thead><tr><th>成員暱稱</th><th>角色</th><th>操作</th></tr></thead><tbody>`;

                members.forEach(m => {
                    const name = m.profile?.username || '未命名用戶';
                    const isSelf = m.user_id === currentUser.id;
                    tableHtml += `
                        <tr>
                            <td><strong>${name}</strong>${isSelf ? ' (您)' : ''}</td>
                            <td>
                                ${isSelf ? '創立者' : `
                                <select onchange="changeMemberRole('${m.id}', this.value, '${orgId}')" style="padding:4px; border-radius:4px; border:1px solid #cbd5e1;">
                                    <option value="member" ${m.role === 'member' ? 'selected' : ''}>一般成員</option>
                                    <option value="admin" ${m.role === 'admin' ? 'selected' : ''}>管理員</option>
                                </select>`}
                            </td>
                            <td>
                                ${isSelf ? '--' : `<button class="btn-danger" style="background:none; border:none; color:red; cursor:pointer;" onclick="removeMember('${m.id}', '${orgId}')">移除</button>`}
                            </td>
                        </tr>
                    `;
                });

                tableHtml += `</tbody></table>`;
                listWrapper.innerHTML = tableHtml;

            } catch (e) {
                listWrapper.innerHTML = `<p style="color:red">無法載入成員名單：${e.message}</p>`;
            }
        }

        // 移除成員
        async function removeMember(membershipId, orgId) {
            if (confirm("確定要把該成員從組織中移除嗎？")) {
                try {
                    const { error } = await window.supabaseClient
                        .from('organization_members')
                        .delete()
                        .eq('id', membershipId);
                    if (error) throw error;
                    loadMembersList(orgId);
                } catch (e) { alert("移除成員失敗：" + e.message); }
            }
        }

        // 修改成員組織權限
        async function changeMemberRole(membershipId, newRole, orgId) {
            try {
                const { error } = await window.supabaseClient
                    .from('organization_members')
                    .update({ role: newRole })
                    .eq('id', membershipId);
                if (error) throw error;
            } catch (e) { alert("修改權限失敗：" + e.message); loadMembersList(orgId); }
        }

        // 新增成員
        async function addMember(orgId) {
            const input = document.getElementById('new-member-id');
            const targetId = input.value.trim();
            const msg = document.getElementById('org-msg');
            msg.className = 'msg-box'; msg.innerText = '';

            if (!targetId) return alert("請輸入正確的識別碼！");

            try {
                const { data: targetProfile, error: checkErr } = await window.supabaseClient
                    .from('profiles')
                    .select('id')
                    .eq('id', targetId)
                    .single();

                if (checkErr || !targetProfile) {
                    throw new Error("查無此帳號識別碼，請確認是否拼寫錯誤。");
                }

                const { error: insErr } = await window.supabaseClient
                    .from('organization_members')
                    .insert([{
                        organization_id: orgId,
                        user_id: targetId,
                        role: 'member'
                    }]);

                if (insErr) {
                    if (insErr.code === '23505') throw new Error("該用戶已經是此組織的成員了！");
                    throw insErr;
                }

                input.value = '';
                msg.className = 'msg-box success';
                msg.innerText = '成員加入成功！';
                loadMembersList(orgId);
                setTimeout(() => msg.style.display = 'none', 3000);

            } catch (e) {
                msg.className = 'msg-box error';
                msg.innerText = e.message;
            }
        }

        // 渲染一般成員面板 (加入別人的組織)
        async function renderJoinedOrg(membership) {
            const panel = document.getElementById('org-panel');
            panel.innerHTML = `
                <h2 class="panel-title">
                    <svg class="panel-icon" viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm14 12h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V9h6v2z"/></svg>
                    組織中心：${membership.organization.name}
                </h2>
                <p style="color:#64748b; font-size:0.95rem; line-height:1.6;">
                    您已加入此班級組織。您的學習進度將對接給該單位的管理人員。
                </p>
                <div style="text-align:right; margin-top:30px;">
                    <button class="btn btn-danger" style="background:#fee2e2; color:#ef4444; border:none; padding:10px 20px;" onclick="leaveJoinedOrg('${membership.id}')">退出此組織</button>
                </div>
            `;
        }

        async function leaveJoinedOrg(membershipId) {
            if (confirm("確定要退出此組織嗎？")) {
                try {
                    const { error } = await window.supabaseClient
                        .from('organization_members')
                        .delete()
                        .eq('id', membershipId);
                    if (error) throw error;
                    location.reload();
                } catch (e) { alert("退出組織失敗：" + e.message); }
            }
        }

        // =========================================================================
        // 頭像上傳
        // =========================================================================
        function triggerAvatarUpload() {
            document.getElementById('avatar-file-input').click();
        }

        async function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                alert("上傳失敗：頭像圖片檔案大小不能超過 2MB！");
                return;
            }

            const msg = document.getElementById('profile-msg');
            msg.className = 'msg-box'; msg.style.display = 'block'; msg.innerText = '正在處理並上傳頭像...';

            try {
                const fileExt = file.name.split('.').pop();
                const filePath = `${currentUser.id}/avatar.${fileExt}`;

                const { error: uploadError } = await window.supabaseClient.storage
                    .from('avatars')
                    .upload(filePath, file, { upsert: true });

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = window.supabaseClient.storage
                    .from('avatars')
                    .getPublicUrl(filePath);

                const { error: updateError } = await window.supabaseClient
                    .from('profiles')
                    .update({ avatar_url: publicUrl })
                    .eq('id', currentUser.id);

                if (updateError) throw updateError;

                document.getElementById('avatar-img-preview').src = publicUrl;
                msg.className = 'msg-box success';
                msg.innerText = '頭像更新成功！';
                setTimeout(() => msg.style.display = 'none', 3000);

            } catch (e) {
                msg.className = 'msg-box error';
                msg.innerText = `頭像上傳失敗：${e.message}`;
            }
        }

        // 核心安全功能：註銷與刪除帳號 (RPC)
        async function deleteMyAccount() {
            if (confirm("警告：您即將永久刪除此帳號！\n這會清除您的所有筆記、簽到紀錄與個人檔案，此操作無法復原。確定要繼續嗎？")) {
                
                const currentNickname = document.getElementById('prof-username').value.trim();
                const secondConfirm = prompt(`為了確認此安全操作，請在此處輸入您的暱稱 [ ${currentNickname} ]：`);
                
                if (secondConfirm !== currentNickname) {
                    alert("驗證不符，已取消刪除帳號。");
                    return;
                }

                try {
                    const { error } = await window.supabaseClient.rpc('delete_own_user');
                    
                    if (error) throw error;

                    sessionStorage.removeItem('global_user_logged_in');
                    alert("您的帳號已成功註銷並刪除。期待未來能再次與您學習！");
                    window.location.href = 'auth/login.html';

                } catch (e) {
                    alert("帳號刪除失敗：" + e.message);
                }
            }
        }

        // 登出
        async function handleLogout() {
            if (confirm("確定要登出嗎？")) {
                await window.supabaseClient.auth.signOut();
                sessionStorage.removeItem('global_user_logged_in');
                window.location.href = 'auth/login.html';
            }
        }

        init();
    </script>
