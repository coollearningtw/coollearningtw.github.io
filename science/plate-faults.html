<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板塊與斷層精確模擬 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: #fff; }
        header { position: absolute; width: calc(100% - 36px); z-index: 100; background: rgba(15, 23, 42, 0.6) !important; backdrop-filter: blur(10px); }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; }

        .control-panel {
            position: absolute; left: 20px; top: 90px; width: 280px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 20px; z-index: 10;
        }
        .panel-title { font-size: 1.1rem; font-weight: 800; color: #38bdf8; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-action {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .btn-action.active { border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.1); font-weight: bold; }
        
        .play-btn { width: 100%; background: #0ea5e9; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .info-card {
            position: absolute; right: 20px; top: 90px; width: 260px;
            background: rgba(15, 23, 42, 0.85); border-radius: 20px;
            padding: 20px; border-top: 4px solid #38bdf8; z-index: 10;
        }
        .stress-tag { display: inline-block; margin-top: 10px; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; z-index: 999; display: flex; align-items: center; justify-content: center; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading">構造地質引擎啟動中...</div>
    <header>
        <div class="logo">
            <a href="earth-science.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <span class="header-title-area">精密斷層模擬器</span>
        </div>
    </header>

    <div id="canvas-container"></div>

    <div class="control-panel">
        <div class="panel-title">📐 選擇斷層類型</div>
        <div class="action-grid">
            <button class="btn-action active" onclick="setFault('normal')" id="btn-normal">正斷層</button>
            <button class="btn-action" onclick="setFault('reverse')" id="btn-reverse">逆斷層</button>
            <button class="btn-action" onclick="setFault('left-strike')" id="btn-left">左移斷層</button>
            <button class="btn-action" onclick="setFault('right-strike')" id="btn-right">右移斷層</button>
        </div>
        <button class="play-btn" onclick="toggleFaultAnim()">啟動錯動動畫</button>
        <p style="font-size: 0.7rem; color: #64748b; margin-top: 10px;">* 模擬斷層面傾角為 60°</p>
    </div>

    <div class="info-card">
        <div id="info-title" style="font-size:1.2rem; font-weight:800; margin-bottom:10px;">正斷層</div>
        <div id="info-text" style="font-size:0.9rem; line-height:1.6; color:#94a3b8;">掛板沿著斷層面向下滑動。通常由張力引起。</div>
        <div id="info-stress" class="stress-tag">受力：張力 (Tension)</div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let footWall, hangingWall;
        let isMoved = false;
        let currentType = 'normal';

        // 幾何參數
        const DIP_ANGLE = Math.PI / 3; // 60 度
        const BLOCK_H = 6;
        const BLOCK_W = 10;
        const BLOCK_D = 10;
        const SLANT_OFFSET = BLOCK_H / Math.tan(DIP_ANGLE); // 根據高度與角度算出的底邊偏移量

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(25, 15, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            createTrapezoidBlocks();

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', onWindowResize);
            setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);
        }

        function createTrapezoidBlocks() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');

            // 1. 載入貼圖並設定重複模式
            const grassTex = loader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
            const rockTex = loader.load('https://threejs.org/examples/textures/brick_diffuse.jpg');
            
            [grassTex, rockTex].forEach(t => {
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
            });

            const rockMat = new THREE.MeshStandardMaterial({ map: rockTex });
            const grassMat = new THREE.MeshStandardMaterial({ map: grassTex });

            // 2. 側邊岩石投影邏輯 (解決條紋與拉伸)
            function applyRockUV(geometry, scale) {
                geometry.computeVertexNormals();
                const pos = geometry.attributes.position;
                const norm = geometry.attributes.normal;
                const uv = geometry.attributes.uv;

                for (let i = 0; i < pos.count; i++) {
                    const nx = Math.abs(norm.getX(i));
                    const ny = Math.abs(norm.getY(i));
                    const nz = Math.abs(norm.getZ(i));
                    
                    const vx = pos.getX(i);
                    const vy = pos.getY(i);
                    const vz = pos.getZ(i);

                    // --- 核心修正邏輯 ---
                    
                    if (ny > 0.5) {
                        // 1. 如果法向量朝向 上 或 下 (頂部或底部)
                        // 使用 XZ 座標投影，解決底部的條紋拉伸問題
                        uv.setXY(i, vx * scale, vz * scale);
                    } else if (nx > 0.5) {
                        // 2. 如果法向量朝向 左、右 或 斜面
                        // 使用 ZY 座標投影，解決側邊與斷層面的拉伸問題
                        uv.setXY(i, vz * scale, vy * scale);
                    } else {
                        // 3. 如果法向量朝向 前 或 後
                        // 使用 XY 座標投影
                        uv.setXY(i, vx * scale, vy * scale);
                    }
                }
                uv.needsUpdate = true;
            }

            // 3. 建立塊體的函數
            function createBlockPart(type) {
                const group = new THREE.Group();
                const bodyShape = new THREE.Shape();
                let topWidth, topCenterX;

                // 根據幾何結構精確計算頂部水平面的尺寸
                if (type === 'foot') {
                    // 左側塊：頂邊從 -BLOCK_W 到 -SLANT_OFFSET
                    bodyShape.moveTo(-BLOCK_W, 0);
                    bodyShape.lineTo(0, 0);
                    bodyShape.lineTo(-SLANT_OFFSET, BLOCK_H);
                    bodyShape.lineTo(-BLOCK_W, BLOCK_H);
                    
                    topWidth = BLOCK_W - SLANT_OFFSET;
                    topCenterX = (-BLOCK_W - SLANT_OFFSET) / 2;
                } else {
                    // 右側塊：頂邊從 -SLANT_OFFSET 到 BLOCK_W
                    bodyShape.moveTo(0, 0);
                    bodyShape.lineTo(BLOCK_W, 0);
                    bodyShape.lineTo(BLOCK_W, BLOCK_H);
                    bodyShape.lineTo(-SLANT_OFFSET, BLOCK_H);
                    
                    topWidth = BLOCK_W + SLANT_OFFSET;
                    topCenterX = (BLOCK_W - SLANT_OFFSET) / 2;
                }
                bodyShape.closePath();

                // A. 岩石本體 (只負責側面，不貼頂部)
                const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, { depth: BLOCK_D, bevelEnabled: false });
                applyRockUV(bodyGeo, 0.2);
                const bodyMesh = new THREE.Mesh(bodyGeo, rockMat);
                group.add(bodyMesh);

                // B. 精確對齊的草地頂蓋
                const grassGeo = new THREE.PlaneGeometry(topWidth, BLOCK_D);
                
                // 核心修正：手動計算草地 UV 讓紋理在世界座標對齊 (無縫接軌)
                const uvAttr = grassGeo.attributes.uv;
                for (let i = 0; i < uvAttr.count; i++) {
                    const u = uvAttr.getX(i); // 0~1
                    const v = uvAttr.getY(i); // 0~1
                    // 將局部 UV 轉換為基於世界座標 X 和 Z 的投影
                    const worldX = (u - 0.5) * topWidth + topCenterX;
                    const worldZ = (v - 0.5) * BLOCK_D;
                    uvAttr.setXY(i, worldX * 0.15, worldZ * 0.15); // 0.15 為草地縮放比例
                }

                const grassMesh = new THREE.Mesh(grassGeo, grassMat);
                grassMesh.rotation.x = -Math.PI / 2;
                
                // 將草地精確定位到水平頂面的幾何中心
                // Z 軸位移 BLOCK_D / 2 是因為 ExtrudeGeometry 預設從 0 向深度方向延伸
                grassMesh.position.set(topCenterX, BLOCK_H + 0.02, BLOCK_D / 2);
                group.add(grassMesh);

                // 將整個組移回中心對齊軌道
                group.position.z = -BLOCK_D / 2;
                return group;
            }

            // 清除舊模型
            if(footWall) scene.remove(footWall);
            if(hangingWall) scene.remove(hangingWall);

            footWall = createBlockPart('foot');
            scene.add(footWall);

            hangingWall = createBlockPart('hanging');
            scene.add(hangingWall);
        }

        const FAULTS = {
            normal: { 
                title: "正斷層", 
                stress: "張力 (Tension)", 
                text: "掛板順著斜面向下移動。地殼受到拉張力量而變長。",
                // L=3, dx = L * cos(60), dy = -L * sin(60)
                move: { x: 3 * Math.cos(DIP_ANGLE), y: -3 * Math.sin(DIP_ANGLE), z: 0 }
            },
            reverse: { 
                title: "逆斷層", 
                stress: "壓力 (Compression)", 
                text: "掛板順著斜面向上移動。地殼受到擠壓力量而變短、隆起。",
                move: { x: -3 * Math.cos(DIP_ANGLE), y: 3 * Math.sin(DIP_ANGLE), z: 0 }
            },
            'left-strike': { 
                title: "左移斷層", 
                stress: "剪力 (Shear)", 
                text: "兩側岩體沿水平方向錯動。面向斷層看過去，對面岩體向左移動。",
                move: { x: 0, y: 0, z: -4 }
            },
            'right-strike': { 
                title: "右移斷層", 
                stress: "剪力 (Shear)", 
                text: "兩側岩體沿水平方向錯動。面向斷層看過去，對面岩體向右移動。",
                move: { x: 0, y: 0, z: 4 }
            }
        };

        function setFault(type) {
            currentType = type;
            isMoved = false;
            
            // 重置位置
            new TWEEN.Tween(hangingWall.position).to({ x: 0, y: 0, z: -BLOCK_D/2 }, 500).start();
            
            document.querySelectorAll('.btn-action').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (type.includes('strike') ? type.split('-')[0] : type)).classList.add('active');

            const info = FAULTS[type];
            document.getElementById('info-title').innerText = info.title;
            document.getElementById('info-text').innerText = info.text;
            document.getElementById('info-stress').innerText = "受力：" + info.stress;
        }

        function toggleFaultAnim() {
            const moveData = FAULTS[currentType].move;
            const target = isMoved ? 
                { x: 0, y: 0, z: -BLOCK_D/2 } : 
                { x: moveData.x, y: moveData.y, z: moveData.z - BLOCK_D/2 };

            new TWEEN.Tween(hangingWall.position)
                .to(target, 1000)
                .easing(TWEEN.Easing.Quadratic.InOut)
                .onUpdate(() => {
                    // 如果有需要可以在此更新相機追蹤
                })
                .start();

            isMoved = !isMoved;
            document.querySelector('.play-btn').innerText = isMoved ? "還原位置" : "啟動錯動動畫";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
