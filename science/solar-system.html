<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太陽系 3D 動態導覽 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #050810; color: #fff; font-family: "Noto Sans TC", sans-serif; }
        header { position: absolute; width: calc(100% - 36px); z-index: 100; background: rgba(15, 23, 42, 0.4) !important; backdrop-filter: blur(10px); }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; }

        /* 左側導覽 */
        .sidebar {
            position: absolute; left: 20px; top: 90px; width: 180px;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 15px; z-index: 10; display: flex; flex-direction: column; gap: 6px;
        }
        .nav-item {
            padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 12px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.5); }
        .nav-item.active { background: #0ea5e9; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* 右側資訊卡 */
        .info-card {
            position: absolute; right: 20px; top: 90px; width: 320px; max-height: 70vh;
            background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(56, 189, 248, 0.6);
            border-radius: 24px; padding: 25px; z-index: 10;
            transform: translateX(450px); transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
        }
        .info-card.show { transform: translateX(0); }
        .info-card h2 { margin: 0 0 15px; color: #38bdf8; font-size: 1.8rem; }
        .info-card p { font-size: 0.95rem; line-height: 1.8; color: #cbd5e1; margin-bottom: 25px; text-align: justify; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .data-label { color: #94a3b8; }

        /* 時間控制面板 */
        .timeline-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 20px;
            padding: 15px 25px; z-index: 100; display: flex; flex-direction: column; gap: 12px;
            width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .time-display { display: flex; justify-content: space-between; align-items: center; }
        #display-date { font-size: 1.2rem; font-weight: bold; color: #38bdf8; font-family: monospace; }
        #date-picker { background: #1e293b; border: 1px solid #38bdf8; color: #fff; padding: 5px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .time-controls { display: flex; align-items: center; gap: 15px; }
        .speed-control { flex-grow: 1; display: flex; align-items: center; gap: 10px; }
        #speed-slider { flex-grow: 1; accent-color: #38bdf8; cursor: pointer; }
        #speed-val { min-width: 45px; text-align: right; font-family: monospace; color: #38bdf8; font-size: 0.9rem; }

        .bottom-ctrl {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; gap: 15px; background: rgba(15, 23, 42, 0.8); padding: 10px 20px;
            border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; opacity: 0.8; transition: 0.2s; }
        .ctrl-btn:hover { opacity: 1; color: #38bdf8; }

        #loading { position: fixed; inset: 0; background: #050810; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #38bdf8; }
        .loader { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="loader"></div>正在同步引力常數...</div>

    <header>

            </a>

        </div>
    </header>

    <div id="canvas-container"></div>

    <div class="sidebar" id="planet-nav">
        <div class="nav-item active" data-id="sun"><div class="dot" style="background:#facc15"></div><span>太陽</span></div>
        <div class="nav-item" data-id="mercury"><div class="dot" style="background:#94a3b8"></div><span>水星</span></div>
        <div class="nav-item" data-id="venus"><div class="dot" style="background:#fbbf24"></div><span>金星</span></div>

    <div class="info-card" id="info-card">

    <!-- 時間軸控制 -->
    <div class="timeline-panel">

            <span id="display-date">2024-01-01</span>
            <input type="date" id="date-picker">
        </div>
        <div class="time-controls">

            </button>
            <div class="speed-control">

            </div>
            <button class="ctrl-btn" id="btn-today">今日</button>
        </div>
    </div>

                radius: 7, tilt: 97.77,
                data: { 
                    "赤道直徑": "51,118 km",

            neptune: {

                desc: "深藍色的海王星守護著太陽系的邊界。在這個酷寒的冰巨星上，承受著全系最強勁的超音速狂風肆虐，其風速高達每小時 2,100 公里，是動盪不安的氣候世界。", 
                radius: 7, tilt: 28.32,
                data: { 
                    "赤道直徑": "49,528 km", 
                    "質量": "1.02 × 10²⁶ kg", 
                    "自太陽平均距離": "45 億 km",
                    "自轉週期": "16 小時 6 分",
                    "日心軌道週期": "164.8 年",
                    "表面重力": "11.15 m/s²",
                    "表面溫度": "-201 °C"
                } 
            }
        };

        const ORBITAL_PERIODS = { 
            mercury: 87.97, venus: 224.7, earth: 365.25, mars: 686.98, 
            asteroids: 1600, // 新增：小行星帶平均公轉週期
            jupiter: 4332.59, saturn: 10759.22, uranus: 30685.4, neptune: 60189.0 
        };

        let simDate = new Date();
        let simSpeed = 1;
        let isPaused = false;

        let scene, camera, renderer, controls;
        let planets = {}; 
        let planetPivots = {}; 
        let orbitLines = [];
        let currentFocus = "sun";

        // --- 2. 初始化 ---
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 500, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const sunLight = new THREE.PointLight(0xffffff, 2.5, 2500);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.05));

            createStars();
            createSolarSystem();
            createAsteroidBelt(); // 新增這行

            // 在 init() 內
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true; // 讓平移更直覺

            // 關鍵：偵測使用者的操作
            controls.addEventListener('start', () => {
                // 這裡不做事，我們在 animate 裡面根據狀態判斷
            });

            // 當使用者開始手動操作時（點擊或拖拽），切換到手動模式
            controls.addEventListener('start', () => {
                // 如果原本在聚焦行星，一旦手動拖拽，就切換為 manual 模式
                if (currentFocus !== "overview") {
                    currentFocus = "manual"; 
                    // 同時取消側邊欄的 active 狀態，代表目前是自由視角
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                }
            });

            bindUI();
            updateTimeUI();

            window.addEventListener('resize', onWindowResize);
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                flyToPlanet('sun');
            }, 1000);
        }

        function createStars() {
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 });
            const starPos = [];
            for (let i = 0; i < 10000; i++) {
                starPos.push((Math.random() - 0.5) * 5000, (Math.random() - 0.5) * 5000, (Math.random() - 0.5) * 5000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, starMat));
        }

        function createSolarSystem() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            const base = 'https://raw.githubusercontent.com/coollearningtw/img/refs/heads/main/earth-science/models/planets/';
            const distScale = [0, 70, 110, 150, 200, 320, 420, 520, 620];
            const keys = Object.keys(PLANETS_DATA);

            keys.forEach((key, i) => {
                const data = PLANETS_DATA[key];
                const pivot = new THREE.Group();
                scene.add(pivot);
                planetPivots[key] = pivot;

                const tiltGroup = new THREE.Group();
                tiltGroup.rotation.z = THREE.MathUtils.degToRad(data.tilt);
                tiltGroup.position.x = distScale[i];
                pivot.add(tiltGroup);
                pivot.userData.tiltGroup = tiltGroup;

                const geo = new THREE.SphereGeometry(data.radius, 64, 64);
                let mat;
                if(key === 'sun') {
                    mat = new THREE.MeshBasicMaterial({ map: loader.load(base + 'sun.jpg') });
                } else {
                    let texName = (key === 'venus') ? 'venus_surface.jpg' : key + '.jpg';
                    mat = new THREE.MeshPhongMaterial({ map: loader.load(base + texName), shininess: 8 });
                }

                const mesh = new THREE.Mesh(geo, mat);
                tiltGroup.add(mesh);
                planets[key] = mesh;

                // --- 修正後的土星環代碼 ---
                if (data.hasRing) {
                    const innerR = data.radius + 2; // 內環半徑
                    const outerR = data.radius + 12; // 外環半徑
                    
                    // 1. 建立高細分度的圓環，確保圓潤 (64格)
                    const ringGeo = new THREE.RingGeometry(innerR, outerR, 64);
                    
                    // 2. 核心修正：重新計算 UV 座標
                    // 將貼圖的 U (橫向) 映射到環的半徑，V (縱向) 映射到環的圓周
                    const pos = ringGeo.attributes.position;
                    const uv = ringGeo.attributes.uv;
                    
                    for (let i = 0; i < pos.count; i++) {
                        // 取得頂點座標
                        const x = pos.getX(i);
                        const y = pos.getY(i);
                        
                        // 計算該點距離中心的距離 (半徑)
                        const distance = Math.sqrt(x * x + y * y);
                        
                        // U 座標：根據半徑決定在貼圖的哪一部分 (內環到外環)
                        const u = (distance - innerR) / (outerR - innerR);
                        
                        // V 座標：這裡我們不需要像平鋪圖一樣處理，
                        // 因為 RingGeometry 的頂點順序是交替的，
                        // 我們直接利用索引或是角度來決定 V (繞一圈)
                        // 最簡單的方法是使用原本 RingGeometry 的 V 座標，只修正 U
                        const v = uv.getY(i); 
                        
                        uv.setXY(i, u, v);
                    }

                    // 3. 建立材質
                    const ringTex = loader.load(base + 'saturn_ring_alpha.png');
                    const ringMat = new THREE.MeshBasicMaterial({ 
                        map: ringTex,
                        side: THREE.DoubleSide, 
                        transparent: true,    // 必須開啟透明
                        opacity: 0.9,
                        alphaTest: 0.1        // 剔除全黑的部分，防止出現黑色方框
                    });

                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    
                    // 4. 調整旋轉角度 (配合土星地軸傾斜)
                    ring.rotation.x = Math.PI / 2; 
                    tiltGroup.add(ring);
                }

                if(i > 0) {
                    const orbit = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(new THREE.EllipseCurve(0,0,distScale[i],distScale[i]).getPoints(128)), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
                    orbit.rotation.x = Math.PI / 2;
                    scene.add(orbit);
                    orbitLines.push(orbit);
                }
            });
        }

        function createAsteroidBelt() {
            const asteroidCount = 1000; 
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');

            // 1. 載入紋理
            const rockTexture = loader.load('https://raw.githubusercontent.com/coollearningtw/img/refs/heads/main/earth-science/models/planets/craggy_rocks.jpg');
            
            // 2. 建立平滑材質
            const rockMaterial = new THREE.MeshStandardMaterial({ 
                map: rockTexture,
                bumpMap: rockTexture, // 將同一張圖設為凹凸貼圖，讓平滑表面看起來有坑洞質感
                bumpScale: 0.15,      // 控制坑洞深度
                roughness: 0.9,
                metalness: 0.0,
                flatShading: false    // 強制關閉稜角著色，確保視覺平滑
            });

            // 3. 建立圓潤的基礎幾何體 (改用 SphereGeometry)
            // 使用 20x20 的分段數，這會提供非常圓滑的基礎，且完全不會有裂縫
            const baseGeo = new THREE.SphereGeometry(1, 20, 20); 

            // 4. 使用 InstancedMesh
            const instancedAsteroids = new THREE.InstancedMesh(baseGeo, rockMaterial, asteroidCount);
            
            const dummy = new THREE.Object3D();
            for (let i = 0; i < asteroidCount; i++) {
                // 設定隨機位置
                const angle = Math.random() * Math.PI * 2;
                const radius = 240 + Math.random() * 60;
                
                dummy.position.set(
                    Math.cos(angle) * radius,
                    (Math.random() - 0.5) * 10,
                    Math.sin(angle) * radius
                );

                // 隨機旋轉
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                
                // --- 核心改進：隨機非同步縮放 ---
                // 這是產生馬鈴薯形狀最安全的方式，保證模型 100% 完整不破碎
                const baseSize = 0.8 + Math.random() * 1.5;
                
                // 隨機在三個軸向給予不同的比例 (例如長條形、扁平形)
                const scaleX = baseSize * (0.8 + Math.random() * 0.6); 
                const scaleY = baseSize * (0.8 + Math.random() * 0.6); 
                const scaleZ = baseSize * (0.8 + Math.random() * 0.6); 
                
                dummy.scale.set(scaleX, scaleY, scaleZ);

                dummy.updateMatrix();
                instancedAsteroids.setMatrixAt(i, dummy.matrix);
            }

            const asteroidPivot = new THREE.Group();
            scene.add(asteroidPivot);
            asteroidPivot.add(instancedAsteroids);
            
            planetPivots['asteroids'] = asteroidPivot;
        }

        // --- 3. 核心動畫循環 ---
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            
            // 時間運行邏輯 (略...)
            if (!isPaused) {
                const dayMS = 24 * 60 * 60 * 1000;
                const deltaChange = (16.7 / 1000) * simSpeed; 
                simDate.setTime(simDate.getTime() + deltaChange * dayMS);
                updateTimeUI();
            }

            // 更新公轉 (略...)
            const epoch = new Date("2492-05-06");
            const totalDays = (simDate - epoch) / (1000 * 60 * 60 * 24);
            for (let key in planetPivots) {
                if (key === 'sun' || !ORBITAL_PERIODS[key]) continue;
                const angle = (totalDays / ORBITAL_PERIODS[key]) * Math.PI * 2;
                planetPivots[key].rotation.y = angle;
                if (planetPivots[key].userData.tiltGroup) {
                    planetPivots[key].userData.tiltGroup.rotation.y = -angle;
                }
            }

            // --- 核心追蹤與脫離邏輯 ---
            if (currentFocus !== "overview" && currentFocus !== "manual" && planets[currentFocus]) {
                
                // 1. 取得行星目前的即時座標
                const planetWorldPos = new THREE.Vector3();
                planets[currentFocus].getWorldPosition(planetWorldPos);

                // 2. 判斷是否要脫離追蹤：
                // 如果使用者正在「平移」(右鍵拖拽)，OrbitControls 會改動其內部狀態。
                // 在 OrbitControls 中，平移會改變 target，我們檢查 controls 狀態
                // (THREE.STATE.PAN 通常是 2)
                if (controls.state === 2) { 
                    currentFocus = "manual"; 
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                } else {
                    // 3. 核心鎖定：強迫旋轉中心等於行星位置
                    // 計算行星這一幀的位移 Delta
                    const deltaMove = new THREE.Vector3().subVectors(planetWorldPos, lastPlanetPos);
                    
                    // 讓攝影機跟著行星移動，保持相對距離
                    camera.position.add(deltaMove);
                    // 讓旋轉中心固定在行星上
                    controls.target.copy(planetWorldPos);
                    
                    lastPlanetPos.copy(planetWorldPos);
                }
            }

            // 更新行星自轉 (略...)
            for(let key in planets) {
                const dir = (key === 'venus') ? -1 : 1;
                planets[key].rotation.y += 0.006 * dir;
            }

            controls.update(); // 這行會根據新的 target 重新計算攝影機位置
            renderer.render(scene, camera);
        }

        // --- 4. 工具函式 ---
        function updateTimeUI() {
            const dateEl = document.getElementById('display-date');
            if (dateEl) {
                dateEl.innerText = simDate.toISOString().split('T')[0];
            }
        }

        function flyToPlanet(id) {
            currentFocus = id;
            isFollowing = true; // 開啟跟隨
            const data = PLANETS_DATA[id];
            const targetPlanet = planets[id];

            // 更新 UI 狀態
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
            document.getElementById('info-card').classList.add('show');
            document.getElementById('planet-name').innerText = data.name;
            document.getElementById('planet-desc').innerText = data.desc;
            
            let html = '';
            for(let k in data.data) {
                html += `<div class="data-row"><span class="data-label">${k}</span><span>${data.data[k]}</span></div>`;
            }
            document.getElementById('planet-data').innerHTML = html;

            // 計算目標位置
            const worldPos = new THREE.Vector3();
            targetPlanet.getWorldPosition(worldPos);
            lastPlanetPos.copy(worldPos); // 初始化位置紀錄

            const dist = data.radius * 5;
            const targetCamPos = { x: worldPos.x + dist, y: worldPos.y + dist/2, z: worldPos.z + dist };

            // 平滑跳轉動畫
            new TWEEN.Tween(camera.position).to(targetCamPos, 1500).easing(TWEEN.Easing.Quadratic.Out).start();
            new TWEEN.Tween(controls.target).to({ x: worldPos.x, y: worldPos.y, z: worldPos.z }, 1500).easing(TWEEN.Easing.Quadratic.Out).start();
        }

        function bindUI() {
            document.querySelectorAll('.nav-item').forEach(item => item.onclick = () => flyToPlanet(item.dataset.id));
            
            document.getElementById('reset-cam').onclick = () => {
                new TWEEN.Tween(camera.position).to({ x: 0, y: 800, z: 1200 }, 1500).start();
                new TWEEN.Tween(controls.target).to({ x: 0, y: 0, z: 0 }, 1500).start();
                document.getElementById('info-card').classList.remove('show');
                currentFocus = "overview";
            };

            document.getElementById('toggle-orbit').onclick = () => orbitLines.forEach(l => l.visible = !l.visible);

            // 時間控制
            const playBtn = document.getElementById('btn-play-pause');
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');

            playBtn.onclick = () => {
                isPaused = !isPaused;
                iconPlay.style.display = isPaused ? 'block' : 'none';
                iconPause.style.display = isPaused ? 'none' : 'block';
            };

            document.getElementById('speed-slider').oninput = (e) => {
                simSpeed = parseFloat(e.target.value);
                document.getElementById('speed-val').innerText = simSpeed + 'x';
            };

            document.getElementById('date-picker').onchange = (e) => {
                simDate = new Date(e.target.value);
                updateTimeUI();
            };

            document.getElementById('btn-today').onclick = () => {
                simDate = new Date();
                updateTimeUI();
            };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
