<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬筆記本 - 酷學習</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/header.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { padding-bottom: 50px; background-color: #f1f5f9; }
        
        /* === 儀表板 (筆記本列表) === */
        #dashboard { display: block; max-width: 980px; margin: 20px auto; padding: 0 20px; }
        .notebook-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .nb-card {
            background: #fff; border-radius: 12px; padding: 25px 20px; text-align: center;
            box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0;
            position: relative;
        }
        .nb-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(11,118,209,0.1); border-color: var(--primary); }
        .nb-card-title { font-size: 1.2rem; font-weight: bold; color: #1e293b; margin-bottom: 10px; }
        .nb-card-meta { font-size: 0.85rem; color: #64748b; }
        
        /* 刪除與編輯按鈕 */
        .nb-delete-btn, .nb-edit-btn {
            position: absolute; top: 10px; 
            border: none; border-radius: 50%; width: 28px; height: 28px; font-weight: bold;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .nb-delete-btn { right: 10px; background: #fee2e2; color: #ef4444; }
        .nb-delete-btn:hover { background: #fecaca; }
        .nb-edit-btn { right: 44px; background: #e0f2fe; color: #0b76d1; font-size: 14px; }
        .nb-edit-btn:hover { background: #bae6fd; }
        .nb-card:hover .nb-delete-btn, .nb-card:hover .nb-edit-btn { display: flex; }

        .nb-add-card { border: 2px dashed #cbd5e1; background: transparent; color: #0b76d1; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: none; }
        .nb-add-card:hover { background: #e0f2fe; border-color: #0b76d1; }

        /* === 編輯器視圖 === */
        #editor-view { display: none; max-width: 1000px; margin: 0 auto; padding: 10px; }
        
        /* 編輯器工具列 */
        .editor-toolbar {
            position: sticky; top: 10px; background: #fff; padding: 10px 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 100;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .toolbar-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #e2e8f0; padding-right: 10px; }
        .toolbar-group:last-child { border-right: none; margin-left: auto; }
        
        .t-btn {
            background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 12px;
            cursor: pointer; font-weight: bold; color: #334155; transition: 0.2s; font-size: 0.9rem;
        }
        .t-btn:hover { background: #e0f2fe; color: #0b76d1; border-color: #0b76d1; }
        .t-select, .t-color {
            border: 1px solid #cbd5e1; border-radius: 6px; padding: 5px; cursor: pointer;
        }

        /* 顏色選單容器 */
        .color-menu { position: relative; list-style: none; }
        .color-menu summary { list-style: none; cursor: pointer; outline: none; }
        .color-menu summary::-webkit-details-marker { display: none; }

        /* 浮動面板 */
        .color-palette {
            position: absolute;
            top: 100%; left: 0;
            margin-top: 8px;
            padding: 10px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 140px;
            z-index: 200;
        }

        /* 立體按鈕樣式 */
        .color-btn {
            width: 28px; height: 18px;
            border: 1px solid #000;
            cursor: pointer; padding: 0;
        }
        .color-btn:hover { transform: scale(1.1); filter: brightness(1.1); }
                
        /* 筆記本紙張樣式 (支援左右滑動，固定大小) */
        .pages-container { padding-bottom: 50px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .page-wrapper {
            background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;
            transition: transform 0.3s, margin 0.3s; overflow: hidden; display: flex; flex-direction: column;
            cursor: text;
            margin: 0 auto 30px auto;
        }
        
        .page-wrapper.has-lines {
            background-image: 
                repeating-linear-gradient(transparent, transparent calc(var(--line-height) - 1px), #cbd5e1 calc(var(--line-height) - 1px), #cbd5e1 var(--line-height)),
                linear-gradient(#ffffff, #ffffff);
            background-origin: content-box, border-box;
            background-clip: content-box, border-box;
        }

        .page-content {
            width: 100%; outline: none; padding: 0; margin: 0;
            word-break: break-all;
        }

        .page-num-display { 
            position: absolute; bottom: 15px; left: 0; width: 100%; 
            text-align: center; color: #94a3b8; font-size: 0.85rem; 
            font-family: monospace; pointer-events: none; 
        }

        /* === 彈出視窗 (Modal) === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.6); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-card { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-title { margin-top: 0; color: #1e293b; font-size: 1.3rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #475569; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }

        /* 儲存狀態提示 */
        #save-toast {
            position: fixed; bottom: 20px; right: 20px; background: #10b981; color: #fff;
            padding: 8px 16px; border-radius: 50px; font-weight: bold; font-size: 0.85rem;
            opacity: 0; transition: 0.3s; pointer-events: none; z-index: 3000;
        }

        /* ========== 響應式設計 (Responsive Web Design) ========== */
        @media (max-width: 820px) {
            #editor-view { padding: 0; }
            .editor-toolbar { 
                top: 0; border-radius: 0; margin-bottom: 10px; 
                justify-content: center; padding: 10px; gap: 8px;
            }
            .toolbar-group { 
                flex-wrap: wrap; 
                border-right: none; 
                padding-right: 0; 
                margin-left: 0 !important; 
                justify-content: center;
                width: 100%;
            }
            .toolbar-group:not(:last-child) {
                border-bottom: 1px dashed #cbd5e1;
                padding-bottom: 10px;
            }
            #dashboard { padding: 0 10px; }
            .modal-card { width: 95%; }
        }

        @media (max-width: 480px) {
            .notebook-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="../index.html" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <img src="../images/logo.png" alt="Logo" height="40">
            <span style="font-weight:bold; color:var(--primary);">虛擬筆記本</span>
        </div>
    </header>

    <!-- 儀表板 (筆記本列表) -->
    <div id="dashboard">
        <h2 style="color: #334155; margin-bottom: 5px;">我的筆記本</h2>
        <p style="color: #64748b; margin-top: 0;">自動儲存於瀏覽器中，隨時編輯與匯出。</p>
        <div class="notebook-grid" id="nb-list"></div>
    </div>

    <!-- 編輯器視圖 -->
    <div id="editor-view">
        <div class="editor-toolbar">
            <div class="toolbar-group">
                <button class="t-btn" onclick="closeEditor()">⬅ 返回</button>
                <span id="current-nb-title" style="font-weight:bold; color:#0b76d1; margin-left:10px;">筆記本名稱</span>
                <button onclick="openEditModal()" title="編輯筆記本設定" style="background:none; border:none; color:#64748b; cursor:pointer; margin-left:4px; display:flex; align-items:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
            </div>
            
            <div class="toolbar-group">
                <button class="t-btn" onclick="execCmd('bold')" title="粗體"><b>B</b></button>
                <button class="t-btn" onclick="execCmd('italic')" title="斜體"><i>I</i></button>
                <button class="t-btn" onclick="execCmd('underline')" title="底線"><u>U</u></button>
                <button class="t-btn" onclick="execCmd('strikeThrough')" title="刪除線"><s>S</s></button>
                
                <details class="color-menu">
                    <summary class="t-btn" style="width: 60px; text-align: center;">顏色</summary>
                    <div class="color-palette">
                        <button class="color-btn" style="background:#ef4444;" onclick="execCmd('foreColor', '#ef4444')"></button>
                        <button class="color-btn" style="background:#d97706;" onclick="execCmd('foreColor', '#d97706')"></button>
                        <button class="color-btn" style="background:#10b981;" onclick="execCmd('foreColor', '#10b981')"></button>
                        <button class="color-btn" style="background:#0b76d1;" onclick="execCmd('foreColor', '#0b76d1')"></button>
                        <button class="color-btn" style="background:#d4c643;" onclick="execCmd('foreColor', '#d4c643')"></button>
                        <button class="color-btn" style="background:#1e293b;" onclick="execCmd('foreColor', '#1e293b')"></button>
                        <input type="color" onchange="execCmd('foreColor', this.value)" title="更多顏色" style="width:22px; height:22px; cursor:pointer; border:none; background:none;">
                    </div>
                </details>

                <select class="t-select" onchange="execCmd('fontName', this.value)" title="字體">
                    <option value="Noto Sans TC">預設字體</option>
                    <option value="標楷體">標楷體</option>
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier</option>
                </select>
                
                <!-- 新增：畫布縮放比例調整 -->
                <select class="t-select" id="zoom-select" onchange="adjustCanvasZoom()" title="顯示比例">
                    <option value="auto">適應寬度</option>
                    <option value="1">100%</option>
                    <option value="0.75">75%</option>
                    <option value="0.5">50%</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button class="t-btn" onclick="insertIndent()" style="color:#d97706;">⇥ 縮排 (全形空白)</button>
            </div>

            <div class="toolbar-group">
                <button class="t-btn" style="background:#0b76d1; color:#fff; border:none;" onclick="openExportModal()">匯出檔案</button>
            </div>
        </div>

        <div class="pages-container" id="pages-container"></div>
    </div>

    <!-- 建立/編輯筆記本 Modal -->
    <div id="create-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title" id="setup-modal-title">建立新筆記本</h3>
            <div class="form-group">
                <label>筆記本名稱</label>
                <input type="text" id="nb-title" placeholder="例如：國文第三課筆記">
            </div>
            <div class="form-group">
                <label>紙張尺寸</label>
                <select id="nb-size">
                    <option value="800x1131">A4 比例 (寬 800px)</option>
                    <option value="600x848">B5 比例 (寬 600px)</option>
                </select>
            </div>
            <div class="form-group">
                <label>列高 (文字行距)</label>
                <select id="nb-lineheight">
                    <option value="32">標準 (32px)</option>
                    <option value="40">寬鬆 (40px)</option>
                    <option value="24">緊密 (24px)</option>
                </select>
            </div>
            <div class="form-group">
                <label>四周邊距 (Padding)</label>
                <input type="number" id="nb-padding" value="40" min="10" max="100">
            </div>
            <div class="modal-actions">
                <button class="t-btn" onclick="document.getElementById('create-modal').style.display='none'">取消</button>
                <button class="t-btn" id="setup-modal-submit" style="background:#0b76d1; color:#fff;" onclick="saveSetupNotebook()">建立</button>
            </div>
        </div>
    </div>

    <!-- 匯出 Modal -->
    <div id="export-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title">匯出筆記</h3>
            <div class="form-group">
                <label>檔案類型</label>
                <select id="exp-format">
                    <option value="image">圖片 (PNG)</option>
                    <option value="word">Word 檔 (.doc)</option>
                </select>
            </div>
            <div class="form-group" style="display:flex; gap:10px; align-items:center;">
                <input type="checkbox" id="exp-lines" checked style="width:auto;">
                <label for="exp-lines" style="margin:0;">顯示背景橫線</label>
            </div>
            <div class="form-group" style="display:flex; gap:10px; align-items:center;">
                <input type="checkbox" id="exp-pagenum" checked style="width:auto;">
                <label for="exp-pagenum" style="margin:0;">顯示頁碼</label>
            </div>
            <div class="modal-actions">
                <button class="t-btn" onclick="document.getElementById('export-modal').style.display='none'">取消</button>
                <button class="t-btn" style="background:#10b981; color:#fff;" onclick="executeExport()">確認匯出</button>
            </div>
        </div>
    </div>

    <div id="save-toast">✔ 已自動儲存</div>

    <script>
        const STORAGE_KEY = 'cool_learning_notebooks';
        let notebooks =[];
        let currentNotebookId = null;
        let editingNotebookId = null; 
        let saveTimeout = null;

        function init() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) notebooks = JSON.parse(data);
            renderDashboard();
        }

        // === 儀表板邏輯 ===
        function renderDashboard() {
            const list = document.getElementById('nb-list');
            list.innerHTML = '';
            
            notebooks.forEach(nb => {
                const card = document.createElement('div');
                card.className = 'nb-card';
                card.innerHTML = `
                    <div class="nb-card-title">${nb.title}</div>
                    <div class="nb-card-meta">共 ${nb.pages.length} 頁 | ${nb.settings.sizeName}</div>
                    <button class="nb-edit-btn" title="編輯筆記本設定" onclick="openEditModalFromDash(event, '${nb.id}')">✎</button>
                    <button class="nb-delete-btn" title="刪除筆記本" onclick="deleteNotebook(event, '${nb.id}')">✕</button>
                `;
                card.onclick = () => openEditor(nb.id);
                list.appendChild(card);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'nb-card nb-add-card';
            addBtn.innerHTML = `
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <div style="margin-top:10px;">建立新筆記本</div>
            `;
            addBtn.onclick = () => openCreateModal();
            list.appendChild(addBtn);
        }

        function deleteNotebook(e, id) {
            e.stopPropagation();
            if(confirm('確定要刪除這本筆記嗎？此動作無法復原。')) {
                notebooks = notebooks.filter(n => n.id !== id);
                saveData();
                renderDashboard();
            }
        }

        // === 建立/編輯設定 Modal 邏輯 ===
        function openCreateModal() {
            editingNotebookId = null; 
            document.getElementById('setup-modal-title').innerText = "建立新筆記本";
            document.getElementById('setup-modal-submit').innerText = "建立";
            
            document.getElementById('nb-title').value = '';
            document.getElementById('nb-size').value = '800x1131';
            document.getElementById('nb-lineheight').value = '32';
            document.getElementById('nb-padding').value = '40';
            
            document.getElementById('create-modal').style.display = 'flex';
        }

        function openEditModalFromDash(e, id) {
            e.stopPropagation();
            editingNotebookId = id;
            populateSetupModal(id);
        }

        function openEditModal() {
            forceSaveContent(); 
            editingNotebookId = currentNotebookId;
            populateSetupModal(currentNotebookId);
        }

        function populateSetupModal(id) {
            const nb = notebooks.find(n => n.id === id);
            document.getElementById('setup-modal-title').innerText = "編輯筆記本設定";
            document.getElementById('setup-modal-submit').innerText = "儲存設定";
            
            document.getElementById('nb-title').value = nb.title;
            document.getElementById('nb-size').value = `${nb.settings.width}x${nb.settings.height}`;
            document.getElementById('nb-lineheight').value = nb.settings.lineHeight;
            document.getElementById('nb-padding').value = nb.settings.padding;
            
            document.getElementById('create-modal').style.display = 'flex';
        }

        function saveSetupNotebook() {
            const title = document.getElementById('nb-title').value || '未命名筆記';
            const sizeSel = document.getElementById('nb-size');
            const lhSel = document.getElementById('nb-lineheight');
            const pad = parseInt(document.getElementById('nb-padding').value) || 40;
            const [width, height] = sizeSel.value.split('x').map(Number);
            
            if (editingNotebookId === null) {
                const newNb = {
                    id: 'nb_' + Date.now(),
                    title: title,
                    settings: {
                        sizeName: sizeSel.options[sizeSel.selectedIndex].text,
                        width: width,
                        height: height,
                        lineHeight: parseInt(lhSel.value),
                        padding: pad
                    },
                    pages: ['']
                };
                notebooks.push(newNb);
                saveData();
                document.getElementById('create-modal').style.display = 'none';
                renderDashboard();
                openEditor(newNb.id);
            } else {
                const nb = notebooks.find(n => n.id === editingNotebookId);
                nb.title = title;
                nb.settings.sizeName = sizeSel.options[sizeSel.selectedIndex].text;
                nb.settings.width = width;
                nb.settings.height = height;
                nb.settings.lineHeight = parseInt(lhSel.value);
                nb.settings.padding = pad;
                
                saveData();
                document.getElementById('create-modal').style.display = 'none';
                
                if (currentNotebookId === editingNotebookId) {
                    document.getElementById('current-nb-title').innerText = nb.title;
                    renderPages(); 
                }
                renderDashboard(); 
            }
        }

        // === 編輯器邏輯 ===
        function openEditor(id) {
            currentNotebookId = id;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('editor-view').style.display = 'block';
            
            const nb = notebooks.find(n => n.id === id);
            document.getElementById('current-nb-title').innerText = nb.title;
            renderPages();
        }

        function closeEditor() {
            forceSaveContent(); 
            currentNotebookId = null;
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderDashboard();
        }

        function renderPages() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            
            const nb = notebooks.find(n => n.id === currentNotebookId);
            const s = nb.settings;

            nb.pages.forEach((htmlContent, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper has-lines';
                wrapper.style.width = s.width + 'px';
                wrapper.style.height = s.height + 'px';
                wrapper.style.padding = s.padding + 'px';
                wrapper.style.setProperty('--line-height', s.lineHeight + 'px');

                const content = document.createElement('div');
                content.className = 'page-content';
                content.contentEditable = true;
                content.style.lineHeight = s.lineHeight + 'px';
                content.style.fontSize = (s.lineHeight * 0.6) + 'px'; 
                content.innerHTML = htmlContent;
                content.dataset.pageIndex = index;

                content.addEventListener('input', triggerAutoSave);
                content.addEventListener('keydown', handleKeyDown);

                wrapper.onclick = (e) => {
                    if (e.target === wrapper) {
                        content.focus();
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(content);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                };

                const pageNum = document.createElement('div');
                pageNum.className = 'page-num-display';
                pageNum.innerText = `- ${index + 1} -`;

                wrapper.appendChild(content);
                wrapper.appendChild(pageNum);
                container.appendChild(wrapper);
            });
            
            // 繪製紙張後立即套用縮放比例
            adjustCanvasZoom();
        }

        // 處理畫布的縮放
        function adjustCanvasZoom() {
            if (!currentNotebookId) return;
            const nb = notebooks.find(n => n.id === currentNotebookId);
            const zoomSel = document.getElementById('zoom-select');
            const wrappers = document.querySelectorAll('.page-wrapper');
            
            let scale = 1;
            if (zoomSel.value === 'auto') {
                const screenWidth = window.innerWidth;
                const targetWidth = nb.settings.width;
                // 給予左右各一點留白(手機 10px, 電腦 20px)
                const margin = screenWidth > 820 ? 40 : 20; 
                if (screenWidth < targetWidth + margin) {
                    scale = (screenWidth - margin) / targetWidth;
                }
            } else {
                scale = parseFloat(zoomSel.value);
            }

            wrappers.forEach(w => {
                w.style.zoom = scale;
                if (CSS.supports && !CSS.supports('zoom: 1')) {
                    w.style.transform = `scale(${scale})`;
                    w.style.transformOrigin = 'top center';
                    const originalHeight = w.offsetHeight || nb.settings.height;
                    const newHeight = originalHeight * scale;
                    w.style.marginBottom = `-${originalHeight - newHeight - 30}px`;
                }
            });
        }

        window.addEventListener('resize', () => {
            if (currentNotebookId && document.getElementById('zoom-select').value === 'auto') {
                adjustCanvasZoom();
            }
        });
        
        function handleKeyDown(e) {
            const el = e.target;
            const index = parseInt(el.dataset.pageIndex);
            const nb = notebooks.find(n => n.id === currentNotebookId);
            const wrapper = el.parentElement;
            
            if (e.key === 'Enter') {
                const availableHeight = nb.settings.height - (nb.settings.padding * 2);
                
                let currentContentHeight = el.scrollHeight;
                if (CSS.supports && !CSS.supports('zoom: 1')) {
                    currentContentHeight = el.offsetHeight;
                }

                if (currentContentHeight + nb.settings.lineHeight > availableHeight) {
                    e.preventDefault();
                    
                    if (index === nb.pages.length - 1) {
                        forceSaveContent(); 
                        nb.pages.push('');
                        saveData();
                        renderPages();
                        const newPage = document.querySelector(`.page-content[data-page-index="${index + 1}"]`);
                        if (newPage) newPage.focus();
                    } else {
                        const nextPage = document.querySelector(`.page-content[data-page-index="${index + 1}"]`);
                        if (nextPage) {
                            nextPage.focus();
                            const range = document.createRange();
                            const sel = window.getSelection();
                            range.selectNodeContents(nextPage);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                }
            }
            
            if (e.key === 'Backspace') {
                const isEmpty = el.textContent.trim() === '' && el.querySelectorAll('img').length === 0;

                if (isEmpty) {
                    if (nb.pages.length > 1) {
                        e.preventDefault();
                        
                        forceSaveContent();
                        nb.pages.splice(index, 1);
                        saveData();
                        renderPages();
                        
                        const targetIdx = index > 0 ? index - 1 : 0;
                        const prevPage = document.querySelector(`.page-content[data-page-index="${targetIdx}"]`);
                        if (prevPage) {
                            prevPage.focus();
                            const range = document.createRange();
                            const sel = window.getSelection();
                            range.selectNodeContents(prevPage);
                            range.collapse(false);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                }
            }
        }

        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            triggerAutoSave();
        }

        function insertIndent() {
            document.execCommand('insertText', false, '\u3000\u3000');
            triggerAutoSave();
        }

        function triggerAutoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                forceSaveContent();
                showSaveToast();
            }, 1000);
        }

        function forceSaveContent() {
            if (!currentNotebookId) return;
            const nb = notebooks.find(n => n.id === currentNotebookId);
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(p => {
                const idx = p.dataset.pageIndex;
                nb.pages[idx] = p.innerHTML;
            });
            saveData();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notebooks));
        }

        function showSaveToast() {
            const toast = document.getElementById('save-toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        // === 匯出邏輯 ===
        function openExportModal() {
            forceSaveContent();
            document.getElementById('export-modal').style.display = 'flex';
        }

        async function executeExport() {
            const format = document.getElementById('exp-format').value;
            const showLines = document.getElementById('exp-lines').checked;
            const showPageNum = document.getElementById('exp-pagenum').checked;
            const nb = notebooks.find(n => n.id === currentNotebookId);

            document.getElementById('export-modal').style.display = 'none';

            function addLinesToElement(wrapper) {
                const s = nb.settings;
                const linesContainer = document.createElement('div');
                linesContainer.className = 'temp-lines-container';
                linesContainer.style.position = 'absolute';
                linesContainer.style.top = s.padding + 'px';
                linesContainer.style.left = s.padding + 'px';
                linesContainer.style.right = s.padding + 'px';
                linesContainer.style.bottom = s.padding + 'px';
                linesContainer.style.overflow = 'hidden';
                linesContainer.style.pointerEvents = 'none';

                const numLines = Math.floor((s.height - s.padding * 2) / s.lineHeight);
                for (let i = 1; i < numLines; i++) {
                    const line = document.createElement('div');
                    line.style.position = 'absolute';
                    line.style.height = '1px';
                    line.style.width = '100%';
                    line.style.background = '#cbd5e1';
                    line.style.top = (i * s.lineHeight) + 'px';
                    linesContainer.appendChild(line);
                }
                wrapper.prepend(linesContainer);
            }

            const wrappers = document.querySelectorAll('.page-wrapper');
            wrappers.forEach(w => {
                w.classList.remove('has-lines');
                w.querySelector('.page-num-display').style.display = showPageNum ? 'block' : 'none';
                if (showLines) addLinesToElement(w);
                
                // 匯出前強制將縮放改回 100%，以防圖片產生變形或解析度降低
                w.style.zoom = 1;
                if (CSS.supports && !CSS.supports('zoom: 1')) {
                    w.style.transform = 'none';
                    w.style.marginBottom = '30px';
                }
            });

            if (format === 'image') {
                for (let i = 0; i < wrappers.length; i++) {
                    const canvas = await html2canvas(wrappers[i], { scale: 2 });
                    const link = document.createElement('a');
                    link.download = `${nb.title}_第${i+1}頁.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            } else if (format === 'word') {
                let htmlStr = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>${nb.title}</title>
                <style>
                    body { font-family: "Noto Sans TC", "標楷體", sans-serif; }
                    .page { position: relative; width: ${nb.settings.width}px; height: ${nb.settings.height}px; padding: ${nb.settings.padding}px; box-sizing: border-box; }
                    .page-content { line-height: ${nb.settings.lineHeight}px; font-size: ${nb.settings.lineHeight * 0.6}px; }
                </style>
                </head><body>`;

                nb.pages.forEach((content, i) => {
                    htmlStr += `<div class='page'>`;
                    if (showLines) {
                        const s = nb.settings;
                        const numLines = Math.floor((s.height - s.padding * 2) / s.lineHeight);
                        for (let j = 1; j < numLines; j++) {
                            htmlStr += `<div style="position:absolute; height:1px; width:calc(100% - ${s.padding*2}px); background:#cbd5e1; top:${s.padding + (j * s.lineHeight)}px; left:${s.padding}px;"></div>`;
                        }
                    }
                    htmlStr += `<div class="page-content">${content}</div>`;
                    htmlStr += `</div>`;
                    if (showPageNum) htmlStr += `<div style="text-align:center; color:#999;">- ${i+1} -</div>`;
                    if (i < nb.pages.length - 1) {
                        htmlStr += `<br clear=all style='mso-special-character:line-break;page-break-before:always'>`;
                    }
                });
                
                htmlStr += `</body></html>`;
                
                const blob = new Blob(['\ufeff', htmlStr], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${nb.title}.doc`;
                link.click();
            }

            wrappers.forEach(w => {
                w.classList.add('has-lines');
                w.querySelector('.page-num-display').style.display = 'block';
                const tempLines = w.querySelector('.temp-lines-container');
                if (tempLines) tempLines.remove();
            });
            
            // 匯出結束後，把使用者原本的縮放比例套用回來
            adjustCanvasZoom();
        }

        init();
    </script>
</body>
</html>
